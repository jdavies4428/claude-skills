function renderTemplate19(f) {
  const AMBER = '#C5A059';

  // ── Camera pulse (frames 0-30) ──────────────────────────────────────────────
  const cam = document.getElementById('t19-camera');
  if (cam) {
    const camIn  = interpolate(f, [0, 10], [0, 1], { clamp: true, easing: easeInOut });
    const camOut = interpolate(f, [22, 30], [0, 1], { clamp: true, easing: easeInOut });
    cam.style.opacity = Math.max(0, camIn - camOut).toFixed(3);
    const pulse = 1.0 + 0.18 * Math.abs(Math.sin(f * 0.28));
    cam.style.transform = `translateX(-50%) scale(${pulse.toFixed(3)})`;
  }

  // ── Flash helper ───────────────────────────────────────────────────────────
  const flash = document.getElementById('t19-flash');
  if (flash) {
    // Flash 1: frame 25 spike 0→0.8 in 2 frames, then 0.8→0 over 6 frames
    const f1in  = interpolate(f, [25, 27], [0, 0.8], { clamp: true });
    const f1out = interpolate(f, [27, 33], [0.8, 0], { clamp: true });
    // Flash 2: frame 70, opacity 0.6
    const f2in  = interpolate(f, [70, 72], [0, 0.6], { clamp: true });
    const f2out = interpolate(f, [72, 78], [0.6, 0], { clamp: true });
    // Flash 3: frame 115, opacity 0.5
    const f3in  = interpolate(f, [115, 117], [0, 0.5], { clamp: true });
    const f3out = interpolate(f, [117, 123], [0.5, 0], { clamp: true });

    let fo = 0;
    if (f >= 25 && f < 33)  fo = f <= 27 ? f1in  : f1out;
    if (f >= 70 && f < 78)  fo = f <= 72 ? f2in  : f2out;
    if (f >= 115 && f < 123) fo = f <= 117 ? f3in  : f3out;
    flash.style.opacity = fo.toFixed(3);
  }

  // ── Polaroid drop helper ───────────────────────────────────────────────────
  // Returns [translateX%, translateY_px, rotate_deg] given current frame
  // during initial drop phase and fan-out phase.
  //
  // Initial drop positions (centered on canvas, shifted left/right/center):
  //   pol1: drop origin above-left  → land at x=-60px
  //   pol2: drop origin above-right → land at x=+60px
  //   pol3: drop origin top-center  → land at x=0px
  //
  // Fan-out target positions (as translateX from left:50% anchor):
  //   pol1: translateX(-50%) → left=15% means translateX = -(50-15)% of canvas ≈ -91px (canvas 260px)
  //   pol2: right=85%       → translateX ≈ +91px
  //   pol3: center stays    → translateX = 0px
  //
  // We animate from landed x → fan x using spring(f-165, {damping:15})

  const canvasW = 260; // fixed canvas width

  // Fan-out spring (frames 165-200)
  const fanProg = Math.max(0, f - 165);
  const fanSpring = spring(fanProg, { damping: 15, stiffness: 120, mass: 1 });

  // ── Polaroid 1 (left, -5deg → fan -8deg) ──────────────────────────────────
  const pol1 = document.getElementById('t19-pol-1');
  if (pol1) {
    const dropProg = Math.max(0, f - 30);
    const dropS = spring(dropProg, { damping: 10, stiffness: 100, mass: 1.3 });
    const dropY  = interpolate(dropS, [0, 1], [-500, 0]);
    const dropOp = interpolate(f, [30, 42], [0, 1], { clamp: true });

    // Landed x offset from center: -60px (shifted left)
    // Fan x offset: left=15% of 260px = 39px, center anchor at 130px → offset = -(130-39) = -91px
    const landX = -60;
    const fanX  = -91;
    const curX  = interpolate(fanSpring, [0, 1], [landX, fanX]);

    // Rotate: -5deg → -8deg on fan
    const landRot = -5;
    const fanRot  = -8;
    const curRot  = interpolate(fanSpring, [0, 1], [landRot, fanRot]);

    pol1.style.opacity   = dropOp.toFixed(3);
    pol1.style.transform = `translateX(calc(-50% + ${curX.toFixed(1)}px)) translateY(${dropY.toFixed(1)}px) rotate(${curRot.toFixed(2)}deg)`;
  }

  // ── Polaroid 2 (right, +5deg → fan +8deg) ─────────────────────────────────
  const pol2 = document.getElementById('t19-pol-2');
  if (pol2) {
    const dropProg = Math.max(0, f - 75);
    const dropS = spring(dropProg, { damping: 10, stiffness: 100, mass: 1.3 });
    const dropY  = interpolate(dropS, [0, 1], [-500, 0]);
    const dropOp = interpolate(f, [75, 87], [0, 1], { clamp: true });

    const landX = 60;
    const fanX  = 91;
    const curX  = interpolate(fanSpring, [0, 1], [landX, fanX]);

    const landRot = 5;
    const fanRot  = 8;
    const curRot  = interpolate(fanSpring, [0, 1], [landRot, fanRot]);

    pol2.style.opacity   = dropOp.toFixed(3);
    pol2.style.transform = `translateX(calc(-50% + ${curX.toFixed(1)}px)) translateY(${dropY.toFixed(1)}px) rotate(${curRot.toFixed(2)}deg)`;
  }

  // ── Polaroid 3 (center hero, 0deg → fan 0deg, y=20%) ──────────────────────
  const pol3 = document.getElementById('t19-pol-3');
  if (pol3) {
    const dropProg = Math.max(0, f - 120);
    const dropS = spring(dropProg, { damping: 10, stiffness: 100, mass: 1.3 });
    const dropY  = interpolate(dropS, [0, 1], [-500, 0]);
    const dropOp = interpolate(f, [120, 132], [0, 1], { clamp: true });

    // Center stays at x=0, but we add a slight fan-upward: top: 25% → 20% maps to translateY 0→-28px approx
    const fanUpY = interpolate(fanSpring, [0, 1], [0, -14]);
    const curX = 0;

    pol3.style.opacity   = dropOp.toFixed(3);
    pol3.style.transform = `translateX(calc(-50% + ${curX}px)) translateY(${(dropY + fanUpY).toFixed(1)}px) rotate(0deg)`;
  }

  // ── Light-bridge sweep helper ──────────────────────────────────────────────
  // sweepEl: the amber gradient overlay div inside the photo
  // afterEl: the after-photo div with clip-path
  // lblEl:   the label div
  // startF, endF: frame range of the sweep
  const doSweep = (sweepId, afterId, lblId, startF, endF) => {
    const sweepEl = document.getElementById(sweepId);
    const afterEl = document.getElementById(afterId);
    const lblEl   = document.getElementById(lblId);

    if (sweepEl && f >= startF) {
      // Sweep position: translateX from -150% to +150%
      const sp = interpolate(f, [startF, endF], [0, 1], { clamp: true, easing: easeInOut });
      const tx = interpolate(sp, [0, 1], [-150, 150]);
      sweepEl.style.transform = `translateX(${tx.toFixed(1)}%)`;
      // Fade out sweep overlay as it exits right
      const sweepOp = f < (startF + endF) / 2 ? 1 : interpolate(f, [(startF + endF) / 2, endF + 6], [1, 0], { clamp: true });
      sweepEl.style.opacity = sweepOp.toFixed(3);
    }

    if (afterEl && f >= startF) {
      // As sweep passes, reveal the after photo — clip from right edge recedes
      const revealP = interpolate(f, [startF, endF], [0, 1], { clamp: true, easing: easeInOut });
      const revealPct = interpolate(revealP, [0, 1], [100, 0]);
      afterEl.style.clipPath = `inset(0 ${revealPct.toFixed(1)}% 0 0)`;
    }

    if (lblEl && f >= startF) {
      // Cross-fade label: Before→After
      const lblP = interpolate(f, [startF + 8, endF], [0, 1], { clamp: true, easing: easeInOut });
      if (lblP < 0.5) {
        lblEl.textContent = 'Before';
        lblEl.style.color = `rgba(136,136,136,${1 - lblP * 2})`;
      } else {
        lblEl.textContent = 'After';
        lblEl.style.color = `rgba(197,160,89,${(lblP - 0.5) * 2})`;
      }
    }
  };

  // Sweep 1: frames 55-75
  doSweep('t19-sweep-1', 't19-ph1-after', 't19-lbl-1', 55, 75);
  // Sweep 2: frames 95-115
  doSweep('t19-sweep-2', 't19-ph2-after', 't19-lbl-2', 95, 115);
  // Sweep 3: frames 140-160
  doSweep('t19-sweep-3', 't19-ph3-after', 't19-lbl-3', 140, 160);

  // ── Hold float: subtle sin-wave on all three polaroids (frames 290+) ────────
  if (f >= 290) {
    const hf = f - 290;
    [
      { id: 't19-pol-1', phase: 0,          xBase: -91, rot: -8 },
      { id: 't19-pol-2', phase: Math.PI * 0.66, xBase: 91,  rot: 8  },
      { id: 't19-pol-3', phase: Math.PI * 1.33, xBase: 0,   rot: 0  },
    ].forEach(({ id, phase, xBase, rot }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const floatY = Math.sin(hf * 0.06 + phase) * 2.5;
      const floatRot = rot + Math.sin(hf * 0.04 + phase) * 0.5;
      // pol3 has a -14px fan-up baked in
      const baseY = (id === 't19-pol-3') ? -14 : 0;
      el.style.transform = `translateX(calc(-50% + ${xBase}px)) translateY(${(baseY + floatY).toFixed(2)}px) rotate(${floatRot.toFixed(3)}deg)`;
    });
  }

  // ── Connecting line (appears at fan-out: frames 165-185) ──────────────────
  const connLine = document.getElementById('t19-connect-line');
  if (connLine) {
    connLine.style.opacity = interpolate(f, [165, 185], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
    // Pulse on hold
    if (f >= 290) {
      const p = 0.7 + 0.3 * Math.sin((f - 290) * 0.1);
      connLine.style.opacity = p.toFixed(3);
    }
  }

  // ── Sparkles along connecting line (frames 175+) ──────────────────────────
  if (f >= 175) {
    const sparksWrap = document.getElementById('t19-sparks');
    if (sparksWrap) {
      const wrapWidth = sparksWrap.offsetWidth || 220;
      T19_SPARKS.forEach((s, i) => {
        const sp = document.getElementById(`t19-spark-${i}`);
        if (!sp) return;
        const sf = f - 175;
        const x = ((s.pct + sf * s.speed * 60) % 100);
        const y = 7 + s.offY + Math.sin(sf * 0.08 + s.phase) * 2;
        const fadeIn = interpolate(f, [175, 195], [0, 1], { clamp: true });
        const flicker = 0.5 + 0.5 * Math.sin(sf * 0.25 + s.phase);
        sp.style.left    = `${x.toFixed(1)}%`;
        sp.style.top     = `${y.toFixed(1)}px`;
        sp.style.opacity = (fadeIn * flicker * 0.85).toFixed(3);
      });
    }
  }

  // ── Logo (frames 195-215) ─────────────────────────────────────────────────
  const logo19 = document.getElementById('t19-logo');
  if (logo19) {
    logo19.style.opacity = interpolate(f, [195, 215], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
  }

  // ── Headline words (frames 200-230, stagger per word) ─────────────────────
  const words19 = C.headline.split(' ');
  words19.forEach((_, i) => {
    const wordEl = document.getElementById(`t19-word-${i}`);
    if (!wordEl) return;
    const startF = 200 + i * 8;
    wordEl.style.opacity = interpolate(f, [startF, startF + 14], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
  });

  // ── Badge (frames 225-245) ────────────────────────────────────────────────
  const badge19 = document.getElementById('t19-badge');
  if (badge19) {
    badge19.style.opacity = interpolate(f, [225, 245], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
  }

  // ── Support text (frames 235-255) ────────────────────────────────────────
  const sup19 = document.getElementById('t19-support');
  if (sup19) {
    sup19.style.opacity = interpolate(f, [235, 255], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
  }

  // ── CTA (frames 250-280, gentle rise, no bounce) ──────────────────────────
  const cta19 = document.getElementById('t19-cta');
  if (cta19) {
    const ctaOp = interpolate(f, [250, 272], [0, 1], { clamp: true, easing: easeInOut });
    const ctaY  = interpolate(f, [250, 278], [15, 0], { clamp: true, easing: easeInOut });
    cta19.style.opacity   = ctaOp.toFixed(3);
    cta19.style.transform = `translateY(${ctaY.toFixed(2)}px)`;
  }

  // ── Vignette deepens on hold (frames 290-330) ─────────────────────────────
  const vig19 = document.getElementById('t19-vignette');
  if (vig19) {
    vig19.style.opacity = interpolate(f, [290, 320], [0, 0.55], { clamp: true, easing: easeInOut }).toFixed(3);
  }

  // ── Hold particles drift upward (frames 290+) ────────────────────────────
  if (f >= 290) {
    T19_HOLD_PARTICLES.forEach((p, i) => {
      const dot = document.getElementById(`t19-hp-${i}`);
      if (!dot) return;
      const af = f - 290;
      const x = p.x + p.vx * af + Math.sin(af * 0.05 + p.phase) * 0.7;
      const y = p.y + p.vy * af;
      const gone = y < -2;
      const fadeIn = clamp(af / 12, 0, 1);
      dot.style.left    = `${x.toFixed(2)}%`;
      dot.style.top     = `${y.toFixed(2)}%`;
      dot.style.opacity = gone ? '0' : (fadeIn * 0.65).toFixed(3);
    });
  }
}

// ── Template 20: The Passage of Time ─────────────────────────────────────────
// Sun arcs across sky, photo ages to ruin, restoration light reverses everything.
// Emotional arc: had it → lost it → got it back.  300 frames / 10s.

// Pre-computed seeded data — computed once at load time, never in render loop
const T20_STARS = (() => {
  const rng = seededRand(2042);
  return Array.from({ length: 7 }, () => ({
    x: 10 + rng() * 220,         // px across canvas
    y: 15 + rng() * 140,          // px — top 30% sky area
    size: 1.5 + rng() * 1.5,
    baseOp: 0.2 + rng() * 0.25,
    phase: rng() * Math.PI * 2,
  }));
})();

const T20_HOLD_PARTICLES = (() => {
  const rng = seededRand(2099);
  return Array.from({ length: 14 }, () => ({
    x: 5 + rng() * 90,
    y: 20 + rng() * 70,
    size: 1.5 + rng() * 2,
    vx: (rng() - 0.5) * 0.06,
    vy: -0.04 - rng() * 0.06,
    phase: rng() * Math.PI * 2,
    color: ['rgba(197,160,89,0.55)','rgba(212,168,75,0.5)','rgba(245,220,160,0.35)'][Math.floor(rng() * 3)],
  }));
})();

// 8 clock tick marks positioned along the arc
// arcX = interpolate(p,[0,1],[20,240]); arcY = 200 - sin(p*PI)*160
const T20_TICKS = Array.from({ length: 8 }, (_, i) => {
  const p = (i + 0.5) / 8;
  const ax = 20 + p * 220;
  const ay = 200 - Math.sin(p * Math.PI) * 160;
  return { p, x: ax, y: ay };
});

function renderTemplate20(f) {
  const AMBER = '#C5A059';

  // ── Helper: compute sun arc position ────────────────────────────────────────
  // arcProgress 0 = bottom-left, 1 = bottom-right. Sun travels semi-circle.
  // At frame 0 → arcProgress ~0.05 (not exactly at edge, already rising slightly)
  // At frame 130 → arcProgress = 1 (sun reaches bottom-right, dims)
  const arcProgress = interpolate(f, [0, 130], [0.02, 1.0], { clamp: true });
  const sunX = 20 + arcProgress * 220;          // px left-to-right
  const sunY = 200 - Math.sin(arcProgress * Math.PI) * 160; // semicircle peak ~40px

  // ── Sun element ─────────────────────────────────────────────────────────────
  const sun = document.getElementById('t20-sun');
  if (sun) {
    sun.style.left = sunX.toFixed(1) + 'px';
    sun.style.top  = sunY.toFixed(1) + 'px';

    // Color/glow shifts: gold → dim gray as sun sets
    // f=0..65: fully golden; f=65..130: dims to gray
    const sunFade = interpolate(f, [65, 130], [0, 1], { clamp: true, easing: easeInOut });
    const sunOp   = interpolate(sunFade, [0, 1], [1.0, 0.1]);
    const glowR   = interpolate(sunFade, [0, 1], [30, 0]);
    const glowAlpha = interpolate(sunFade, [0, 1], [0.6, 0]);

    // Dawn: warm gold; dusk fades to orange; night: gray
    // Piecewise: sunFade 0→0.5 = gold→orange, 0.5→1 = orange→gray
    const sf1 = Math.min(1, sunFade * 2);          // 0→1 for first half
    const sf2 = Math.max(0, sunFade * 2 - 1);      // 0→1 for second half
    const rVal = Math.round(255 + sf2 * (100 - 255));
    const gVal = Math.round(interpolate(sf1, [0, 1], [215, 120]) + sf2 * (100 - 120));
    const bVal = Math.round(sf2 * 100);

    sun.style.opacity   = sunOp.toFixed(3);
    sun.style.boxShadow = `0 0 ${glowR.toFixed(1)}px rgba(${rVal},${gVal},${bVal},${glowAlpha.toFixed(3)})`;
    sun.style.background= `radial-gradient(circle,rgba(${rVal+40},${gVal+20},${Math.max(0,bVal-10)},1) 0%,rgba(${rVal},${gVal},${bVal},1) 50%,rgba(${Math.max(0,rVal-60)},${Math.max(0,gVal-80)},${bVal},1) 100%)`;
  }

  // ── Sky gradient ─────────────────────────────────────────────────────────────
  // Act 1 (0-40): dawn amber at horizon, deep blue at top
  // Act 2 (40-90): dusk purple-gray replacing warm tones
  // Act 3 (90-130): full night navy-to-black
  // Act 4-5 (130-180): sky warms back toward amber at bottom
  // Act 6 (180-300): fully warm again
  const sky = document.getElementById('t20-sky');
  if (sky) {
    const nightP  = interpolate(f, [65, 130], [0, 1], { clamp: true, easing: easeInOut });
    const restoreP= interpolate(f, [155, 185], [0, 1], { clamp: true, easing: easeInOut });

    // Top color: deep blue → near-black → back to deep blue
    const topR = Math.round(interpolate(nightP, [0, 1], [26, 10]) + restoreP * 16);
    const topG = Math.round(interpolate(nightP, [0, 1], [26, 10]) + restoreP * 16);
    const topB = Math.round(interpolate(nightP, [0, 1], [58, 26]) + restoreP * 32);

    // Bottom (horizon) color: amber → purple-gray → black → amber
    const duskP = interpolate(f, [40, 90], [0, 1], { clamp: true, easing: easeInOut });
    const bR = Math.round(
      interpolate(duskP, [0, 1], [197, 58]) * (1 - nightP) +
      interpolate(restoreP, [0, 1], [20, 140]) * nightP
    );
    const bG = Math.round(
      interpolate(duskP, [0, 1], [160, 42]) * (1 - nightP) +
      interpolate(restoreP, [0, 1], [10, 90]) * nightP
    );
    const bB = Math.round(
      interpolate(duskP, [0, 1], [89, 74]) * (1 - nightP) +
      interpolate(restoreP, [0, 1], [10, 40]) * nightP
    );

    sky.style.background = `linear-gradient(180deg,rgb(${topR},${topG},${topB}) 0%,rgb(${bR},${bG},${bB}) 100%)`;
  }

  // ── Clock tick marks ─────────────────────────────────────────────────────────
  // Fade in gradually (frames 5-60), change from amber → gray when sun passes
  T20_TICKS.forEach((tick, i) => {
    const tickEl = document.getElementById(`t20-tick-${i}`);
    if (!tickEl) return;
    const fadeIn  = interpolate(f, [5 + i * 5, 30 + i * 3], [0, 0.3], { clamp: true, easing: easeInOut });
    const passed  = arcProgress > tick.p;
    const nightFade = interpolate(f, [90, 130], [1, 0], { clamp: true, easing: easeInOut });
    tickEl.style.opacity   = (fadeIn * nightFade).toFixed(3);
    tickEl.style.background= passed ? '#888' : AMBER;
  });

  // ── Stars ────────────────────────────────────────────────────────────────────
  // Fade in frames 95-110, fade out frames 170-185
  T20_STARS.forEach((s, i) => {
    const starEl = document.getElementById(`t20-star-${i}`);
    if (!starEl) return;
    const fadeIn  = interpolate(f, [95 + i * 2, 110 + i * 2], [0, s.baseOp], { clamp: true, easing: easeInOut });
    const fadeOut = interpolate(f, [170, 185], [1, 0], { clamp: true, easing: easeInOut });
    const twinkle = 1 + 0.15 * Math.sin(f * 0.12 + s.phase);
    starEl.style.opacity = (fadeIn * fadeOut * twinkle).toFixed(3);
  });

  // ── Photo degraded layer (acts 1-4) ─────────────────────────────────────────
  // Photo fades in at dawn (frames 5-25), then ages from frame 65
  const photoDeg = document.getElementById('t20-photo-degraded');
  const photoImgDeg = document.getElementById('t20-photo-img-degraded');
  if (photoDeg) {
    // Fade in on dawn, then fade out as restoration spreads
    const fadeIn        = interpolate(f, [5, 25], [0, 1], { clamp: true, easing: easeInOut });
    const restoreReveal = interpolate(f, [140, 175], [0, 1], { clamp: true, easing: easeInOut });
    // After fade-in completes, opacity is 1 until restoration kicks in
    const wrapOp = f < 25
      ? fadeIn
      : Math.max(0, 1 - restoreReveal * 0.92);
    photoDeg.style.opacity = wrapOp.toFixed(3);

    // Border: warm amber → gray as night falls, disappears at restoration
    const borderFade  = interpolate(f, [65, 130], [0, 1], { clamp: true, easing: easeInOut });
    const borderOp    = interpolate(borderFade, [0, 1], [0.3, 0.05]);
    const restoreHide = interpolate(f, [140, 165], [1, 0], { clamp: true, easing: easeInOut });
    photoDeg.style.borderColor = `rgba(${Math.round(197*(1-borderFade)+100*borderFade)},${Math.round(160*(1-borderFade)+100*borderFade)},${Math.round(89*(1-borderFade)+100*borderFade)},${(borderOp*restoreHide).toFixed(3)})`;
  }

  if (photoImgDeg) {
    // Aging: starts at frame 65 (midpoint of day), fully degraded by frame 130
    const ageP       = interpolate(f, [65, 130], [0, 1], { clamp: true, easing: easeInOut });
    const sepia      = interpolate(ageP, [0, 1], [0, 0.8]);
    const grayscale  = interpolate(ageP, [0, 1], [0, 0.5]);
    const brightness = interpolate(ageP, [0, 1], [1.0, 0.5]);
    const contrast   = interpolate(ageP, [0, 1], [1.0, 0.8]);
    photoImgDeg.style.filter = `sepia(${sepia.toFixed(3)}) grayscale(${grayscale.toFixed(3)}) brightness(${brightness.toFixed(3)}) contrast(${contrast.toFixed(3)})`;
  }

  // ── Grain overlay on degraded photo ─────────────────────────────────────────
  // Fades in frames 65-130 (max 0.6), fades out frames 130-175
  const grain = document.getElementById('t20-grain');
  if (grain) {
    const grainIn  = interpolate(f, [65, 130], [0, 0.6], { clamp: true, easing: easeInOut });
    const grainOut = interpolate(f, [130, 175], [0, 1],   { clamp: true, easing: easeInOut });
    grain.style.opacity = Math.max(0, grainIn * (1 - grainOut)).toFixed(3);
  }

  // ── Restoration dot (frames 130-150) ────────────────────────────────────────
  const dot = document.getElementById('t20-restore-dot');
  if (dot) {
    const dotIn  = interpolate(f, [130, 140], [0, 1], { clamp: true, easing: easeInOut });
    const dotOut = interpolate(f, [145, 160], [0, 1], { clamp: true, easing: easeInOut });
    const pulse  = 1 + 0.3 * Math.sin(Math.max(0, f - 130) * 0.5);
    const scale  = dotIn * (1 - dotOut) * pulse;
    dot.style.opacity   = Math.min(dotIn, 1 - dotOut).toFixed(3);
    dot.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(3)})`;
  }

  // ── Restoration glow radial (frames 135-165) ─────────────────────────────────
  const restGlow      = document.getElementById('t20-restore-glow');
  const restGlowInner = document.getElementById('t20-restore-glow-inner');
  if (restGlow && restGlowInner) {
    const glowIn  = interpolate(f, [135, 165], [0, 1], { clamp: true, easing: easeInOut });
    const glowOut = interpolate(f, [165, 185], [0, 1], { clamp: true, easing: easeInOut });
    restGlow.style.opacity          = Math.max(0, glowIn - glowOut * 0.8).toFixed(3);
    restGlowInner.style.transform   = `scale(${interpolate(glowIn, [0, 1], [0, 3]).toFixed(3)})`;
  }

  // ── Restored photo (clip-path circle expands frames 140-175) ────────────────
  const photoRestored = document.getElementById('t20-photo-restored');
  if (photoRestored) {
    const circleP   = interpolate(f, [140, 175], [0, 1], { clamp: true, easing: easeInOut });
    const circlePct = interpolate(circleP, [0, 1], [0, 150]);
    photoRestored.style.clipPath = `circle(${circlePct.toFixed(1)}% at 50% 50%)`;

    // Border warms up as restoration spreads
    const borderOp = interpolate(f, [155, 180], [0, 0.5], { clamp: true, easing: easeInOut });
    photoRestored.style.borderColor = `rgba(197,160,89,${borderOp.toFixed(3)})`;
  }

  // ── Photo border glow (frames 160-300) ───────────────────────────────────────
  const borderGlow = document.getElementById('t20-photo-border-glow');
  if (borderGlow) {
    const glowP = interpolate(f, [160, 185], [0, 1], { clamp: true, easing: easeInOut });
    // Pulse on hold
    const pulse = f >= 250 ? 1 + 0.15 * Math.sin((f - 250) * 0.08) : 1;
    const spread = interpolate(glowP * pulse, [0, 1], [0, 8]);
    const alpha  = interpolate(glowP * pulse, [0, 1], [0, 0.35]);
    borderGlow.style.boxShadow = `0 0 ${spread.toFixed(1)}px rgba(197,160,89,${alpha.toFixed(3)})`;
  }

  // ── Tagline "Time fades, memories shouldn't" (frames 100-125, fades out 125-140) ──
  const tagline20 = document.getElementById('t20-tagline');
  if (tagline20) {
    const tagIn = interpolate(f, [100, 115], [0, 1], { clamp: true, easing: easeInOut });
    const tagOut = interpolate(f, [128, 140], [1, 0], { clamp: true, easing: easeInOut });
    tagline20.style.opacity = (tagIn * tagOut).toFixed(3);
  }

  // ── Logo (replaces tagline, frames 142-160, same position) ──────────────────
  const logo20 = document.getElementById('t20-logo');
  if (logo20) {
    logo20.style.opacity = interpolate(f, [142, 160], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
  }

  // ── Headline words (frames 185-215, stagger per word) ────────────────────────
  C.headline.split(' ').forEach((_, i) => {
    const wordEl = document.getElementById(`t20-word-${i}`);
    if (!wordEl) return;
    const startW = 185 + i * 8;
    wordEl.style.opacity = interpolate(f, [startW, startW + 14], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
  });

  // ── Badge (frames 210-230) ────────────────────────────────────────────────────
  const badge20 = document.getElementById('t20-badge');
  if (badge20) {
    badge20.style.opacity = interpolate(f, [210, 228], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
  }

  // ── Support text (frames 220-240) ─────────────────────────────────────────────
  const sup20 = document.getElementById('t20-support');
  if (sup20) {
    sup20.style.opacity = interpolate(f, [220, 240], [0, 1], { clamp: true, easing: easeInOut }).toFixed(3);
  }

  // ── CTA (frames 235-252, gentle rise) ────────────────────────────────────────
  const cta20 = document.getElementById('t20-cta');
  if (cta20) {
    const ctaOp = interpolate(f, [235, 252], [0, 1], { clamp: true, easing: easeInOut });
    const ctaY  = interpolate(f, [235, 255], [10, 0], { clamp: true, easing: easeInOut });
    cta20.style.opacity   = ctaOp.toFixed(3);
    cta20.style.transform = `translateY(${ctaY.toFixed(2)}px)`;
  }

  // ── Hold: warm particles drift upward (frames 250+) ──────────────────────────
  if (f >= 250) {
    T20_HOLD_PARTICLES.forEach((p, i) => {
      const hpEl = document.getElementById(`t20-hp-${i}`);
      if (!hpEl) return;
      const af   = f - 250;
      const x    = p.x + p.vx * af + Math.sin(af * 0.05 + p.phase) * 0.8;
      const y    = p.y + p.vy * af;
      const gone = y < -2;
      const fadeIn = clamp(af / 14, 0, 1);
      hpEl.style.left    = `${x.toFixed(2)}%`;
      hpEl.style.top     = `${y.toFixed(2)}%`;
      hpEl.style.opacity = gone ? '0' : (fadeIn * 0.7).toFixed(3);
    });
  }

  // ── Vignette deepens gently on hold (frames 250-300) ─────────────────────────
  const vig20 = document.getElementById('t20-vignette');
  if (vig20) {
    vig20.style.opacity = interpolate(f, [250, 285], [0, 0.5], { clamp: true, easing: easeInOut }).toFixed(3);
  }
}


// ─── POSTMESSAGE API (for iframe embedding in editor) ────────────────────────

const isEmbedded = window.parent !== window;

window.addEventListener('message', (e) => {
  const msg = e.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'switchTemplate') {
    const id = msg.templateId;
    if (id >= 1 && id <= 20) {
      document.querySelectorAll('.tmpl-tab').forEach(t => t.classList.remove('active'));
      const btn = document.querySelector(`.tmpl-tab[data-tmpl="${id}"]`);
      if (btn) btn.classList.add('active');
      currentTemplate = id;
      updateSidebar(id);
      pause();
      frame = 0;
      buildTemplate(id);
      applyLogoVisibility();
      setFrame(0);
      play();
    }
  }

  if (msg.type === 'updateLayout') {
    // Disabled — layout overrides were breaking template positioning.
    // Layout values are captured in the JSON export instead.
    return;
    const L = msg.layout || {};
    const canvas = document.getElementById('canvas');
    if (!canvas) return;
    const cw = canvas.clientWidth || 260;
    const ch = canvas.clientHeight || 564;

    // Apply position overrides to elements
    const applyPos = (el, pos) => {
      if (!el || !pos) return;
      if (pos.x !== undefined) {
        el.style.left = (pos.x / 100 * cw) + 'px';
        el.style.transform = el.style.transform.replace(/translateX\([^)]*\)/g, '') || '';
      }
      if (pos.y !== undefined) {
        el.style.top = (pos.y / 100 * ch) + 'px';
      }
      if (pos.scale !== undefined) {
        const s = pos.scale / 100;
        const existing = el.style.transform.replace(/scale\([^)]*\)/g, '');
        el.style.transform = existing + ` scale(${s})`;
      }
    };

    // Templates 1-5 JS refs
    if (L.logo) {
      applyPos(t1Els.logo, L.logo);
      applyPos(t2Els.logo, L.logo);
      // T3 logo uses full-width flex centering — only apply Y override
      if (t3Els.logo && L.logo.y !== undefined) {
        t3Els.logo.style.top = (L.logo.y / 100 * ch) + 'px';
      }
      if (t4Els.masthead) applyPos(t4Els.masthead, L.logo);
    }
    if (L.badge) {
      applyPos(t1Els.badge, L.badge);
      applyPos(t2Els.badge, L.badge);
      applyPos(t3Els.badge, L.badge);
      if (t4Els.badgeSticker) applyPos(t4Els.badgeSticker, L.badge);
    }
    if (L.photo) {
      applyPos(t1Els.polaroidWrap, L.photo);
      if (t2Els.photoContainer) applyPos(t2Els.photoContainer, L.photo);
      applyPos(t3Els.photo, L.photo);
      applyPos(t4Els.photo, L.photo);
    }
    if (L.headline) {
      applyPos(t1Els.headlineWrap, L.headline);
      if (t2Els.headline) applyPos(t2Els.headline, L.headline);
      if (t3Els.wordContainer) applyPos(t3Els.wordContainer, L.headline);
      if (t4Els.headline) applyPos(t4Els.headline, L.headline);
    }
    if (L.support) {
      applyPos(t1Els.support, L.support);
      applyPos(t2Els.support, L.support);
      if (t3Els.supportContainer) applyPos(t3Els.supportContainer, L.support);
    }
    if (L.cta) {
      applyPos(t1Els.cta, L.cta);
      applyPos(t2Els.cta, L.cta);
      applyPos(t3Els.cta, L.cta);
      applyPos(t4Els.cta, L.cta);
    }

    // Templates 6-10 ID-based
    const idMap = {
      logo: ['t6-logo','t6-logo-bottom','t7-logo-strip','t8-logo','t8-logo-bottom','t9-logo','t9-logo-bottom'],
      badge: ['t6-badge','t7-badge-strip','t8-badge','t9-badge-wrap'],
      photo: ['t6-photo-small','t8-photo','t9-photo-wrap'],
      headline: ['t6-headline','t8-headline','t9-headline-wrap'],
      support: ['t6-support','t8-support','t9-support-wrap'],
      cta: ['t6-cta-wrap','t8-cta','t9-cta-wrap']
    };
    for (const [key, ids] of Object.entries(idMap)) {
      if (L[key]) {
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) applyPos(el, L[key]);
        });
      }
    }
  }

  if (msg.type === 'updateStyle') {
    // Disabled — style overrides were breaking template layouts.
    // Style values are captured in the JSON export instead.
    return;
    if (!canvas) return;

    // Headline font size & weight & transform
    canvas.querySelectorAll('[id*=headline], [id*=hl-], [id*=Headline]').forEach(el => {
      if (s.headlineFontSize) el.style.fontSize = s.headlineFontSize + 'px';
      if (s.headlineFontWeight) el.style.fontWeight = s.headlineFontWeight;
      if (s.headlineTextTransform) el.style.textTransform = s.headlineTextTransform;
    });
    // Also target word elements in templates that split words
    canvas.querySelectorAll('[id*=word], [id*=Word]').forEach(el => {
      if (s.headlineFontSize) el.style.fontSize = s.headlineFontSize + 'px';
      if (s.headlineFontWeight) el.style.fontWeight = s.headlineFontWeight;
    });

    // Support text
    canvas.querySelectorAll('[id*=support], [id*=Support]').forEach(el => {
      if (s.supportFontSize) el.style.fontSize = s.supportFontSize + 'px';
      if (s.supportFontWeight) el.style.fontWeight = s.supportFontWeight;
    });

    // CTA
    canvas.querySelectorAll('[id*=cta], [id*=Cta], [id*=CTA]').forEach(el => {
      if (s.ctaFontSize) el.style.fontSize = s.ctaFontSize + 'px';
      if (s.ctaFontWeight) el.style.fontWeight = s.ctaFontWeight;
      if (s.ctaRadius !== undefined) el.style.borderRadius = s.ctaRadius + 'px';
      if (s.ctaWidth) el.style.width = s.ctaWidth + '%';
      if (s.ctaHeight) el.style.height = s.ctaHeight + 'px';
    });

    // Badge
    canvas.querySelectorAll('[id*=badge], [id*=Badge]').forEach(el => {
      if (s.badgeFontSize) el.style.fontSize = s.badgeFontSize + 'px';
    });

    // For templates 1-5 using JS refs, apply directly
    if (t1Els.headlineWrap && s.headlineFontSize) t1Els.headlineWrap.style.fontSize = s.headlineFontSize + 'px';
    if (t1Els.support && s.supportFontSize) t1Els.support.style.fontSize = s.supportFontSize + 'px';
    if (t1Els.cta) {
      if (s.ctaFontSize) t1Els.cta.style.fontSize = s.ctaFontSize + 'px';
      if (s.ctaRadius !== undefined) t1Els.cta.style.borderRadius = s.ctaRadius + 'px';
    }
    if (t1Els.badge && s.badgeFontSize) t1Els.badge.style.fontSize = s.badgeFontSize + 'px';

    if (t2Els.headline && s.headlineFontSize) t2Els.headline.style.fontSize = s.headlineFontSize + 'px';
    if (t2Els.support && s.supportFontSize) t2Els.support.style.fontSize = s.supportFontSize + 'px';
    if (t2Els.cta) {
      if (s.ctaFontSize) t2Els.cta.style.fontSize = s.ctaFontSize + 'px';
      if (s.ctaRadius !== undefined) t2Els.cta.style.borderRadius = s.ctaRadius + 'px';
    }

    if (t3Els.wordContainer && s.headlineFontSize) {
      t3Els.wordEls?.forEach(w => { w.style.fontSize = s.headlineFontSize + 'px'; });
    }
    if (t3Els.cta) {
      if (s.ctaFontSize) t3Els.cta.style.fontSize = s.ctaFontSize + 'px';
      if (s.ctaRadius !== undefined) t3Els.cta.style.borderRadius = s.ctaRadius + 'px';
    }

    // Photo height (value is % of canvas height; canvas is ~564px tall)
    if (s.photoHeight !== undefined) {
      const h = (s.photoHeight / 100 * 564) + 'px';
      // ID-based query for templates 6-10
      canvas.querySelectorAll('[id*=photo], [id*=Photo]').forEach(el => {
        el.style.height = h;
      });
      // JS-ref approach for templates 1-5
      if (t2Els.photoContainer) t2Els.photoContainer.style.height = h;
      if (t3Els.photo) t3Els.photo.style.height = h;
      if (t4Els.photo) t4Els.photo.style.height = h;
      // t1 polaroid: scale proportionally via width to preserve aspect ratio
      if (t1Els.polaroidWrap) t1Els.polaroidWrap.style.height = h;
    }

    // Logo size (value in px)
    if (s.logoSize !== undefined) {
      // ID-based query for templates 6-10
      canvas.querySelectorAll('[id*=logo], [id*=Logo]').forEach(el => {
        const img = el.querySelector('img');
        if (img) {
          img.style.maxHeight = s.logoSize + 'px';
          img.style.maxWidth = s.logoSize + 'px';
        }
      });
      // JS-ref approach for templates 1-5
      [t1Els.logo, t2Els.logo, t3Els.logo].forEach(el => {
        if (el) {
          const img = el.querySelector('img');
          if (img) {
            img.style.maxHeight = s.logoSize + 'px';
            img.style.maxWidth = s.logoSize + 'px';
          }
          el.style.width = s.logoSize + 'px';
        }
      });
    }

    // Content padding (value in px)
    if (s.contentPadding !== undefined) {
      canvas.querySelectorAll('[id*=content], [id*=Content]').forEach(el => {
        el.style.padding = s.contentPadding + 'px';
      });
    }

    // Element gap (value in px)
    if (s.elementGap !== undefined) {
      canvas.querySelectorAll('[id*=content], [id*=Content], [id*=wrap], [id*=Wrap], [id*=container], [id*=Container]').forEach(el => {
        const display = window.getComputedStyle(el).display;
        if (display === 'flex' || display === 'grid') {
          el.style.gap = s.elementGap + 'px';
        }
      });
    }
  }

  if (msg.type === 'updateData') {
    // Update the global data from editor state
    if (msg.copy) Object.assign(AD.copy, msg.copy);
    if (msg.designTokens) Object.assign(AD.designTokens, msg.designTokens);
    if (msg.assets) Object.assign(AD.assets, msg.assets);
    if (msg.brandContext) Object.assign(AD.brandContext, msg.brandContext);
    // Update shortcut refs
    Object.assign(T, AD.designTokens);
    Object.assign(C, AD.copy);
    Object.assign(B, AD.brandContext);
    // Update data and rebuild — but preserve current frame position (no restart)
    const wasPlaying = isPlaying;
    const currentF = frame;
    pause();
    buildTemplate(currentTemplate);
    applyLogoVisibility();
    setFrame(currentF);  // resume at same frame, don't restart
    if (wasPlaying) play();
  }

  if (msg.type === 'toggleLogo') {
    showLogo = msg.show;
    applyLogoVisibility();
  }

  if (msg.type === 'toggleBrandName') {
    useBrandName = msg.show;
    // Rebuild current template to regenerate logos
    const wasPlaying = isPlaying;
    pause();
    buildTemplate(currentTemplate);
    applyLogoVisibility();
    setFrame(0);
    if (wasPlaying) play();
  }

  if (msg.type === 'play') play();
  if (msg.type === 'pause') pause();
  if (msg.type === 'restart') restart();
  if (msg.type === 'setFrame') setFrame(msg.frame || 0);
});

function applyLogoVisibility() {
    const logoIds = ['t1-logo','t2-logo','t3-logo','t4-masthead','t5-logoContainer',
                     't6-logo','t6-wm','t6-logo-bottom','t7-logo-strip',
                     't8-logo','t8-logo-bottom','t8-logo-ghost1','t8-logo-ghost2','t8-logo-ghost3',
                     't9-logo','t9-logo-bottom','t10-logo-area',
                     't11-logo','t12-logo','t12-ornline','t13-logo','t14-logo',
                     't15-logo','t16-logo','t17-logo','t18-logo','t19-logo','t20-logo'];
    const show = showLogo;
    logoIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = show ? '' : 'none';
    });
    // For templates 1-5 which use JS refs
    if (typeof t1Els !== 'undefined' && t1Els.logo) t1Els.logo.style.display = show ? '' : 'none';
    if (typeof t1Els !== 'undefined' && t1Els.logoShadow) t1Els.logoShadow.style.display = show ? '' : 'none';
    if (typeof t2Els !== 'undefined' && t2Els.logo) t2Els.logo.style.display = show ? '' : 'none';
    if (typeof t3Els !== 'undefined' && t3Els.logo) t3Els.logo.style.display = show ? '' : 'none';
    if (typeof t4Els !== 'undefined' && t4Els.masthead) t4Els.masthead.style.display = show ? '' : 'none';
    if (typeof t4Els !== 'undefined' && t4Els.bottomLogo) t4Els.bottomLogo.style.display = show ? '' : 'none';
    if (typeof t5Els !== 'undefined' && t5Els.logoContainer) t5Els.logoContainer.style.display = show ? '' : 'none';
}

// If embedded, hide header/sidebar — keep stage and controls visible
if (isEmbedded) {
  const header = document.getElementById('header');
  const sidebar = document.getElementById('sidebar');
  if (header) header.style.display = 'none';
  if (sidebar) sidebar.style.display = 'none';
  // Make main fill viewport without sidebar
  const main = document.getElementById('main');
  if (main) main.style.display = 'block';
  // Tell parent we're ready
  window.parent.postMessage({ type: 'templateReady' }, '*');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

buildTemplate(1);
updateSidebar(1);
setFrame(0);
play();
</script>
