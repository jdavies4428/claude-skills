<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remotion Ad Studio — Template Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a1a;
    --panel: #111127;
    --panel-alt: #0d0d20;
    --border: #1e1e3a;
    --accent: #7c3aed;
    --accent-bright: #a855f7;
    --text: #e8e8f0;
    --text-muted: #6666aa;
    --text-dim: #3a3a66;
    --radius: 8px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ─── Header ─────────────────────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 52px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 20;
  }

  #header .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  #header .logo span { color: var(--accent-bright); }

  .template-tabs {
    display: flex;
    gap: 4px;
    margin-left: 8px;
    overflow-x: auto;
    flex: 1;
    min-width: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }
  .template-tabs::-webkit-scrollbar { height: 3px; }
  .template-tabs::-webkit-scrollbar-track { background: transparent; }
  .template-tabs::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  .tmpl-tab {
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .tmpl-tab:hover { border-color: var(--accent); color: var(--text); }
  .tmpl-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* ─── Main Layout ─────────────────────────────────────────── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Center Stage ────────────────────────────────────────── */
  #stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 0 0;
    overflow: hidden;
  }

  /* Phone frame */
  #phone-wrap {
    position: relative;
    flex-shrink: 0;
  }

  #phone-frame {
    position: relative;
    width: 260px;
    height: 564px;
    border-radius: 36px;
    background: #050510;
    box-shadow:
      0 0 0 2px #1a1a3a,
      0 0 0 4px #0a0a1a,
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    overflow: hidden;
  }

  /* Notch */
  #phone-frame::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 22px;
    background: #050510;
    border-radius: 0 0 12px 12px;
    z-index: 100;
    box-shadow: 0 0 0 1px #1a1a3a;
  }

  #canvas {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border-radius: 36px;
  }

  /* Controls */
  #controls {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 320px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .ctrl-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s ease;
    flex-shrink: 0;
  }
  .ctrl-btn:hover { border-color: var(--accent); background: rgba(124,58,237,0.15); }
  .ctrl-btn svg { width: 14px; height: 14px; fill: currentColor; }

  #timeline {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }
  #timeline-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright));
    border-radius: 3px;
    transition: width 0.016s linear;
  }

  #frame-counter {
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 54px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ─── Right Sidebar ───────────────────────────────────────── */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .template-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .template-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .template-desc {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-muted);
  }

  .features-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 2px;
  }

  .feature-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .feature-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent-bright);
    margin-top: 4px;
    flex-shrink: 0;
  }

  .packages-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }

  .pkg-tag {
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: var(--accent-bright);
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .duration-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* ─── Template canvas elements ────────────────────────────── */
  .tmpl-bg {
    position: absolute;
    inset: 0;
  }

  .tmpl-el {
    position: absolute;
    transform-origin: center center;
  }

  /* ─── Scrollbar ────────────────────────────────────────────── */
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

// interpolate: supports both (value, [in0,in1], [out0,out1]) and optional easing
function interpolate(value, inputRange, outputRange, opts = {}) {
  const [inMin, inMax] = inputRange;
  const [outMin, outMax] = outputRange;
  let t = (value - inMin) / (inMax - inMin);
  if (opts.clamp !== false) t = Math.max(0, Math.min(1, t));
  if (opts.easing) t = opts.easing(t);
  return outMin + t * (outMax - outMin);
}

// spring: returns 0→1 value (used directly by templates 6-10)
// Templates 1-5 wrap with interpolate() to get their from/to range
function spring(frame, { damping = 10, stiffness = 100, mass = 1, initialVelocity = 0 } = {}) {
  if (frame <= 0) return 0;
  const w0 = Math.sqrt(stiffness / mass);
  const zeta = damping / (2 * Math.sqrt(stiffness * mass));
  const t = frame / 30;
  if (zeta < 1) {
    const wd = w0 * Math.sqrt(1 - zeta * zeta);
    return 1 - Math.exp(-zeta * w0 * t) * (Math.cos(wd * t) + (zeta * w0 / wd) * Math.sin(wd * t));
  } else {
    return 1 - Math.exp(-w0 * t) * (1 + w0 * t);
  }
}

function easeOut(t) { return 1 - Math.pow(1 - Math.max(0,Math.min(1,t)), 3); }
function easeInOut(t) { t = Math.max(0,Math.min(1,t)); return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

// Seeded pseudo-random (for glitch template consistency)
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}


// Additional helpers used by templates 6-10
function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }
function easeIn(t) { return t * t * t; }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}
function rgba(hex, a) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function lerpColor(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  const r = Math.round(a.r + (b.r - a.r) * t);
  const g = Math.round(a.g + (b.g - a.g) * t);
  const bv = Math.round(a.b + (b.b - a.b) * t);
  return `rgb(${r},${g},${bv})`;
}

// ─── STATE ────────────────────────────────────────────────────────────────────

let currentTemplate = 1;
let frame = 0;
let showLogo = true;
let useBrandName = false;
let isPlaying = false;
let rafId = null;
let lastTime = null;
let frameRemainder = 0;
const FPS = 30;

// ─── DOM REFS ─────────────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const timelineFill = document.getElementById('timeline-fill');
const frameCounter = document.getElementById('frame-counter');
const iconPlay = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');

// ─── PLAYBACK ─────────────────────────────────────────────────────────────────

function getTotalFrames() {
  const t = TEMPLATES[currentTemplate];
  return t.totalFrames || t.duration || 240;
}

function setFrame(f) {
  const total = getTotalFrames();
  frame = Math.max(0, Math.min(total, f));
  renderTemplate(currentTemplate, frame);
  const pct = (frame / total) * 100;
  timelineFill.style.width = pct + '%';
  frameCounter.textContent = frame + ' / ' + total;
}

function tick(ts) {
  if (!isPlaying) return;
  if (lastTime === null) lastTime = ts;
  const dt = ts - lastTime;
  lastTime = ts;
  frameRemainder += dt * (FPS / 1000);
  const steps = Math.floor(frameRemainder);
  frameRemainder -= steps;
  const total = getTotalFrames();
  let newFrame = frame + steps;
  if (newFrame >= total) newFrame = 0;
  setFrame(newFrame);
  rafId = requestAnimationFrame(tick);
}

function play() {
  isPlaying = true;
  lastTime = null;
  iconPlay.style.display = 'none';
  iconPause.style.display = '';
  rafId = requestAnimationFrame(tick);
}

function pause() {
  isPlaying = false;
  if (rafId) cancelAnimationFrame(rafId);
  iconPlay.style.display = '';
  iconPause.style.display = 'none';
}

function restart() {
  pause();
  setFrame(0);
  play();
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (isPlaying) pause(); else play();
});
document.getElementById('btnRestart').addEventListener('click', restart);

document.getElementById('timeline').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  setFrame(Math.round(pct * getTotalFrames()));
});

// ─── TEMPLATE TABS ────────────────────────────────────────────────────────────

document.getElementById('templateTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tmpl-tab');
  if (!btn) return;
  const id = parseInt(btn.dataset.tmpl);
  document.querySelectorAll('.tmpl-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentTemplate = id;
  updateSidebar(id);
  pause();
  frame = 0;
  buildTemplate(id);
  setFrame(0);
  play();
});

function updateSidebar(id) {
  const info = TEMPLATES[id];
  document.getElementById('sidebarName').textContent = info.name;
  const subtitle = info.subtitle || '';
  document.getElementById('sidebarSubtitle').textContent = subtitle;
  const total = info.totalFrames || info.duration || 240;
  const fps = info.fps || 30;
  const secs = Math.round(total / fps);
  document.getElementById('sidebarDuration').innerHTML = `
    <svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
    ${secs}s · ${fps}fps · ${total} frames`;
  document.getElementById('sidebarDesc').textContent = info.desc;
  const features = info.features || [];
  const feats = document.getElementById('sidebarFeatures');
  feats.innerHTML = features.map(f =>
    `<div class="feature-item"><div class="feature-dot"></div><span>${f}</span></div>`
  ).join('');
  const packages = info.packages || [];
  const pkgs = document.getElementById('sidebarPackages');
  pkgs.innerHTML = packages.map(p => `<span class="pkg-tag">${p}</span>`).join('');
  frameCounter.textContent = '0 / ' + total;
}

// ─── TEMPLATE DOM BUILDERS ────────────────────────────────────────────────────
// Each template builds its DOM once, then renderTN() updates transforms/styles.

let t1Els = {};
let t2Els = {};
let t3Els = {};
let t4Els = {};
let t5Els = {};

function el(tag, styles = {}, text = '') {
  const e = document.createElement(tag);
  Object.assign(e.style, styles);
  if (text) e.textContent = text;
  return e;
}

function div(styles = {}, text = '') { return el('div', styles, text); }

function img(src, styles = {}) {
  const e = document.createElement('img');
  e.src = src;
  Object.assign(e.style, styles);
  e.onerror = () => { e.style.display = 'none'; };
  return e;
}

// Resolve asset URLs — prefer brandContext.brandAssetUrls (public), fall back to assets
function getLogoUrl() {
  if (useBrandName) return ''; // force text fallback when brand name toggle is on
  return AD.brandContext?.brandAssetUrls?.logoUrl || AD.assets?.logoUrl || '';
}
function getPhotoUrl() {
  return AD.brandContext?.brandAssetUrls?.imageUrls?.[0] || AD.assets?.afterPhotoUrl || '';
}
function getBeforePhotoUrl() {
  return AD.assets?.beforePhotoUrl || '';
}

// Create a logo element — image if URL exists, text fallback
function logoEl(styles = {}) {
  if (useBrandName) {
    return div({ fontWeight:'800', letterSpacing:'0.12em', color:T.badge_text, whiteSpace:'nowrap', ...styles }, B.brandName.toUpperCase());
  }
  const url = getLogoUrl();
  if (url) {
    return img(url, { maxWidth:'100%', maxHeight:'100%', objectFit:'contain', ...styles });
  }
  return div({ fontWeight:'800', letterSpacing:'0.12em', color:T.badge_text, whiteSpace:'nowrap', ...styles }, B.brandName.toUpperCase());
}

// Create a photo element — image if URL exists, gradient fallback
function photoEl(styles = {}) {
  const url = getPhotoUrl();
  if (url) {
    return img(url, { width:'100%', height:'100%', objectFit:'cover', ...styles });
  }
  return div({ width:'100%', height:'100%', background:`linear-gradient(135deg, ${T.gradient_from}, ${T.gradient_to}, ${T.primary})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', color:'rgba(255,255,255,0.4)', ...styles }, 'No photo');
}

function renderT1(f) {
  const { shutter, logo, logoShadow, polaroidWrap, ripple, badge, headlineWrap, cursor, support, cta } = t1Els;

  // Shutter pulse (frame 0-30)
  const shutterOp = interpolate(f, [0, 10], [0, 0.6]) - interpolate(f, [20, 30], [0, 0.6]);
  const shutterScale = 1.0 + 0.3 * Math.abs(Math.sin(f * 0.3));
  shutter.style.opacity = Math.max(0, shutterOp);
  shutter.style.transform = `translateX(-50%) scale(${shutterScale})`;

  // Logo drop (frame 15-45) with heavy bounce
  const logoProgress = Math.max(0, f - 15);
  const logoSpring = spring(logoProgress, { damping: 8, stiffness: 120, mass: 1.2 });
  const logoY = interpolate(logoSpring, [0, 1], [-80, 0]);
  const logoOp = interpolate(f, [15, 28], [0, 1], { clamp: true });
  logo.style.transform = `translateX(-50%) translateY(${logoY}px)`;
  logo.style.opacity = logoOp;

  // Logo shadow on landing
  const shadowOp = interpolate(logoSpring, [0.8, 1], [0, 0.8], { clamp: true });
  logoShadow.style.opacity = shadowOp;

  // Polaroid drop (frame 40-70) with bounce
  const polProgress = Math.max(0, f - 40);
  const polSpring = spring(polProgress, { damping: 8, stiffness: 100, mass: 1.5 });
  const polY = interpolate(polSpring, [0, 1], [-400, 0]);
  const polOp = interpolate(f, [40, 52], [0, 1], { clamp: true });
  polaroidWrap.style.transform = `translateX(-50%) translateY(${polY}px) rotate(-3deg)`;
  polaroidWrap.style.opacity = polOp;

  // Impact ripple (peaks when polaroid lands ~frame 68-82)
  const rippleProg = interpolate(f, [66, 84], [0, 1], { clamp: true });
  const rippleSize = interpolate(rippleProg, [0, 1], [0, 140]);
  const rippleOp = interpolate(rippleProg, [0, 0.3, 1], [0, 0.7, 0]);
  ripple.style.width = rippleSize + 'px';
  ripple.style.height = rippleSize + 'px';
  ripple.style.marginLeft = (-rippleSize/2) + 'px';
  ripple.style.marginTop = (-rippleSize/2) + 'px';
  ripple.style.opacity = rippleOp;

  // Badge slides in from left (frame 60-90) with snap spring
  const badgeProg = Math.max(0, f - 60);
  const badgeSpring = spring(badgeProg, { damping: 10, stiffness: 200, mass: 0.8 });
  const badgeX = interpolate(badgeSpring, [0, 1], [-100, 14]);
  badge.style.left = badgeX + 'px';

  // Headline typewriter (frame 80-140)
  const headline = C.headline;
  const highlightWords = C.highlight.toLowerCase().split(' ');
  const charStart = 80, charEnd = 140;
  const charsToShow = Math.floor(interpolate(f, [charStart, charEnd], [0, headline.length], { clamp: true }));
  const showCursor = f >= charStart && f < charEnd + 10;

  // Build headline with highlight spans
  let html = '';
  let i = 0;
  const words = headline.split(' ');
  let charCount = 0;
  words.forEach((word, wi) => {
    const wordStart = charCount;
    const wordEnd = charCount + word.length;
    const isHighlight = highlightWords.some(hw => word.toLowerCase().includes(hw));
    if (wordStart < charsToShow) {
      const visiblePart = word.slice(0, Math.max(0, charsToShow - wordStart));
      if (isHighlight && charsToShow >= wordEnd) {
        html += `<span style="background:${T.badge_bg};color:${T.badge_text};padding:1px 4px;border-radius:3px">${visiblePart}</span>`;
      } else {
        html += visiblePart;
      }
    }
    if (wi < words.length - 1) {
      if (charCount + word.length < charsToShow) html += ' ';
      charCount += word.length + 1;
    } else {
      charCount += word.length;
    }
  });

  if (showCursor) {
    const blinkOp = (Math.floor(f / 8) % 2 === 0) ? 1 : 0;
    html += `<span style="display:inline-block;width:2px;height:0.9em;background:${T.primary};margin-left:1px;vertical-align:middle;opacity:${blinkOp}"></span>`;
  }
  headlineWrap.innerHTML = html;

  // Support text fade in (frame 130-170)
  const supportOp = interpolate(f, [130, 170], [0, 1], { clamp: true });
  const supportY = interpolate(f, [130, 160], [8, 0], { clamp: true });
  support.style.opacity = supportOp;
  support.style.transform = `translateY(${supportY}px)`;

  // CTA spring up (frame 160-200)
  const ctaProg = Math.max(0, f - 160);
  const ctaSpring = spring(ctaProg, { damping: 12, stiffness: 150, mass: 1 });
  const ctaY = interpolate(ctaSpring, [0, 1], [80, 0]);
  const ctaOp = interpolate(f, [160, 175], [0, 1], { clamp: true });
  cta.style.transform = `translateX(-50%) translateY(${ctaY}px)`;
  cta.style.opacity = ctaOp;

  // Outro slow zoom out (frame 200-240)
  const outroScale = interpolate(f, [200, 240], [1, 0.95], { clamp: true });
  canvas.style.transform = `scale(${outroScale})`;
  canvas.style.transformOrigin = 'center center';
}

function renderT2(f) {
  const { logo, badge, afterPhoto, afterLabel, divider, headlineWrap, support, cta } = t2Els;

  // Logo fade in (0-30)
  const logoSpring = spring(Math.max(0, f), { damping: 12, stiffness: 100 });
  logo.style.opacity = interpolate(f, [0, 20], [0, 1], { clamp: true });
  const logoScale = interpolate(logoSpring, [0, 1], [0.8, 1]);
  logo.style.transform = `scale(${logoScale})`;

  // Badge pop (20-50)
  const badgeProg = Math.max(0, f - 20);
  const badgeSpring = spring(badgeProg, { damping: 10, stiffness: 250, mass: 0.7 });
  const badgeScale = interpolate(badgeSpring, [0, 1], [0, 1]);
  badge.style.transform = `scale(${badgeScale})`;

  // Slider sweep (60-150)
  const sliderPct = interpolate(f, [60, 150], [0, 100], { clamp: true });
  divider.style.left = sliderPct + '%';
  afterPhoto.style.clipPath = `inset(0 ${100 - sliderPct}% 0 0)`;

  // After label appears when slider passes 50%
  afterLabel.style.opacity = interpolate(f, [100, 120], [0, 1], { clamp: true });

  // Headline spring in (140-180)
  const hlProg = Math.max(0, f - 140);
  const hlSpring = spring(hlProg, { damping: 12, stiffness: 120 });
  const hlY = interpolate(hlSpring, [0, 1], [16, 0]);
  const hlOp = interpolate(f, [140, 160], [0, 1], { clamp: true });
  headlineWrap.style.transform = `translateY(${hlY}px)`;
  headlineWrap.style.opacity = hlOp;

  // Headline with highlight underline
  const highlightWords = C.highlight.toLowerCase().split(' ');
  const words = C.headline.split(' ');
  let html = '';
  words.forEach((word, wi) => {
    const isHl = highlightWords.some(hw => word.toLowerCase().includes(hw));
    if (isHl) {
      const underlinePct = interpolate(f, [165, 185], [0, 100], { clamp: true });
      html += `<span style="position:relative;display:inline-block">${word}<span style="position:absolute;bottom:-2px;left:0;height:2px;background:${T.primary};width:${underlinePct}%;border-radius:1px"></span></span>`;
    } else {
      html += word;
    }
    if (wi < words.length - 1) html += ' ';
  });
  headlineWrap.innerHTML = html;

  // Support fade (170-210)
  support.style.opacity = interpolate(f, [170, 210], [0, 1], { clamp: true });

  // CTA slide up (200-260)
  const ctaProg = Math.max(0, f - 200);
  const ctaSpring = spring(ctaProg, { damping: 14, stiffness: 120 });
  const ctaY = interpolate(ctaSpring, [0, 1], [60, 0]);
  cta.style.transform = `translateX(-50%) translateY(${ctaY}px)`;
  cta.style.opacity = interpolate(f, [200, 220], [0, 1], { clamp: true });

  // Logo pulse outro (260-300)
  const pulseProg = interpolate(f, [260, 280], [0, 1], { clamp: true }) - interpolate(f, [280, 300], [0, 0.3], { clamp: true });
  const logoGlow = pulseProg * 10;
  logo.style.textShadow = `0 0 ${logoGlow}px ${T.primary}`;
}

    }, word);

  // Logo — centered between headline and badge

function renderT3(f) {
  const { bg, wordEls, wordContainer, photo, badge, supportWordEls, cta, particles, logo } = t3Els;

  // Background hue pulse (0-20)
  const hueShift = Math.sin(f * 0.1) * 5;
  bg.style.filter = `hue-rotate(${hueShift}deg)`;

  // Words fly in (10-60, stagger 8 frames each)
  wordEls.forEach((wordEl, i) => {
    const wStart = 10 + i * 8;
    const wProg = Math.max(0, f - wStart);
    const wSpring = spring(wProg, { damping: 15, stiffness: 120, mass: 2 });
    const ox = parseFloat(wordEl.dataset.ox);
    const oy = parseFloat(wordEl.dataset.oy);
    const wx = interpolate(wSpring, [0, 1], [ox, 0]);
    const wy = interpolate(wSpring, [0, 1], [oy, 0]);
    const scale = interpolate(wSpring, [0, 1], [2, 1]);
    const op = interpolate(f, [wStart, wStart + 10], [0, 1], { clamp: true });
    wordEl.style.transform = `translate(${wx}px,${wy}px) scale(${scale})`;
    wordEl.style.opacity = op;
  });

  // Highlight word flash (50-70)
  wordEls.forEach((wordEl) => {
    if (wordEl.dataset.highlight === '1') {
      const flashProg = interpolate(f, [50, 60], [0, 1], { clamp: true });
      const flashScale = interpolate(f, [50, 58, 70], [1, 1.2, 1]);
      const glowAmt = flashProg * 12;
      wordEl.style.transform = wordEl.style.transform.replace(/scale\([^)]+\)/, `scale(${flashScale})`);
      wordEl.style.textShadow = `0 0 ${glowAmt}px ${T.primary}`;
    }
  });

  // Photo punches up (70-100)
  const photoProg = Math.max(0, f - 70);
  const photoSpring = spring(photoProg, { damping: 10, stiffness: 200, mass: 0.8 });
  const photoY = interpolate(photoSpring, [0, 1], [300, 0]);
  const photoScale = interpolate(photoSpring, [0, 1], [0.3, 1]);
  photo.style.transform = `translateY(${photoY}px) scale(${photoScale})`;
  photo.style.opacity = interpolate(f, [70, 82], [0, 1], { clamp: true });

  // Push headline up as photo enters
  const headlinePush = interpolate(f, [70, 100], [0, -20], { clamp: true });
  wordContainer.style.transform = `translateY(${headlinePush}px)`;

  // Badge rotates in (90-110)
  const badgeProg = Math.max(0, f - 90);
  const badgeSpring = spring(badgeProg, { damping: 12, stiffness: 150 });
  const badgeRot = interpolate(badgeSpring, [0, 1], [-180, 0]);
  const badgeOp = interpolate(f, [90, 102], [0, 1], { clamp: true });
  badge.style.transform = `translateX(-50%) rotate(${badgeRot}deg)`;
  badge.style.opacity = badgeOp;

  // Support words cascade in (110-150)
  supportWordEls.forEach((sw, i) => {
    const swStart = 110 + i * 4;
    const swProg = Math.max(0, f - swStart);
    const swSpring = spring(swProg, { damping: 12, stiffness: 200, mass: 0.7 });
    const swY = interpolate(swSpring, [0, 1], [12, 0]);
    sw.style.transform = `translateY(${swY}px)`;
    sw.style.opacity = interpolate(f, [swStart, swStart + 8], [0, 1], { clamp: true });
  });

  // CTA stamp (150-190)
  const ctaProg = Math.max(0, f - 150);
  const ctaSpring = spring(ctaProg, { damping: 8, stiffness: 300, mass: 0.5 });
  const ctaScale = interpolate(ctaSpring, [0, 1], [2, 1]);
  const ctaY2 = interpolate(ctaSpring, [0, 1], [-80, 0]);
  cta.style.transform = `translateX(-50%) translateY(${ctaY2}px) scale(${ctaScale})`;
  cta.style.opacity = interpolate(f, [150, 162], [0, 1], { clamp: true });

  // Particles burst (155-185)
  particles.forEach((p, i) => {
    const pProg = interpolate(f, [155, 185], [0, 1], { clamp: true });
    const angle = parseFloat(p.dataset.angle);
    const dist = pProg * 30;
    const px2 = Math.cos(angle) * dist;
    const py2 = Math.sin(angle) * dist;
    const pOp = interpolate(pProg, [0, 0.2, 1], [0, 1, 0]);
    p.style.transform = `translate(calc(-50% + ${px2}px), calc(-50% + ${py2}px))`;
    p.style.opacity = pOp;
  });

  // Logo fade (60-80) — appears centered between headline and photo
  const logoDrift = interpolate(f, [60, 80], [8, 0], { clamp: true });
  logo.style.opacity = interpolate(f, [60, 80], [0, 1], { clamp: true });
  logo.style.transform = `translateY(${logoDrift}px)`;

  // Floating oscillation (230-270)
  const floatY = f >= 230 ? Math.sin((f - 230) * 0.15) * 3 : 0;
  if (f >= 230) {
    canvas.style.transform = `translateY(${floatY}px)`;
  } else {
    canvas.style.transform = '';
  }
}

function renderT4(f) {
  const { bg, openLine, photo, overlay, masthead, colorBar, headline, badgeSticker, supportEls, cta, flash, vignette, bottomLogo } = t4Els;

  // Opening line draw (0-15)
  const lineWidth = interpolate(f, [0, 15], [0, 260], { clamp: true });
  openLine.style.width = lineWidth + 'px';
  openLine.style.marginLeft = (-lineWidth/2) + 'px';

  // Photo reveal from clip (0-35) — photo comes in first
  const revealPct = interpolate(f, [0, 35], [0, 100], { clamp: true });
  const topClip = Math.max(0, 50 - revealPct/2);
  const bottomClip = Math.max(0, 50 - revealPct/2);
  photo.style.clipPath = `inset(${topClip}% 0 ${bottomClip}% 0)`;
  // Overlay: darken 50-75, hold, lighten 220-230
  const overlayIn = interpolate(f, [50, 75], [0, 1], { clamp: true });
  const overlayOut = interpolate(f, [220, 230], [1, 0.15], { clamp: true });
  overlay.style.opacity = f < 220 ? overlayIn : overlayOut;

  // Ken Burns (190-260 and beyond)
  const kbScale = interpolate(f, [190, 260], [1.1, 1.15], { clamp: true });
  const kbX = interpolate(f, [190, 260], [0, 2], { clamp: true });
  photo.style.transform = `scale(${kbScale}) translateX(${kbX}px)`;

  // Masthead (55-75)
  const mastheadProg = Math.max(0, f - 55);
  const mastheadSpring = spring(mastheadProg, { damping: 14, stiffness: 100 });
  const mastheadY = interpolate(mastheadSpring, [0, 1], [-8, 0]);
  masthead.style.opacity = interpolate(f, [55, 75], [0, 1], { clamp: true });
  masthead.style.transform = `translateY(${mastheadY}px)`;

  // Color bar slides in (75-105)
  const barX = interpolate(f, [75, 105], [-100, 0], { clamp: true });
  colorBar.style.left = barX + '%';

  // Headline slides in from right (85-115)
  const hlProg = Math.max(0, f - 85);
  const hlSpring = spring(hlProg, { damping: 12, stiffness: 150 });
  const hlX = interpolate(hlSpring, [0, 1], [300, 0]);
  headline.style.transform = `translateX(${hlX}px)`;

  // Badge sticker pop (100-130)
  const badgeProg = Math.max(0, f - 100);
  const badgeSpring = spring(badgeProg, { damping: 10, stiffness: 250, mass: 0.7 });
  const badgeScale = interpolate(badgeSpring, [0, 1], [0, 1]);
  badgeSticker.style.transform = `rotate(-12deg) scale(${badgeScale})`;

  // Support text (120-160)
  supportEls.forEach((se, i) => {
    const seStart = 120 + i * 10;
    const seProg = Math.max(0, f - seStart);
    const seSpring = spring(seProg, { damping: 14, stiffness: 120 });
    const seY = interpolate(seSpring, [0, 1], [6, 0]);
    se.style.opacity = interpolate(f, [seStart, seStart + 10], [0, 1], { clamp: true });
    se.style.transform = `translateY(${seY}px)`;
  });

  // CTA slides in from right (150-185)
  const ctaProg = Math.max(0, f - 150);
  const ctaSpring = spring(ctaProg, { damping: 12, stiffness: 120 });
  const ctaX = interpolate(ctaSpring, [0, 1], [200, -14]);
  cta.style.right = 'auto';
  cta.style.left = 'auto';
  cta.style.transform = `translateX(${ctaX}px) translateX(100%)`;
  // Simpler: just animate right
  const ctaRight = interpolate(f, [150, 185], [-200, 14], { clamp: true });
  cta.style.right = ctaRight + 'px';
  cta.style.left = 'auto';
  cta.style.transform = '';

  // Arrow animate
  const arrowEl = document.getElementById('t4Arrow');
  if (arrowEl) {
    const arrowOp = interpolate(f, [180, 195], [0, 1], { clamp: true });
    const arrowX = interpolate(f, [180, 195], [-8, 0], { clamp: true });
    arrowEl.style.opacity = arrowOp;
    arrowEl.style.transform = `translateX(${arrowX}px)`;
  }

  // White flash (220-222)
  const flashOp = f >= 220 && f <= 222 ? interpolate(f, [220, 221, 222], [0, 0.8, 0]) : 0;
  flash.style.opacity = flashOp;

  // Vignette: skip — goes bright too fast for vignette to matter
  vignette.style.opacity = interpolate(f, [220, 230], [0, 0], { clamp: true });

}

// Glitch character set
const GLITCH_CHARS = '!@#$%^&*<>?/\\|[]{}0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function scrambleText(target, progress, frame) {
  // progress: 0 = all random, 1 = all correct
  const rand = seededRand(frame * 7 + 13);
  let result = '';
  for (let i = 0; i < target.length; i++) {
    if (target[i] === ' ') { result += ' '; continue; }
    const charProgress = Math.max(0, Math.min(1, (progress * target.length - i) / 3));
    if (charProgress >= 1) {
      result += target[i];
    } else if (charProgress > 0) {
      result += Math.random() < charProgress ? target[i] : GLITCH_CHARS[Math.floor(rand() * GLITCH_CHARS.length)];
    } else {
      result += GLITCH_CHARS[Math.floor(rand() * GLITCH_CHARS.length)];
    }
  }
  return result;
}

function renderT5(f) {
  const { noiseBlocks, logoContainer, logoRed, logoGreen, logoMain, strips, badgeFlash, badge, headlineEl, hlRgbRed, support, ctaBtn, pixelBlocks, glitchBurst } = t5Els;

  // Static noise (0-20)
  const noiseOp = interpolate(f, [0, 5, 18, 22], [0, 1, 0.8, 0], { clamp: true });
  const rand0 = seededRand(f * 31 + 7);
  noiseBlocks.forEach((nb) => {
    if (noiseOp > 0) {
      const r = rand0();
      nb.style.opacity = (r * noiseOp * 0.8).toString();
      const colors = [T.primary, T.gradient_to, T.badge_bg, T.badge_text, T.surface];
      nb.style.background = colors[Math.floor(r * colors.length)];
      nb.style.left = (rand0() * 260) + 'px';
    } else {
      nb.style.opacity = '0';
    }
  });

  // Logo glitch (15-45)
  const logoInRange = f >= 15 && f <= 45;
  const logoResolved = f > 45;
  if (logoResolved) {
    logoMain.style.opacity = '1';
    logoRed.style.opacity = '0';
    logoGreen.style.opacity = '0';
    logoContainer.style.opacity = '1';
    logoContainer.style.transform = 'translateX(-50%)';
  } else if (logoInRange) {
    const flickerSeed = seededRand(f * 17);
    const flicker = flickerSeed();
    const showLogo = flicker > 0.3;
    logoContainer.style.opacity = showLogo ? '1' : '0';
    // Slice offset glitch
    const sliceOffset = (flickerSeed() - 0.5) * 20;
    const rgbActive = flickerSeed() > 0.4;
    if (rgbActive) {
      logoRed.style.opacity = '0.5';
      logoGreen.style.opacity = '0.5';
      logoRed.style.transform = `translateX(calc(-50% + 2px)) translateX(0)`;
      logoGreen.style.transform = `translateX(calc(-50% - 2px)) translateX(0)`;
    } else {
      logoRed.style.opacity = '0';
      logoGreen.style.opacity = '0';
    }
    logoContainer.style.transform = `translateX(-50%) translateX(${sliceOffset}px)`;
  } else {
    logoContainer.style.opacity = '0';
  }

  // Scan lines sweep + photo strips (40-70)
  strips.forEach(({ el, fromLeft }, i) => {
    const stripStart = 40 + i * 2.5;
    const stripProg = interpolate(f, [stripStart, stripStart + 18], [0, 1], { clamp: true });
    const tx = fromLeft
      ? interpolate(stripProg, [0, 1], [-100, 0])
      : interpolate(stripProg, [0, 1], [100, 0]);
    el.style.transform = `translateX(${tx}%)`;
  });

  // Badge digital flash (65-95)
  const flashProg = interpolate(f, [65, 80], [0, 1], { clamp: true });
  if (f >= 65 && f <= 80) {
    const flashW = interpolate(flashProg, [0, 0.5, 1], [0, 120, 0]);
    badgeFlash.style.width = flashW + 'px';
    badgeFlash.style.opacity = interpolate(flashProg, [0, 0.3, 0.8, 1], [0, 0.9, 0.6, 0]);
  } else {
    badgeFlash.style.opacity = '0';
  }
  badge.style.opacity = interpolate(f, [78, 88], [0, 1], { clamp: true });

  // Headline scramble (85-130)
  if (f >= 85) {
    const scrambleProg = interpolate(f, [85, 130], [0, 1], { clamp: true });
    const scrambled = scrambleText(C.headline, scrambleProg, f);
    // Highlight word RGB split after resolved
    const hlWords = C.highlight.toLowerCase().split(' ');
    const words = scrambled.split(' ');
    const origWords = C.headline.split(' ');
    let html = '';
    words.forEach((word, wi) => {
      const isHl = hlWords.some(hw => origWords[wi] && origWords[wi].toLowerCase().includes(hw));
      if (isHl && scrambleProg >= 0.95) {
        const rgbIn = interpolate(f, [125, 135], [0, 1], { clamp: true });
        const rgbOut = interpolate(f, [185, 200], [1, 0], { clamp: true });
        const rgbSplit = f < 185 ? rgbIn : rgbOut;
        html += `<span style="position:relative;color:${T.primary};text-shadow:${rgbSplit*3}px 0 ${T.badge_bg}, ${-rgbSplit*3}px 0 ${T.gradient_to}">${word}</span>`;
      } else {
        html += word;
      }
      if (wi < words.length - 1) html += ' ';
    });
    headlineEl.innerHTML = html;
    headlineEl.style.opacity = '1';

    // Terminal cursor on headline
    if (f < 140) {
      const curBlink = (Math.floor(f / 6) % 2 === 0) ? 1 : 0;
      headlineEl.innerHTML += `<span style="color:${T.primary};opacity:${curBlink}">_</span>`;
    }
  } else {
    headlineEl.style.opacity = '0';
  }

  // Support terminal typing (120-150)
  if (f >= 120) {
    const typeProg = interpolate(f, [120, 155], [0, 1], { clamp: true });
    const charsToShow = Math.floor(typeProg * C.support.length);
    const curBlink = (Math.floor(f / 5) % 2 === 0) ? 1 : 0;
    const visText = C.support.slice(0, charsToShow);
    support.innerHTML = `<span style="color:${T.support_text};margin-right:4px">></span>${visText}<span style="opacity:${curBlink};color:${T.primary}">█</span>`;
    support.style.opacity = '1';
  } else {
    support.style.opacity = '0';
  }

  // CTA pixel assembly (140-175)
  const ctaAssembled = interpolate(f, [162, 175], [0, 1], { clamp: true });
  ctaBtn.style.opacity = ctaAssembled;

  pixelBlocks.forEach((pb, i) => {
    const pbStart = 140 + i * 1.5;
    const pbProg = interpolate(f, [pbStart, pbStart + 18], [0, 1], { clamp: true });
    if (pbProg < 1) {
      const randAngle = (i / 20) * Math.PI * 2;
      const dist = (1 - pbProg) * 80;
      const px = Math.cos(randAngle) * dist - 12 + (i % 4) * 8;
      const py = Math.sin(randAngle) * dist - 8 + Math.floor(i / 4) * 8;
      pb.style.transform = `translate(${px}px, ${py}px)`;
      pb.style.opacity = interpolate(pbProg, [0, 0.3, 0.9, 1], [0.8, 0.6, 0.3, 0]);
    } else {
      pb.style.opacity = '0';
    }
  });

  // Outro glitch burst (175-178) + clean hold
  if (f >= 175 && f <= 178) {
    const rand5 = seededRand(f * 53);
    // Quick distortion: shift some DOM elements
    glitchBurst.style.opacity = '1';
    glitchBurst.style.background = T.primary;
    glitchBurst.style.opacity = '0.15';
    glitchBurst.style.transform = `translateX(${(rand5()-0.5)*12}px)`;
  } else {
    glitchBurst.style.opacity = '0';
    glitchBurst.style.transform = '';
  }
}

function renderTemplate6(frame) {
  const f = frame;

  // Fade in content underneath as peel progresses
  const contentEl = document.getElementById('t6-content');
  if (contentEl) contentEl.style.opacity = interpolate(f, [60, 100], [0, 1], { clamp: true });

  // Photo peel
  const peelProgress = interpolate(f, [30, 140], [0, 1], { clamp: true, easing: easeInOut });
  const photoEl = document.getElementById('t6-photo');
  const shadowEl = document.getElementById('t6-shadow');
  if (photoEl) {
    const rotX = interpolate(peelProgress, [0, 1], [0, -35], { clamp: false });
    const rotY = interpolate(peelProgress, [0, 1], [0, 40], { clamp: false });
    const scaleX = interpolate(peelProgress, [0, 1], [1, 0.6], { clamp: false });
    if (f < 140) {
      photoEl.style.transform = `perspective(600px) rotateX(${rotX}deg) rotateY(${rotY}deg) scaleX(${scaleX})`;
      photoEl.style.opacity = interpolate(f, [120, 140], [1, 0], { clamp: true });
    } else {
      photoEl.style.opacity = '0';
    }
    shadowEl.style.opacity = interpolate(peelProgress, [0, 0.5, 1], [0, 0.8, 0], { clamp: false });
  }

  // Badge slide
  const badgeEl = document.getElementById('t6-badge');
  if (badgeEl) {
    const bs = spring(f - 80, { damping: 10, stiffness: 120 });
    badgeEl.style.transform = `translateX(${interpolate(bs, [0,1], [60, 0], {clamp:false})}px)`;
    badgeEl.style.opacity = interpolate(f, [80, 95], [0, 1], { clamp: true });
  }

  // Headline clip-path wipe
  const hlEl = document.getElementById('t6-headline');
  if (hlEl) {
    const wipe = interpolate(f, [100, 150], [100, 0], { clamp: true, easing: easeOut });
    hlEl.style.clipPath = `inset(0 ${wipe}% 0 0)`;
  }

  // SVG underline
  const ulPath = document.getElementById('t6-underline-path');
  const ulSvg = document.getElementById('t6-underline');
  if (ulPath) {
    const drawP = interpolate(f, [130, 160], [220, 0], { clamp: true, easing: easeOut });
    ulPath.setAttribute('stroke-dashoffset', drawP);
    ulSvg.style.opacity = interpolate(f, [128, 135], [0, 1], { clamp: true });
  }

  // Logo at top
  const logoEl = document.getElementById('t6-logo');
  if (logoEl) logoEl.style.opacity = interpolate(f, [100, 115], [0, 1], { clamp: true });

  // Small photo appear
  const smallPhoto = document.getElementById('t6-photo-small');
  if (smallPhoto) {
    const sp = spring(f - 155, { damping: 12, stiffness: 100 });
    smallPhoto.style.opacity = clamp(sp, 0, 1);
    smallPhoto.style.transform = `scale(${interpolate(sp, [0,1], [0.92, 1], {clamp:false})})`;
  }

  // Support text char-by-char with random delays
  if (f >= 170) {
    const chars = C.support.length;
    for (let i = 0; i < chars; i++) {
      const el = document.getElementById(`t6-sc-${i}`);
      if (!el) continue;
      const delay = (i / chars) * 40 + (((i * 7) % 5) - 2); // ±2 frame jitter
      const charF = f - 170 - delay;
      el.style.opacity = interpolate(charF, [0, 4], [0, 1], { clamp: true });
    }
    const supportEl = document.getElementById('t6-support');
    if (supportEl) supportEl.style.opacity = 1;
  }

  // CTA border trace
  const ctaBorder = document.getElementById('t6-cta-border');
  const ctaFill = document.getElementById('t6-cta-fill');
  if (ctaBorder) {
    const traceP = interpolate(f, [200, 230], [0, 1], { clamp: true, easing: easeInOut });
    // Animate border via box-shadow trick for trace effect
    const col = T.cta_bg;
    const a = clamp(traceP * 2, 0, 1);
    ctaBorder.style.borderColor = rgba(col, a);
    ctaBorder.style.boxShadow = `0 0 ${traceP * 8}px ${rgba(col, traceP * 0.5)}`;
  }
  if (ctaFill) {
    const fillP = interpolate(f, [228, 240], [0, 1], { clamp: true, easing: easeOut });
    ctaFill.style.transform = `scaleX(${fillP})`;
  }

  // Logo stamp
  const logoBottom = document.getElementById('t6-logo-bottom');
  if (logoBottom) {
    const stampF = f - 240;
    const s = spring(stampF, { damping: 6, stiffness: 200 });
    logoBottom.style.opacity = interpolate(f, [240, 248], [0, 1], { clamp: true });
    logoBottom.style.transform = `scale(${interpolate(s, [0,1], [1.4, 1], {clamp:false})})`;
  }
}

        </div>

  }

}

function renderTemplate7(frame) {
  // Flip schedule for each strip: strip i flips at frame (10 + i*5)
  const flipStarts = [10, 15, 20, 25, 70, 85, 140, 170]; // match scene timing

  for (let i = 0; i < STRIPS; i++) {
    const inner = document.getElementById(`t7-inner-${i}`);
    if (!inner) continue;

    const fs = flipStarts[i];
    const flipDur = 30;
    const flipF = frame - fs;
    let rotX = 0;

    if (flipF < 0) {
      rotX = 0;
    } else if (flipF < flipDur) {
      // 0 -> 180 degrees
      const t = easeInOut(clamp(flipF / flipDur, 0, 1));
      rotX = t * 180;
    } else {
      rotX = 180;
    }

    inner.style.transform = `rotateX(${rotX}deg)`;

    // Pulse/vibration on highlight strip (strip 4) frames 110-150
    if (i === 4) {
      const stripEl = document.getElementById(`t7-strip-${i}`);
      if (stripEl && frame >= 110 && frame <= 150) {
        const pulseF = frame - 110;
        const osc = Math.sin(pulseF * 0.9) * 2 * interpolate(frame, [110, 150], [1, 0], { clamp: true });
        stripEl.style.transform = `translateX(${osc}px)`;
      } else if (stripEl) {
        stripEl.style.transform = 'translateX(0)';
      }
    }
  }

  // Wave settle frames 210-240
  if (frame >= 210) {
    for (let i = 0; i < STRIPS; i++) {
      const strip = document.getElementById(`t7-strip-${i}`);
      if (!strip) continue;
      const waveF = frame - 210;
      const phase = i * 0.6;
      const decay = interpolate(frame, [210, 240], [1, 0], { clamp: true });
      const wave = Math.sin(waveF * 0.25 + phase) * 3 * decay;
      strip.style.transform = `translateY(${wave}px)`;
    }
  }
}

  if (supportEl) {
    if (frame >= 170) {

  // Spotlight + CTA

  // "Try Free" text flash

  if (finEl) {
    if (frame >= 200 && frame < 250) {
      finEl.style.opacity = (frame % 3 < 2) ? '1' : '0.2';
    } else {

    }
  }

  // Logo bottom
  const logoBottom = document.getElementById('t9-logo-bottom');
  if (logoBottom) {
    logoBottom.style.opacity = interpolate(frame, [224, 235], [0, 1], { clamp: true });
  }
}

// ── Template 10: The Mosaic Assemble ─────────────────────────────────────────
const MOSAIC_COLS = 9;
const MOSAIC_ROWS = 16;
const TILE_COUNT = MOSAIC_COLS * MOSAIC_ROWS;

// Palette colors for random tiles
const TILE_PALETTE = [T.gradient_from, T.gradient_to, T.surface, T.primary, '#1a0f0a', '#3d1f12', '#562810'];

// Pre-compute spiral order from center
function computeSpiralOrder(cols, rows) {
  const cx = Math.floor(cols / 2);
  const cy = Math.floor(rows / 2);
  const tiles = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const dist = Math.sqrt((c - cx) ** 2 + (r - cy) ** 2);
      tiles.push({ r, c, dist, idx: r * cols + c });
    }
  }
  tiles.sort((a, b) => a.dist - b.dist);
  return tiles;
}

const spiralOrder = computeSpiralOrder(MOSAIC_COLS, MOSAIC_ROWS);

// Define which tiles belong to which region (row ranges for a 16-row grid)
function getTileRegion(row) {
  if (row <= 1) return 'logo';
  if (row <= 2) return 'badge';
  if (row >= 3 && row <= 8) return 'photo';
  if (row >= 9 && row <= 12) return 'headline';
  if (row >= 13 && row <= 14) return 'support';
  if (row >= 15) return 'cta';
  return 'bg';
}

// Headline text split for mosaic tile flip
const HL_WORDS = C.headline.split(' ');

function initTemplate10(canvas) {
  const tw = 270 / MOSAIC_COLS; // tile width ~30px
  const th = 585 / MOSAIC_ROWS; // tile height ~36.5px

  let html = `<div id="t10-grid" style="position:absolute;inset:0;display:grid;grid-template-columns:repeat(${MOSAIC_COLS},1fr);grid-template-rows:repeat(${MOSAIC_ROWS},1fr);">`;

  for (let r = 0; r < MOSAIC_ROWS; r++) {
    for (let c = 0; c < MOSAIC_COLS; c++) {
      const idx = r * MOSAIC_COLS + c;
      const region = getTileRegion(r);
      const color = TILE_PALETTE[idx % TILE_PALETTE.length];
      html += `<div id="t10-tile-${idx}" style="
        position:relative;
        background:${color};
        border:0.5px solid rgba(0,0,0,0.2);
        transform-style:preserve-3d;
        perspective:100px;
        overflow:hidden;
        display:flex;align-items:center;justify-content:center;
      " data-row="${r}" data-col="${c}" data-region="${region}">
        <!-- back face for flip reveal -->
        <div id="t10-tile-back-${idx}" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;transform:rotateY(180deg);font-size:9px;font-weight:700;color:${T.badge_text};overflow:hidden;"></div>
      </div>`;
    }
  }

  html += '</div>';

  // Overlay for CTA
  html += `<div id="t10-cta" style="position:absolute;left:10px;right:10px;bottom:10px;height:50px;background:${T.cta_bg};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${T.cta_text};opacity:0;">${C.cta}</div>`;

  canvas.innerHTML = html;

  // Store random shimmer seeds per tile
  for (let i = 0; i < TILE_COUNT; i++) {
    const el = document.getElementById(`t10-tile-${i}`);
    if (el) el.dataset.seed = (Math.random() * 100).toFixed(2);
  }
}

// Precompute logo tile assignments (which tiles in logo region spell brand name)
function getLogoTileColor(col, totalCols) {
  // Simple: alternate between badge_bg and surface for "logo area" look
  return col % 2 === 0 ? T.badge_bg : T.surface;
}

function getRegionGradientColor(row, col, rows, cols) {
  const tx = col / cols;
  const ty = row / rows;
  return lerpColor(T.gradient_from, T.gradient_to, ty + tx * 0.3);
}

// Flying particle positions for CTA explosion
const CTA_EXPLODE_VELS = [];
for (let i = 0; i < TILE_COUNT; i++) {
  const row = Math.floor(i / MOSAIC_COLS);
  if (row >= 15) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    CTA_EXPLODE_VELS.push({ vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed });
  } else {
    CTA_EXPLODE_VELS.push(null);
  }
}

function renderTemplate10(frame) {
  const tw = 270 / MOSAIC_COLS;
  const th = 585 / MOSAIC_ROWS;

  // Spiral order index for build animations
  const spiralIndexMap = {};
  spiralOrder.forEach((tile, si) => {
    spiralIndexMap[tile.idx] = si;
  });

  for (let idx = 0; idx < TILE_COUNT; idx++) {
    const tileEl = document.getElementById(`t10-tile-${idx}`);
    if (!tileEl) continue;

    const row = Math.floor(idx / MOSAIC_COLS);
    const col = idx % MOSAIC_COLS;
    const region = getTileRegion(row);
    const si = spiralIndexMap[idx]; // spiral index

    // Phase 0-20: Shimmer
    if (frame < 20) {
      const shimmerT = frame / 20;
      const seed = parseFloat(tileEl.dataset.seed);
      const op = 0.3 + 0.7 * Math.abs(Math.sin((frame + seed) * 0.4));
      tileEl.style.opacity = op;
    } else {
      tileEl.style.opacity = 1;
    }

    // Phase 20-70: Logo mosaic build (logo region)
    if (region === 'logo' && frame >= 20) {
      const tileDelay = si * 0.4; // staggered by spiral distance
      const tileF = frame - 20 - tileDelay;
      if (tileF >= 0) {
        const t = clamp(tileF / 8, 0, 1);
        const targetColor = getLogoTileColor(col, MOSAIC_COLS);
        tileEl.style.background = lerpColor(TILE_PALETTE[idx % TILE_PALETTE.length], targetColor, easeOut(t));
        // Pop scale
        const pop = tileF < 3 ? 1 + tileF * 0.1 : tileF < 5 ? 1.3 - (tileF - 3) * 0.15 : 1;
        tileEl.style.transform = `scale(${pop})`;
      }
    }

    // Phase 60-110: Photo region color morph
    if (region === 'photo' && frame >= 60) {
      const tileDelay = (col + row * 0.5) * 1.2;
      const tileF = frame - 60 - tileDelay;
      if (tileF >= 0) {
        const t = clamp(tileF / 15, 0, 1);
        const targetColor = getRegionGradientColor(row, col, MOSAIC_ROWS, MOSAIC_COLS);
        tileEl.style.background = lerpColor(tileEl.style.background || TILE_PALETTE[idx % TILE_PALETTE.length], targetColor, easeInOut(t));

        // Subdivision effect: show smaller sub-grid pattern inside tile
        if (tileF > 10 && !tileEl.dataset.subdivided) {
          tileEl.dataset.subdivided = '1';
          tileEl.style.backgroundImage = `
            linear-gradient(${targetColor},${targetColor}),
            repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent ${th/2}px),
            repeating-linear-gradient(90deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent ${tw/2}px)
          `;
          tileEl.style.backgroundBlendMode = 'normal,multiply,multiply';
        }
      }
    }

    // Phase 100-140: Badge tiles color morph
    if (region === 'badge' && frame >= 100) {
      const tileDelay = col * 2;
      const tileF = frame - 100 - tileDelay;
      if (tileF >= 0) {
        const t = clamp(tileF / 12, 0, 1);
        const targetColor = col === Math.floor(MOSAIC_COLS / 2) ? T.badge_text : T.badge_bg;
        tileEl.style.background = lerpColor(tileEl.style.background || T.surface, targetColor, easeOut(t));
        const pop = tileF < 3 ? 1 + tileF * 0.1 : tileF < 5 ? 1.3 - (tileF - 3) * 0.15 : 1;
        tileEl.style.transform = `scale(${pop})`;
      }
    }

    // Phase 130-180: Headline tile flip (rotateY reveal text)
    if (region === 'headline' && frame >= 130) {
      const tileDelay = col * 3.5; // left to right stagger
      const tileF = frame - 130 - tileDelay;
      const backEl = document.getElementById(`t10-tile-back-${idx}`);

      if (tileF >= 0) {
        const t = clamp(tileF / 18, 0, 1);
        const rotY = interpolate(easeInOut(t), [0, 1], [0, 180], { clamp: false });
        tileEl.style.transform = `perspective(200px) rotateY(${rotY}deg)`;

        if (backEl) {
          // Highlight word tiles get badge color background
          const hlWordStart = C.headline.indexOf(C.highlight);
          const charPos = col + (row - 9) * MOSAIC_COLS;
          const isHighlight = (charPos >= hlWordStart / 3) && (charPos < (hlWordStart + C.highlight.length) / 3);
          backEl.style.background = isHighlight ? T.badge_bg : T.gradient_to;

          // Show a character from the headline
          const wordIdx = Math.floor((col / MOSAIC_COLS) * HL_WORDS.length);
          const lineIdx = row - 9;
          const word = HL_WORDS[Math.min(wordIdx + lineIdx, HL_WORDS.length - 1)] || '';
          backEl.textContent = word.charAt(col % Math.max(word.length, 1));
        }
      }
    }

    // Phase 170-210: Support tile flip (top to bottom stagger)
    if (region === 'support' && frame >= 170) {
      const tileDelay = (row - 13) * 10 + col * 1.5;
      const tileF = frame - 170 - tileDelay;
      const backEl = document.getElementById(`t10-tile-back-${idx}`);

      if (tileF >= 0) {
        const t = clamp(tileF / 16, 0, 1);
        const rotY = interpolate(easeInOut(t), [0, 1], [0, 180], { clamp: false });
        tileEl.style.transform = `perspective(200px) rotateY(${rotY}deg)`;

        if (backEl) {
          backEl.style.background = T.surface;
          const supportChars = C.support;
          const charIdx = (col + (row - 13) * MOSAIC_COLS);
          backEl.textContent = supportChars.charAt(charIdx % supportChars.length);
        }
      }
    }

    // Phase 200-240: CTA tile explosion
    if (region === 'cta' && frame >= 200) {
      const explodeF = frame - 200;
      const vel = CTA_EXPLODE_VELS[idx];
      if (vel) {
        const dx = vel.vx * explodeF;
        const dy = vel.vy * explodeF;
        const rot = explodeF * vel.vx * 3;
        const opacity = interpolate(frame, [200, 240], [1, 0], { clamp: true });
        tileEl.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
        tileEl.style.opacity = opacity;
      }
    }

    // Phase 240-270: Remaining tiles wave
    if (region !== 'cta' && frame >= 240) {
      const waveF = frame - 240;
      const phase = (col + row) * 0.4;
      const dy = Math.sin(waveF * 0.2 + phase) * 2;
      // Only apply if not already transformed by flip
      if (region !== 'headline' && region !== 'support') {
        tileEl.style.transform = `translateY(${dy}px)`;
      }
    }
  }

  // CTA button reveal (behind exploding tiles)
  const ctaEl = document.getElementById('t10-cta');
  if (ctaEl) {
    const t = spring(frame - 200, { damping: 14, stiffness: 100 });
    ctaEl.style.opacity = clamp(t * 2, 0, 1);
    ctaEl.style.transform = `scale(${interpolate(t, [0,1], [0.9, 1], {clamp:false})})`;
  }
}


// ── Template 11: The Memory Returns ──────────────────────────────────────────
// Dust particles drift downward as a blurred photo slowly sharpens.

    dustHtml += `<div id="t11-dust-${i}" data-sy="${startY.toFixed(1)}" data-spd="${speed.toFixed(3)}" data-op="${opacity.toFixed(2)}" style="position:absolute;left:${x.toFixed(1)}px;top:${startY.toFixed(1)}px;width:${size.toFixed(1)}px;height:${size.toFixed(1)}px;border-radius:50%;background:${AMBER};opacity:0;pointer-events:none;"></div>`;
  }

  const words = C.headline.split(' ');
  const hlHtml = words.map((w) => {
    const isHl = C.highlight && w.replace(/[.,!?]/g,'') === C.highlight.replace(/[.,!?]/g,'');
    const style = isHl
      ? `position:relative;display:inline-block;color:${AMBER};margin-right:4px;`
      : `display:inline-block;color:#efe7db;margin-right:4px;`;

    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,#2a1a0a 0%,#150d05 60%,#0a0603 100%);"></div>

    <div id="t11-dust-layer" style="position:absolute;inset:0;overflow:hidden;z-index:20;pointer-events:none;">${dustHtml}</div>
    <div id="t11-photo-wrap" style="position:absolute;top:32px;left:14px;right:14px;height:320px;border-radius:10px;overflow:hidden;opacity:0;z-index:10;">
      <div id="t11-photo-glow" style="position:absolute;inset:-8px;border-radius:18px;pointer-events:none;z-index:2;"></div>
      ${photoUrl
        ? `<img src="${photoUrl}" style="width:100%;height:100%;object-fit:cover;filter:blur(20px);transition:none;" id="t11-photo-img">`
        : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${T.gradient_from},${T.gradient_to});filter:blur(20px);" id="t11-photo-img"></div>`}
    </div>
    <div id="t11-logo" style="position:absolute;top:44px;left:20px;width:60px;height:28px;display:flex;align-items:center;opacity:0;z-index:35;">
      ${logoUrl ? `<img src="${logoUrl}" style="max-height:24px;max-width:58px;object-fit:contain;filter:drop-shadow(0 1px 6px rgba(0,0,0,0.6));">` : `<span style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:${AMBER};">${BRAND}</span>`}
    </div>
    <div id="t11-headline-wrap" style="position:absolute;top:364px;left:14px;right:14px;font-size:16px;font-weight:700;line-height:1.4;font-family:Georgia,serif;z-index:30;">
      ${hlHtml}
      <svg id="t11-underline-svg" style="position:absolute;bottom:-6px;left:0;width:100%;height:8px;overflow:visible;opacity:0;" viewBox="0 0 240 8">
        <path id="t11-underline-path" d="M0,5 Q30,1 60,5 Q90,9 120,5 Q150,1 180,5 Q210,9 240,5" fill="none" stroke="${AMBER}" stroke-width="2" stroke-linecap="round" stroke-dasharray="260" stroke-dashoffset="260"/>
      </svg>
    </div>
    <div id="t11-badge" style="position:absolute;top:448px;left:50%;transform:translateX(-50%) scale(0.9);background:${T.badge_bg};color:${T.badge_text};padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;opacity:0;z-index:30;white-space:nowrap;">${C.badge}</div>
    <div id="t11-support" style="position:absolute;top:474px;left:18px;right:18px;font-size:10px;color:rgba(239,231,219,0.72);line-height:1.55;text-align:center;font-family:Georgia,serif;opacity:0;z-index:30;">${C.support}</div>
    <div id="t11-cta" style="position:absolute;top:310px;left:40px;right:40px;background:${T.cta_bg};color:${T.cta_text};padding:10px 16px;border-radius:999px;font-size:12px;font-weight:700;text-align:center;opacity:0;transform:translateY(10px);z-index:35;box-shadow:0 4px 24px rgba(197,160,89,0.3);">${C.cta}</div>

function renderTemplate11(f) {
  const AMBER = '#C5A059';

  for (let i = 0; i < 35; i++) {
    const p = document.getElementById(`t11-dust-${i}`);
    if (!p) continue;
    const startY = parseFloat(p.dataset.sy);
    const spd    = parseFloat(p.dataset.spd);
    const baseOp = parseFloat(p.dataset.op);
    const appearedOp = interpolate(f, [0, 10], [0, baseOp], { clamp: true });
    const driftY = f * spd * 1.2;
    const fadeStart = 50 + (i % 5) * 8;
    const fadeOp = i % 3 === 0 ? interpolate(f, [fadeStart, fadeStart + 30], [1, 0], { clamp: true }) : 1;
    p.style.top     = ((startY + driftY) % 600) + 'px';
    p.style.opacity = (appearedOp * fadeOp).toFixed(3);
  }

  const photoWrap = document.getElementById('t11-photo-wrap');
  if (photoWrap) photoWrap.style.opacity = interpolate(f, [20, 45], [0, 1], { clamp: true, easing: easeInOut });

  const photoImg = document.getElementById('t11-photo-img');
  if (photoImg) {
    const blurPx = interpolate(f, [20, 60], [20, 0], { clamp: true, easing: easeInOut });
    photoImg.style.filter = `blur(${blurPx.toFixed(2)}px)`;
  }

  const photoGlow = document.getElementById('t11-photo-glow');
  if (photoGlow) {
    const g = interpolate(f, [50, 90], [0, 28], { clamp: true, easing: easeInOut });
    photoGlow.style.boxShadow = `0 0 ${g.toFixed(1)}px rgba(197,160,89,${(g / 80).toFixed(3)})`;
  }

  const logo = document.getElementById('t11-logo');
  if (logo) logo.style.opacity = interpolate(f, [80, 110], [0, 1], { clamp: true, easing: easeInOut });

  const hlWrap = document.getElementById('t11-headline-wrap');
  if (hlWrap) {
    const spans = hlWrap.querySelectorAll('span[style]');
    spans.forEach((sp, i) => {
      const wStart = 110 + i * 8;
      sp.style.opacity = interpolate(f, [wStart, wStart + 12], [0, 1], { clamp: true, easing: easeInOut });
    });
  }

  const ulPath = document.getElementById('t11-underline-path');
  const ulSvg  = document.getElementById('t11-underline-svg');
  if (ulPath && ulSvg) {
    ulPath.setAttribute('stroke-dashoffset', interpolate(f, [138, 168], [260, 0], { clamp: true, easing: easeInOut }).toFixed(1));
    ulSvg.style.opacity = interpolate(f, [137, 143], [0, 1], { clamp: true });
  }

  const badge = document.getElementById('t11-badge');
  if (badge) {
    badge.style.transform = `translateX(-50%) scale(${interpolate(f, [140, 170], [0.9, 1.0], { clamp: true, easing: easeInOut }).toFixed(4)})`;
    badge.style.opacity   = interpolate(f, [140, 158], [0, 1], { clamp: true, easing: easeInOut });
  }

  const support = document.getElementById('t11-support');
  if (support) support.style.opacity = interpolate(f, [170, 210], [0, 1], { clamp: true, easing: easeInOut });

  const cta = document.getElementById('t11-cta');
  if (cta) {
    cta.style.opacity   = interpolate(f, [210, 245], [0, 1], { clamp: true, easing: easeInOut });
    cta.style.transform = `translateY(${interpolate(f, [210, 250], [10, 0], { clamp: true, easing: easeInOut }).toFixed(2)}px)`;
  }

  const vignette = document.getElementById('t11-vignette');
  if (vignette) vignette.style.opacity = interpolate(f, [260, 300], [0, 0.55], { clamp: true, easing: easeInOut });
}

function renderTemplate12(f) {
  const AMBER = '#C5A059';

  const frame12 = document.getElementById('t12-frame');
  if (frame12) {
    const fadeIn = interpolate(f, [0, 20], [0, 1], { clamp: true, easing: easeInOut });
    const fadeOut = interpolate(f, [100, 130], [1, 0], { clamp: true, easing: easeInOut });
    const op = fadeIn * fadeOut;
    frame12.style.borderColor = `rgba(197,160,89,${(op * 0.5).toFixed(3)})`;
    frame12.style.boxShadow   = `0 0 ${(op * 10).toFixed(1)}px rgba(197,160,89,${(op * 0.12).toFixed(3)})`;
  }

  const lockWrap = document.getElementById('t12-lock-wrap');
  const lockRing = document.getElementById('t12-lock-ring');
  if (lockWrap) {
    if (f < 40) {
      lockWrap.style.opacity = interpolate(f, [15, 30], [0, 1], { clamp: true, easing: easeInOut });
      if (lockRing && f >= 15) {
        const p = Math.sin((f - 15) * 0.35) * 0.5 + 0.5;
        lockRing.style.boxShadow = `0 0 ${(p * 16).toFixed(0)}px rgba(197,160,89,${(p * 0.6).toFixed(2)})`;
      }
    } else {
      lockWrap.style.opacity = interpolate(f, [40, 50], [1, 0], { clamp: true, easing: easeInOut });
    }
  }

  // Hide all opening animation elements once photo is revealed
  const fragsWrap = document.getElementById('t12-frags');
  if (fragsWrap && f >= 90) fragsWrap.style.display = 'none';

  if (f >= 40) {
    for (let i = 0; i < 8; i++) {
      const frag = document.getElementById(`t12-frag-${i}`);
      if (!frag) continue;
      const angle = parseFloat(frag.dataset.angle);
      const fragF = f - 40 - i * 2;
      if (fragF < 0) { frag.style.opacity = 0; continue; }
      const dist   = interpolate(fragF, [0, 35], [0, 45], { clamp: true, easing: easeOut });
      const fragOp = interpolate(fragF, [0, 5, 30, 38], [0, 0.9, 0.7, 0]);
      frag.style.transform = `translate(calc(-50% + ${(Math.cos(angle) * dist).toFixed(1)}px), calc(-50% + ${(Math.sin(angle) * dist).toFixed(1)}px))`;
      frag.style.opacity   = Math.max(0, fragOp).toFixed(3);
    }
  }

  const photo12 = document.getElementById('t12-photo');
  if (photo12) photo12.style.clipPath = `circle(${interpolate(f, [70, 120], [0, 150], { clamp: true, easing: easeInOut }).toFixed(1)}% at 50% 50%)`;

  const logo12 = document.getElementById('t12-logo');
  if (logo12) logo12.style.opacity = interpolate(f, [110, 140], [0, 1], { clamp: true, easing: easeInOut });

  const ornSvg  = document.getElementById('t12-ornline');
  const ornPath = document.getElementById('t12-ornline-path');
  const ornDotL = document.getElementById('t12-orn-dot-l');
  const ornDotR = document.getElementById('t12-orn-dot-r');
  if (ornSvg) {
    const ornIn = interpolate(f, [118, 126], [0, 1], { clamp: true });
    const ornOut = interpolate(f, [150, 170], [1, 0], { clamp: true });
    ornSvg.style.opacity = (ornIn * ornOut).toFixed(3);
    if (ornPath) ornPath.setAttribute('stroke-dashoffset', interpolate(f, [120, 150], [120, 0], { clamp: true, easing: easeInOut }).toFixed(1));
    if (ornDotL) ornDotL.setAttribute('opacity', interpolate(f, [148, 155], [0, 1], { clamp: true }));
    if (ornDotR) ornDotR.setAttribute('opacity', interpolate(f, [148, 155], [0, 1], { clamp: true }));
  }

  const lc = C.headline.length;
  for (let i = 0; i < lc; i++) {
    const lEl = document.getElementById(`t12-l-${i}`);
    if (!lEl) continue;
    lEl.style.opacity = interpolate(f, [140 + (i / Math.max(lc, 1)) * 40, 140 + (i / Math.max(lc, 1)) * 40 + 6], [0, 1], { clamp: true, easing: easeInOut });
  }

  const annot = document.getElementById('t12-annotation');
  if (annot) annot.style.opacity = interpolate(f, [170, 200], [0, 1], { clamp: true, easing: easeInOut });

  const badge12 = document.getElementById('t12-badge');
  if (badge12) {
    const bp = interpolate(f, [190, 225], [0, 1], { clamp: true, easing: easeInOut });
    badge12.style.transform = `translateX(-50%) rotate(${(18 - bp * 26).toFixed(1)}deg) scale(${(0.5 + bp * 0.5).toFixed(4)})`;
    badge12.style.opacity   = interpolate(f, [190, 208], [0, 1], { clamp: true });
  }

  const cta12 = document.getElementById('t12-cta');
  if (cta12) cta12.style.opacity = interpolate(f, [220, 255], [0, 1], { clamp: true, easing: easeInOut });

  const shimmer12 = document.getElementById('t12-shimmer');
  if (shimmer12 && f >= 260) {
    const shimF = f - 260;
    const shimX = interpolate(shimF, [0, 10], [-20, 120], { clamp: true });
    shimmer12.style.opacity    = interpolate(shimF, [0, 2, 8, 10], [0, 0.7, 0.7, 0]);
    shimmer12.style.background = `linear-gradient(105deg,transparent ${shimX.toFixed(0)}%,rgba(197,160,89,0.1) ${(shimX+10).toFixed(0)}%,transparent ${(shimX+20).toFixed(0)}%)`;
  }
}

function renderTemplate13(f) {
  const AMBER = '#C5A059';

  ['t13-frame-l','t13-frame-r'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const op = interpolate(f, [0, 30], [0, 1], { clamp: true, easing: easeInOut });
    el.style.borderColor = `rgba(197,160,89,${(op * 0.45).toFixed(3)})`;
  });

  const pLW = document.getElementById('t13-photo-l-wrap');
  if (pLW) pLW.style.opacity = interpolate(f, [20, 60], [0, 1], { clamp: true, easing: easeInOut });
  const lbL = document.getElementById('t13-label-l');
  if (lbL) lbL.style.opacity = interpolate(f, [40, 70], [0, 1], { clamp: true, easing: easeInOut });
  const pRW = document.getElementById('t13-photo-r-wrap');
  if (pRW) pRW.style.opacity = interpolate(f, [50, 90], [0, 1], { clamp: true, easing: easeInOut });
  const lbR = document.getElementById('t13-label-r');
  if (lbR) lbR.style.opacity = interpolate(f, [70, 100], [0, 1], { clamp: true, easing: easeInOut });

  const beam = document.getElementById('t13-beam');
  if (beam) {
    const bW  = interpolate(f, [80, 130], [0, 26], { clamp: true, easing: easeInOut });
    const bOp = interpolate(f, [80, 105], [0, 1], { clamp: true, easing: easeInOut });
    beam.style.width   = bW.toFixed(1) + 'px';
    beam.style.opacity = bOp;
    if (f >= 150) {
      const intens = interpolate(f, [150, 200], [1, 1.6], { clamp: true });
      beam.style.boxShadow = `0 0 ${(8 * intens).toFixed(0)}px rgba(197,160,89,${(0.4 * intens).toFixed(2)})`;
    }
    if (f >= 300) {
      const pulse = 0.8 + 0.4 * Math.sin((f - 300) * 0.2);
      beam.style.opacity = (parseFloat(bOp) * pulse).toFixed(3);
    }
  }

  if (f >= 80) {
    for (let i = 0; i < 20; i++) {
      const sp = document.getElementById(`t13-spark-${i}`);
      if (!sp) continue;
      const rx = parseFloat(sp.dataset.rx);
      const oy = parseFloat(sp.dataset.oy);
      const flicker = Math.sin((f - 80) * 0.3 + i * 0.7);
      const visible  = interpolate(f, [80, 110], [0, 1], { clamp: true }) * (0.5 + 0.5 * flicker);
      sp.style.left  = ((rx + (f - 80) * 0.08) % 100) + '%';
      sp.style.top   = `calc(50% + ${oy}px)`;
      sp.style.opacity = Math.max(0, visible).toFixed(3);
    }
  }

  const logo13 = document.getElementById('t13-logo');
  if (logo13) logo13.style.opacity = interpolate(f, [120, 150], [0, 1], { clamp: true, easing: easeInOut });
  const badge13 = document.getElementById('t13-badge');
  if (badge13) badge13.style.opacity = interpolate(f, [130, 160], [0, 1], { clamp: true, easing: easeInOut });

  const dp = interpolate(f, [150, 200], [0, 1], { clamp: true, easing: easeInOut }) * 10;
  const pLE = document.getElementById('t13-photo-l-wrap');
  const pRE = document.getElementById('t13-photo-r-wrap');
  const fLE = document.getElementById('t13-frame-l');
  const fRE = document.getElementById('t13-frame-r');
  if (pLE) pLE.style.transform = `translateX(${dp.toFixed(2)}px)`;
  if (pRE) pRE.style.transform = `translateX(${(-dp).toFixed(2)}px)`;
  if (fLE) fLE.style.transform  = `translateX(${dp.toFixed(2)}px)`;
  if (fRE) fRE.style.transform  = `translateX(${(-dp).toFixed(2)}px)`;

  const hl13 = document.getElementById('t13-headline');
  if (hl13) hl13.style.opacity = interpolate(f, [190, 230], [0, 1], { clamp: true, easing: easeInOut });
  const sup13 = document.getElementById('t13-support');
  if (sup13) sup13.style.opacity = interpolate(f, [230, 270], [0, 1], { clamp: true, easing: easeInOut });

  const cta13 = document.getElementById('t13-cta');
  if (cta13) {
    cta13.style.opacity   = interpolate(f, [260, 295], [0, 1], { clamp: true, easing: easeInOut });
    cta13.style.transform = `translateY(${interpolate(f, [260, 300], [8, 0], { clamp: true, easing: easeInOut }).toFixed(2)}px)`;
  }
}

function renderTemplate14(f) {
  const AMBER = '#C5A059';

  const pulse14 = document.getElementById('t14-pulse');
  if (pulse14) {
    if (f < 15) {
      pulse14.style.opacity   = interpolate(f, [0, 8], [0, 1], { clamp: true });
      pulse14.style.transform = `translate(-50%,-50%) scale(${(0.7 + 0.6 * Math.sin(f * 0.6)).toFixed(3)})`;
    } else {
      pulse14.style.opacity   = interpolate(f, [15, 30], [1, 0], { clamp: true });
      pulse14.style.transform = `translate(-50%,-50%) scale(${interpolate(f, [15, 30], [1, 6], { clamp: true, easing: easeOut }).toFixed(2)})`;
    }
  }

  const photoWrap14 = document.getElementById('t14-photo-wrap');
  if (photoWrap14) photoWrap14.style.opacity = interpolate(f, [15, 50], [0, 1], { clamp: true, easing: easeInOut });

  const photoImg14 = document.getElementById('t14-photo-img');
  if (photoImg14) {
    const blurPx = interpolate(f, [40, 100], [30, 0], { clamp: true, easing: easeInOut });
    const sc = f < 280
      ? interpolate(f, [40, 100], [1.3, 1.0], { clamp: true, easing: easeInOut })
      : interpolate(f, [280, 300], [1.0, 0.98], { clamp: true, easing: easeInOut });
    photoImg14.style.filter    = `blur(${blurPx.toFixed(2)}px)`;
    photoImg14.style.transform = `scale(${sc.toFixed(4)})`;
  }

  const overlay14 = document.getElementById('t14-overlay');
  if (overlay14) overlay14.style.opacity = interpolate(f, [30, 70], [0, 1], { clamp: true, easing: easeInOut });

  const logo14 = document.getElementById('t14-logo');
  if (logo14) logo14.style.opacity = interpolate(f, [120, 160], [0, 0.75], { clamp: true, easing: easeInOut });

  const hl14 = document.getElementById('t14-headline');
  if (hl14) hl14.style.opacity = interpolate(f, [150, 185], [0, 1], { clamp: true, easing: easeInOut });

  const hlWord14 = document.getElementById('t14-hl-word');
  if (hlWord14 && f >= 180) {
    const sa = interpolate(f, [180, 210], [0, 1], { clamp: true });
    const so = Math.sin((f - 180) * 0.18) * sa;
    const gs = (6 + so * 6).toFixed(1);
    hlWord14.style.textShadow = `0 0 ${gs}px rgba(197,160,89,${(0.5 + so * 0.3).toFixed(2)}),0 0 ${(parseFloat(gs) * 2).toFixed(1)}px rgba(197,160,89,0.15)`;
  }

  const sup14 = document.getElementById('t14-support');
  if (sup14) sup14.style.opacity = interpolate(f, [180, 220], [0, 1], { clamp: true, easing: easeInOut });

  const badge14 = document.getElementById('t14-badge');
  if (badge14) badge14.style.opacity = interpolate(f, [210, 245], [0, 1], { clamp: true, easing: easeInOut });

  const cta14 = document.getElementById('t14-cta');
  if (cta14) cta14.style.opacity = interpolate(f, [240, 278], [0, 1], { clamp: true, easing: easeInOut });

  const vig14 = document.getElementById('t14-vignette');
  if (vig14) vig14.style.opacity = interpolate(f, [90, 300], [0, 0.6], { clamp: true, easing: easeInOut });

  if (f >= 280) {
    for (let i = 0; i < 18; i++) {
      const lp = document.getElementById(`t14-lp-${i}`);
      if (!lp) continue;
      const baseY  = parseFloat(lp.dataset.by);
      const driftY = (f - 280) * (0.4 + (i % 3) * 0.2);
      const flickOp = 0.3 + 0.4 * Math.sin((f - 280) * 0.25 + i * 0.8);
      const appOp   = interpolate(f, [280, 295], [0, 1], { clamp: true });
      lp.style.top     = ((baseY - driftY + 564) % 564) + 'px';
      lp.style.opacity = (appOp * Math.max(0, flickOp)).toFixed(3);
    }
  }
}


// ── Template 15: Dust of Time ─────────────────────────────────────────────────

const T15_PARTICLES = (() => {
  const rng = seededRand(15);
  return Array.from({ length: 55 }, (_, i) => ({
    x:    rng() * 100,        // % across canvas
    startY: 80 + rng() * 25,  // % down canvas (start near bottom)

    color: ['#C5A059','#D4A84B','#F5F0E0','#8B6F47','#E8C870','#BF9040'][Math.floor(rng() * 6)],

    opacity: 0.55 + rng() * 0.45,
    delay: Math.floor(rng() * 40), // frame delay before particle appears
  }));
})();

    particleContainer.appendChild(dot);
  });
}

function renderTemplate15(frame) {
  const f = frame;

  // Animate particles upward
  T15_PARTICLES.forEach((p, i) => {
    const dot = document.getElementById(`t15-p-${i}`);
    if (!dot) return;
    const activeF = f - p.delay;
    if (activeF < 0) { dot.style.opacity = '0'; return; }

    // Y position drifts upward from startY
    const yPct = p.startY - activeF * p.speed;
    // Gentle horizontal oscillation
    const xOffset = Math.sin(activeF * 0.07 + p.phase) * 1.8;
    const xPct = p.x + activeF * p.drift + xOffset;

    // Particle density decreases: dense 0-30, thinning 30-100
    const densityFactor = f < 100 ? 1 : interpolate(f, [100, 200], [1, 0.3], { clamp: true });
    // Individual particle fade based on how high it's traveled
    const lifeFade = yPct < 10 ? interpolate(yPct, [10, 0], [1, 0], { clamp: true }) : 1;
    const opacityVal = p.opacity * densityFactor * lifeFade * clamp(activeF / 5, 0, 1);

    dot.style.opacity = opacityVal;
    dot.style.left = `${clamp(xPct, -2, 102)}%`;
    dot.style.bottom = `${clamp(100 - yPct, -5, 110)}%`;
  });

  // Photo reveal underneath (opacity rises as particles clear)
  const photoWrap = document.getElementById('t15-photo-wrap');
  if (photoWrap) {
    const photoOpacity = interpolate(f, [20, 70], [0.4, 1], { clamp: true, easing: easeInOut });
    photoWrap.style.opacity = photoOpacity;
  }

  // Warm glow around photo
  const photoGlow = document.getElementById('t15-photo-glow');
  if (photoGlow) {
    photoGlow.style.opacity = interpolate(f, [60, 100], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Logo at bottom (grounded)
  const logo = document.getElementById('t15-logo');
  if (logo) {
    logo.style.opacity = interpolate(f, [90, 130], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Headline words, 10-frame stagger
  const words = C.headline.split(' ');
  words.forEach((_, i) => {
    const wordEl = document.getElementById(`t15-word-${i}`);
    if (!wordEl) return;
    const startF = 120 + i * 10;
    wordEl.style.opacity = interpolate(f, [startF, startF + 14], [0, 1], { clamp: true, easing: easeInOut });
  });

  // Badge
  const badge = document.getElementById('t15-badge');
  if (badge) {
    badge.style.opacity = interpolate(f, [150, 190], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Support text
  const support = document.getElementById('t15-support');
  if (support) {
    support.style.opacity = interpolate(f, [180, 220], [0, 1], { clamp: true, easing: easeInOut });
  }

  // CTA
  const cta = document.getElementById('t15-cta');
  if (cta) {
    cta.style.opacity = interpolate(f, [210, 260], [0, 1], { clamp: true, easing: easeInOut });

}

      }).join('')}

    particleContainer.appendChild(dot);
  });
}

function renderTemplate18(frame) {
  const f = frame;

  // Sliver expansion: clip-path inset(45% 0 45% 0) -> inset(0 0 0 0) over frames 15-50
  const sliverP = interpolate(f, [15, 50], [0, 1], { clamp: true, easing: easeInOut });
  const insetPct = interpolate(sliverP, [0, 1], [45, 0]);

  // Blur decrease simultaneously
  const blurVal = interpolate(f, [15, 50], [20, 0], { clamp: true, easing: easeInOut });

  // Zoom-out from scale 1.5 to 1.0 over frames 70-120
  const zoomP = interpolate(f, [70, 120], [1.5, 1.0], { clamp: true, easing: easeInOut });

  const photoClip = document.getElementById('t18-photo-clip');
  if (photoClip) {
    photoClip.style.clipPath = `inset(${insetPct}% 0 ${insetPct}% 0)`;
    photoClip.style.filter = `blur(${blurVal}px)`;
    photoClip.style.transform = `scale(${zoomP})`;
  }

  // Initial black: photo invisible before frame 0 sliver opens
  if (photoClip && f < 15) {
    photoClip.style.clipPath = `inset(45% 0 45% 0)`;
    photoClip.style.opacity = interpolate(f, [0, 8], [0, 1], { clamp: true });
  }

  // Vignette deepens on hold
  const vignette = document.getElementById('t18-vignette');
  if (vignette) {
    vignette.style.opacity = interpolate(f, [240, 270], [0, 0.6], { clamp: true, easing: easeInOut });
  }

  // Warm particles drift in hold phase
  if (f >= 240) {
    T18_PARTICLES.forEach((p, i) => {
      const dot = document.getElementById(`t18-p-${i}`);
      if (!dot) return;
      const activeF = f - 240;
      const x = p.x + p.vx * activeF + Math.sin(activeF * 0.06 + p.phase) * 0.8;
      const y = p.y + p.vy * activeF;
      const opacity = clamp(activeF / 15, 0, 1) * (y < 5 ? clamp((y) / 5, 0, 1) : 1) * 0.7;
      dot.style.left = `${x}%`;
      dot.style.top = `${y}%`;
      dot.style.opacity = opacity;
    });
  }

  // Logo — very small at top, appears after zoom-out
  const logo = document.getElementById('t18-logo');
  if (logo) {
    logo.style.opacity = interpolate(f, [110, 150], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Headline words fade in
  const words = C.headline.split(' ');
  words.forEach((_, i) => {
    const wordEl = document.getElementById(`t18-word-${i}`);
    if (!wordEl) return;
    const startF = 140 + i * 10;
    wordEl.style.opacity = interpolate(f, [startF, startF + 16], [0, 1], { clamp: true, easing: easeInOut });
  });

  // Underline draws itself
  const underline = document.getElementById('t18-underline');
  if (underline) {
    const drawP = interpolate(f, [165, 190], [0, 1], { clamp: true, easing: easeInOut });
    underline.style.transform = `scaleX(${drawP})`;
    underline.style.opacity = interpolate(f, [163, 168], [0, 1], { clamp: true });
  }

  // Support text
  const support = document.getElementById('t18-support');
  if (support) {
    support.style.opacity = interpolate(f, [170, 210], [0, 1], { clamp: true, easing: easeInOut });
  }

  // CTA
  const cta = document.getElementById('t18-cta');
  if (cta) {
    cta.style.opacity = interpolate(f, [200, 240], [0, 1], { clamp: true, easing: easeInOut });
  }
}


// ── Template 19: The Triple Restore ──────────────────────────────────────────
// Three polaroids drop with camera snaps. Each sepia photo is swept to full
// color by an amber light bridge. They fan out like photos on a warm table.

const T19_SPARKS = (() => {
  const rng = seededRand(19);
  return Array.from({ length: 10 }, (_, i) => ({
    pct: rng() * 100,          // position along connecting line (0-100%)
    offY: (rng() - 0.5) * 10, // vertical jitter from line center
    sz: 1.5 + rng() * 2,
    phase: rng() * Math.PI * 2,
    speed: 0.15 + rng() * 0.25,
  }));
})();

const T19_HOLD_PARTICLES = (() => {
  const rng = seededRand(191);

    x: 5 + rng() * 90,

    size: 1.2 + rng() * 2.2,
    vx: (rng() - 0.5) * 0.07,
    vy: -0.05 - rng() * 0.07,
    phase: rng() * Math.PI * 2,
    color: ['rgba(197,160,89,0.55)','rgba(212,168,75,0.45)','rgba(245,240,224,0.35)'][Math.floor(rng() * 3)],
