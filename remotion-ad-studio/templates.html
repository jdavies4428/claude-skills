function renderTemplate14(f) {
  const AMBER = '#C5A059';

  const pulse14 = document.getElementById('t14-pulse');
  if (pulse14) {
    if (f < 15) {
      pulse14.style.opacity   = interpolate(f, [0, 8], [0, 1], { clamp: true });
      pulse14.style.transform = `translate(-50%,-50%) scale(${(0.7 + 0.6 * Math.sin(f * 0.6)).toFixed(3)})`;
    } else {
      pulse14.style.opacity   = interpolate(f, [15, 30], [1, 0], { clamp: true });
      pulse14.style.transform = `translate(-50%,-50%) scale(${interpolate(f, [15, 30], [1, 6], { clamp: true, easing: easeOut }).toFixed(2)})`;
    }
  }

  const photoWrap14 = document.getElementById('t14-photo-wrap');
  if (photoWrap14) photoWrap14.style.opacity = interpolate(f, [15, 50], [0, 1], { clamp: true, easing: easeInOut });

  const photoImg14 = document.getElementById('t14-photo-img');
  if (photoImg14) {
    const blurPx = interpolate(f, [40, 100], [30, 0], { clamp: true, easing: easeInOut });
    const sc = f < 280
      ? interpolate(f, [40, 100], [1.3, 1.0], { clamp: true, easing: easeInOut })
      : interpolate(f, [280, 300], [1.0, 0.98], { clamp: true, easing: easeInOut });
    photoImg14.style.filter    = `blur(${blurPx.toFixed(2)}px)`;
    photoImg14.style.transform = `scale(${sc.toFixed(4)})`;
  }

  const overlay14 = document.getElementById('t14-overlay');
  if (overlay14) overlay14.style.opacity = interpolate(f, [30, 70], [0, 1], { clamp: true, easing: easeInOut });

  const logo14 = document.getElementById('t14-logo');
  if (logo14) logo14.style.opacity = interpolate(f, [120, 160], [0, 0.75], { clamp: true, easing: easeInOut });

  const hl14 = document.getElementById('t14-headline');
  if (hl14) hl14.style.opacity = interpolate(f, [150, 185], [0, 1], { clamp: true, easing: easeInOut });

  const hlWord14 = document.getElementById('t14-hl-word');
  if (hlWord14 && f >= 180) {
    const sa = interpolate(f, [180, 210], [0, 1], { clamp: true });
    const so = Math.sin((f - 180) * 0.18) * sa;
    const gs = (6 + so * 6).toFixed(1);
    hlWord14.style.textShadow = `0 0 ${gs}px rgba(197,160,89,${(0.5 + so * 0.3).toFixed(2)}),0 0 ${(parseFloat(gs) * 2).toFixed(1)}px rgba(197,160,89,0.15)`;
  }

  const sup14 = document.getElementById('t14-support');
  if (sup14) sup14.style.opacity = interpolate(f, [180, 220], [0, 1], { clamp: true, easing: easeInOut });

  const badge14 = document.getElementById('t14-badge');
  if (badge14) badge14.style.opacity = interpolate(f, [210, 245], [0, 1], { clamp: true, easing: easeInOut });

  const cta14 = document.getElementById('t14-cta');
  if (cta14) cta14.style.opacity = interpolate(f, [240, 278], [0, 1], { clamp: true, easing: easeInOut });

  const vig14 = document.getElementById('t14-vignette');
  if (vig14) vig14.style.opacity = interpolate(f, [90, 300], [0, 0.6], { clamp: true, easing: easeInOut });

  if (f >= 280) {
    for (let i = 0; i < 18; i++) {
      const lp = document.getElementById(`t14-lp-${i}`);
      if (!lp) continue;
      const baseY  = parseFloat(lp.dataset.by);
      const driftY = (f - 280) * (0.4 + (i % 3) * 0.2);
      const flickOp = 0.3 + 0.4 * Math.sin((f - 280) * 0.25 + i * 0.8);
      const appOp   = interpolate(f, [280, 295], [0, 1], { clamp: true });
      lp.style.top     = ((baseY - driftY + 564) % 564) + 'px';
      lp.style.opacity = (appOp * Math.max(0, flickOp)).toFixed(3);
    }
  }
}


// ── Template 15: Dust of Time ─────────────────────────────────────────────────
// 50+ warm particles drift UPWARD, photo revealed underneath as dust lifts away

const T15_PARTICLES = (() => {
  const rng = seededRand(15);
  return Array.from({ length: 55 }, (_, i) => ({
    x:    rng() * 100,        // % across canvas
    startY: 80 + rng() * 25,  // % down canvas (start near bottom)
    size: 2 + rng() * 4,      // 2-6px
    speed: 0.18 + rng() * 0.22, // % per frame upward
    drift: (rng() - 0.5) * 0.12, // horizontal sway per frame
    color: ['#C5A059','#D4A84B','#F5F0E0','#8B6F47','#E8C870','#BF9040'][Math.floor(rng() * 6)],
    phase: rng() * Math.PI * 2, // sin-wave phase for gentle horizontal oscillation
    opacity: 0.55 + rng() * 0.45,
    delay: Math.floor(rng() * 40), // frame delay before particle appears
  }));
})();

function initTemplate15(canvas) {
  const words = C.headline.split(' ');
  const hlIdx = words.findIndex(w => w.toLowerCase().includes(C.highlight.toLowerCase().split(' ')[0]));

  canvas.innerHTML = `
    <!-- Warm background -->
    <div id="t15-bg" style="position:absolute;inset:0;background:linear-gradient(180deg,#1a1208 0%,#2a1e10 50%,#1a1208 100%);"></div>

    <!-- Photo layer, revealed as particles lift -->
    <div id="t15-photo-wrap" style="position:absolute;top:55px;left:16px;right:16px;height:200px;border-radius:10px;overflow:hidden;opacity:0;">
      ${getPhotoUrl() ? `<img src="${getPhotoUrl()}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${T.surface},${T.gradient_to});"></div>`}
    </div>
    <!-- Warm glow behind photo -->
    <div id="t15-photo-glow" style="position:absolute;top:45px;left:6px;right:6px;height:220px;border-radius:16px;background:radial-gradient(ellipse,rgba(197,160,89,0.35) 0%,transparent 70%);opacity:0;pointer-events:none;"></div>

    <!-- Particle container -->
    <div id="t15-particles" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;"></div>

    <!-- Logo at bottom — grounded, memorial plaque feel -->
    <div id="t15-logo" style="position:absolute;bottom:68px;left:50%;transform:translateX(-50%);opacity:0;display:flex;align-items:center;justify-content:center;height:28px;">
      ${getLogoUrl() ? `<img src="${getLogoUrl()}" style="max-height:24px;max-width:110px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(197,160,89,0.5));">` : `<span style="font-size:11px;font-weight:800;letter-spacing:1.5px;color:#C5A059;">${BRAND}</span>`}
    </div>

    <!-- Badge near logo -->
    <div id="t15-badge" style="position:absolute;bottom:98px;left:50%;transform:translateX(-50%);opacity:0;padding:3px 10px;background:${T.badge_bg};border-radius:20px;font-size:9px;font-weight:700;color:${T.badge_text};letter-spacing:0.5px;white-space:nowrap;">${C.badge}</div>

    <!-- Headline — above photo, word by word -->
    <div id="t15-headline" style="position:absolute;top:270px;left:16px;right:16px;font-size:15px;font-weight:800;color:#F5F0E0;line-height:1.4;text-align:center;">
      ${words.map((w, i) => {
        const isHl = i === hlIdx || (hlIdx >= 0 && C.highlight.includes(w));
        return `<span id="t15-word-${i}" style="display:inline;opacity:0;${isHl ? `color:#D4A84B;text-shadow:0 0 12px rgba(212,168,75,0.7);` : ''}">${w}${i < words.length - 1 ? ' ' : ''}</span>`;
      }).join('')}
    </div>

    <!-- Support text — italic, warm -->
    <div id="t15-support" style="position:absolute;top:340px;left:20px;right:20px;font-size:10px;font-style:italic;color:rgba(245,240,224,0.75);line-height:1.6;text-align:center;opacity:0;">${C.support}</div>

    <!-- CTA at very bottom -->
    <div id="t15-cta" style="position:absolute;bottom:16px;left:20px;right:20px;padding:11px 16px;background:${T.cta_bg};border-radius:${T.chrome ? '8px' : '8px'};font-size:12px;font-weight:700;color:${T.cta_text};text-align:center;opacity:0;">${C.cta}</div>
  `;

  // Build particle DOM
  const particleContainer = document.getElementById('t15-particles');
  T15_PARTICLES.forEach((p, i) => {
    const dot = document.createElement('div');
    dot.id = `t15-p-${i}`;
    dot.style.cssText = `position:absolute;width:${p.size}px;height:${p.size}px;border-radius:50%;background:${p.color};left:${p.x}%;bottom:${100 - p.startY}%;opacity:0;pointer-events:none;`;
    particleContainer.appendChild(dot);
  });
}

function renderTemplate15(frame) {
  const f = frame;

  // Animate particles upward
  T15_PARTICLES.forEach((p, i) => {
    const dot = document.getElementById(`t15-p-${i}`);
    if (!dot) return;
    const activeF = f - p.delay;
    if (activeF < 0) { dot.style.opacity = '0'; return; }

    // Y position drifts upward from startY
    const yPct = p.startY - activeF * p.speed;
    // Gentle horizontal oscillation
    const xOffset = Math.sin(activeF * 0.07 + p.phase) * 1.8;
    const xPct = p.x + activeF * p.drift + xOffset;

    // Particle density decreases: dense 0-30, thinning 30-100
    const densityFactor = f < 100 ? 1 : interpolate(f, [100, 200], [1, 0.3], { clamp: true });
    // Individual particle fade based on how high it's traveled
    const lifeFade = yPct < 10 ? interpolate(yPct, [10, 0], [1, 0], { clamp: true }) : 1;
    const opacityVal = p.opacity * densityFactor * lifeFade * clamp(activeF / 5, 0, 1);

    dot.style.opacity = opacityVal;
    dot.style.left = `${clamp(xPct, -2, 102)}%`;
    dot.style.bottom = `${clamp(100 - yPct, -5, 110)}%`;
  });

  // Photo reveal underneath (opacity rises as particles clear)
  const photoWrap = document.getElementById('t15-photo-wrap');
  if (photoWrap) {
    const photoOpacity = interpolate(f, [20, 70], [0.4, 1], { clamp: true, easing: easeInOut });
    photoWrap.style.opacity = photoOpacity;
  }

  // Warm glow around photo
  const photoGlow = document.getElementById('t15-photo-glow');
  if (photoGlow) {
    photoGlow.style.opacity = interpolate(f, [60, 100], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Logo at bottom (grounded)
  const logo = document.getElementById('t15-logo');
  if (logo) {
    logo.style.opacity = interpolate(f, [90, 130], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Headline words, 10-frame stagger
  const words = C.headline.split(' ');
  words.forEach((_, i) => {
    const wordEl = document.getElementById(`t15-word-${i}`);
    if (!wordEl) return;
    const startF = 120 + i * 10;
    wordEl.style.opacity = interpolate(f, [startF, startF + 14], [0, 1], { clamp: true, easing: easeInOut });
  });

  // Badge
  const badge = document.getElementById('t15-badge');
  if (badge) {
    badge.style.opacity = interpolate(f, [150, 190], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Support text
  const support = document.getElementById('t15-support');
  if (support) {
    support.style.opacity = interpolate(f, [180, 220], [0, 1], { clamp: true, easing: easeInOut });
  }

  // CTA
  const cta = document.getElementById('t15-cta');
  if (cta) {
    cta.style.opacity = interpolate(f, [210, 260], [0, 1], { clamp: true, easing: easeInOut });
  }
}

function renderTemplate16(frame) {
  const f = frame;

  // Grayscale decreases as color spreads (frame 30-90)
  const colorP = interpolate(f, [30, 90], [0, 1], { clamp: true, easing: easeInOut });
  const photoInner = document.getElementById('t16-photo-inner');
  if (photoInner) {
    const grayscale = 1 - colorP;
    const sepia = (1 - colorP) * 0.3;
    photoInner.style.filter = `grayscale(${grayscale}) sepia(${sepia})`;
  }

  // Frame border transitions from faded to golden
  const photoFrame = document.getElementById('t16-photo-frame');
  if (photoFrame) {
    const borderAlpha = interpolate(f, [80, 120], [0.3, 1], { clamp: true });
    photoFrame.style.borderColor = `rgba(212,168,75,${borderAlpha})`;
    if (f >= 80 && f <= 120) {
      photoFrame.style.boxShadow = `0 0 ${interpolate(f,[80,100],[0,12],[{clamp:true}])}px rgba(197,160,89,0.4)`;
    }
  }

  // Glow pulse once at full color (frame 80-120)
  const glowEl = document.getElementById('t16-glow');
  if (glowEl) {
    const glowPeak = interpolate(f, [80, 100], [0, 1], { clamp: true, easing: easeInOut });
    const glowFade = f > 100 ? interpolate(f, [100, 130], [1, 0], { clamp: true, easing: easeOut }) : 1;
    const glowIntensity = glowPeak * glowFade;
    glowEl.style.boxShadow = `0 0 ${glowIntensity * 30}px rgba(197,160,89,${glowIntensity * 0.5})`;
  }

  // Warm pulsing glow on hold (frame 270-300), subtle 2% oscillation
  if (f >= 270 && glowEl) {
    const pulseAmt = Math.sin((f - 270) * 0.18) * 0.02 + 0.03;
    glowEl.style.boxShadow = `0 0 ${pulseAmt * 400}px rgba(197,160,89,${pulseAmt * 8})`;
  }

  // Logo
  const logo = document.getElementById('t16-logo');
  if (logo) {
    logo.style.opacity = interpolate(f, [110, 150], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Headline words materialize slowly
  const words = C.headline.split(' ');
  words.forEach((_, i) => {
    const wordEl = document.getElementById(`t16-word-${i}`);
    if (!wordEl) return;
    const startF = 140 + i * 12;
    wordEl.style.opacity = interpolate(f, [startF, startF + 18], [0, 1], { clamp: true, easing: easeInOut });
  });

  // Support
  const support = document.getElementById('t16-support');
  if (support) {
    support.style.opacity = interpolate(f, [170, 210], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Badge
  const badge = document.getElementById('t16-badge');
  if (badge) {
    badge.style.opacity = interpolate(f, [200, 240], [0, 1], { clamp: true, easing: easeInOut });
  }

  // CTA

  if (cta) {

function renderTemplate17(frame) {
  const f = frame;

  // Album cover opens (rotateY from 0 to -90 deg over frames 20-60)
  const coverEl = document.getElementById('t17-cover');
  const coverWrap = document.getElementById('t17-cover-wrap');
  if (coverEl) {
    const openP = interpolate(f, [20, 60], [0, 1], { clamp: true, easing: easeInOut });
    const rotY = interpolate(openP, [0, 1], [0, -90]);
    coverEl.style.transform = `perspective(700px) rotateY(${rotY}deg)`;
    // After fully open, hide cover
    if (f > 70) coverEl.style.opacity = interpolate(f, [70, 85], [1, 0], { clamp: true });
  }

  // Corner mounting brackets appear
  const corners = ['t17-corner-tl','t17-corner-tr','t17-corner-bl','t17-corner-br'];
  const cornerDelays = [0, 6, 10, 16];
  corners.forEach((id, i) => {
    const c = document.getElementById(id);
    if (!c) return;
    const startF = 50 + cornerDelays[i];
    const p = interpolate(f, [startF, startF + 20], [0, 1], { clamp: true, easing: easeInOut });
    c.style.opacity = p;
    c.style.transform = `scale(${interpolate(p, [0,1], [0.7, 1])})`;
  });

  // Photo slides in from right
  const photoWrap = document.getElementById('t17-photo-wrap');
  if (photoWrap) {
    const slideP = interpolate(f, [80, 130], [0, 1], { clamp: true, easing: easeInOut });
    const tx = interpolate(slideP, [0, 1], [100, 0]);
    photoWrap.style.transform = `translateX(${tx}%)`;
    photoWrap.style.opacity = clamp(slideP * 2, 0, 1);
  }

  // Logo on page
  const logo = document.getElementById('t17-logo');
  if (logo) {
    logo.style.opacity = interpolate(f, [75, 110], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Headline word by word (italic, handwritten style)
  const words = C.headline.split(' ');
  words.forEach((_, i) => {
    const wordEl = document.getElementById(`t17-word-${i}`);
    if (!wordEl) return;
    const startF = 120 + i * 10;
    wordEl.style.opacity = interpolate(f, [startF, startF + 16], [0, 1], { clamp: true, easing: easeInOut });
  });

  // Support / caption
  const support = document.getElementById('t17-support');
  if (support) {
    support.style.opacity = interpolate(f, [150, 190], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Badge stamp
  const badge = document.getElementById('t17-badge');
  if (badge) {
    badge.style.opacity = interpolate(f, [180, 220], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Album page zoom in gently (scale 1 -> 1.05 over frames 210-260)
  const page = document.getElementById('t17-page');
  if (page && f >= 210) {
    const zoomP = interpolate(f, [210, 260], [1, 1.05], { clamp: true, easing: easeInOut });
    page.style.transform = `scale(${zoomP})`;
    page.style.transformOrigin = 'center 45%';
  }
  // Also zoom the photo and text content elements
  ['t17-photo-wrap','t17-corner-tl','t17-corner-tr','t17-corner-bl','t17-corner-br','t17-headline','t17-support','t17-badge','t17-logo'].forEach(id => {
    const el = document.getElementById(id);
    if (el && f >= 210) {
      const zoomP = interpolate(f, [210, 260], [1, 1.05], { clamp: true, easing: easeInOut });
      // Preserve existing transform by using transform-origin-agnostic approach
      const base = el.dataset.baseTransform || el.style.transform.replace(/scale\([^)]*\)/g,'').trim();
      el.dataset.baseTransform = base;
      el.style.transform = `${base} scale(${zoomP})`.trim();
      el.style.transformOrigin = 'center 45%';
    }
  });

  // Subtle paper breathe on hold (very slight translateY oscillation)
  if (f >= 290 && page) {
    const breathe = Math.sin((f - 290) * 0.15) * 0.5;
    const zoomP = 1.05;
    page.style.transform = `scale(${zoomP}) translateY(${breathe}px)`;
  }

  // CTA
  const cta = document.getElementById('t17-cta');
  if (cta) {
    cta.style.opacity = interpolate(f, [250, 290], [0, 1], { clamp: true, easing: easeInOut });
  }
}


// ── Template 18: Face to Face ─────────────────────────────────────────────────
// Horizontal sliver opens to reveal face, then slow zoom-out from close-up

const T18_PARTICLES = (() => {
  const rng = seededRand(18);
  return Array.from({ length: 20 }, () => ({
    x: 10 + rng() * 80,
    y: 60 + rng() * 30,
    size: 1.5 + rng() * 2.5,
    vx: (rng() - 0.5) * 0.08,
    vy: -0.06 - rng() * 0.08,
    phase: rng() * Math.PI * 2,
    color: ['rgba(197,160,89,0.6)','rgba(212,168,75,0.5)','rgba(245,240,224,0.4)'][Math.floor(rng() * 3)],
  }));
})();

      }).join('')}
      ${hlIdx >= 0 ? `<div id="t18-underline" style="margin-top:3px;height:2px;background:linear-gradient(90deg,transparent,#D4A84B,transparent);transform:scaleX(0);transform-origin:left;border-radius:1px;opacity:0;"></div>` : ''}
    </div>

    <!-- Support text -->
    <div id="t18-support" style="position:absolute;bottom:70px;left:20px;right:20px;font-size:10px;color:rgba(245,240,224,0.7);line-height:1.6;text-align:center;opacity:0;">${C.support}</div>

  // Build warm particles

  T18_PARTICLES.forEach((p, i) => {
    const dot = document.createElement('div');
    dot.id = `t18-p-${i}`;
    dot.style.cssText = `position:absolute;width:${p.size}px;height:${p.size}px;border-radius:50%;background:${p.color};left:${p.x}%;top:${p.y}%;opacity:0;pointer-events:none;`;
    particleContainer.appendChild(dot);
  });
}

function renderTemplate18(frame) {
  const f = frame;

  // Sliver expansion: clip-path inset(45% 0 45% 0) -> inset(0 0 0 0) over frames 15-50
  const sliverP = interpolate(f, [15, 50], [0, 1], { clamp: true, easing: easeInOut });
  const insetPct = interpolate(sliverP, [0, 1], [45, 0]);

  // Blur decrease simultaneously
  const blurVal = interpolate(f, [15, 50], [20, 0], { clamp: true, easing: easeInOut });

  // Zoom-out from scale 1.5 to 1.0 over frames 70-120
  const zoomP = interpolate(f, [70, 120], [1.5, 1.0], { clamp: true, easing: easeInOut });

  const photoClip = document.getElementById('t18-photo-clip');
  if (photoClip) {
    photoClip.style.clipPath = `inset(${insetPct}% 0 ${insetPct}% 0)`;
    photoClip.style.filter = `blur(${blurVal}px)`;
    photoClip.style.transform = `scale(${zoomP})`;
  }

  // Initial black: photo invisible before frame 0 sliver opens
  if (photoClip && f < 15) {
    photoClip.style.clipPath = `inset(45% 0 45% 0)`;
    photoClip.style.opacity = interpolate(f, [0, 8], [0, 1], { clamp: true });
  }

  // Vignette deepens on hold
  const vignette = document.getElementById('t18-vignette');
  if (vignette) {
    vignette.style.opacity = interpolate(f, [240, 270], [0, 0.6], { clamp: true, easing: easeInOut });
  }

  // Warm particles drift in hold phase
  if (f >= 240) {
    T18_PARTICLES.forEach((p, i) => {
      const dot = document.getElementById(`t18-p-${i}`);
      if (!dot) return;
      const activeF = f - 240;
      const x = p.x + p.vx * activeF + Math.sin(activeF * 0.06 + p.phase) * 0.8;
      const y = p.y + p.vy * activeF;
      const opacity = clamp(activeF / 15, 0, 1) * (y < 5 ? clamp((y) / 5, 0, 1) : 1) * 0.7;
      dot.style.left = `${x}%`;
      dot.style.top = `${y}%`;
      dot.style.opacity = opacity;
    });
  }

  // Logo — very small at top, appears after zoom-out
  const logo = document.getElementById('t18-logo');
  if (logo) {
    logo.style.opacity = interpolate(f, [110, 150], [0, 1], { clamp: true, easing: easeInOut });
  }

  // Headline words fade in
  const words = C.headline.split(' ');
  words.forEach((_, i) => {
    const wordEl = document.getElementById(`t18-word-${i}`);
    if (!wordEl) return;
    const startF = 140 + i * 10;
    wordEl.style.opacity = interpolate(f, [startF, startF + 16], [0, 1], { clamp: true, easing: easeInOut });
  });

  // Underline draws itself
  const underline = document.getElementById('t18-underline');
  if (underline) {
    const drawP = interpolate(f, [165, 190], [0, 1], { clamp: true, easing: easeInOut });
    underline.style.transform = `scaleX(${drawP})`;
    underline.style.opacity = interpolate(f, [163, 168], [0, 1], { clamp: true });
  }

  // Support text
  const support = document.getElementById('t18-support');
  if (support) {
    support.style.opacity = interpolate(f, [170, 210], [0, 1], { clamp: true, easing: easeInOut });
  }

  // CTA
  const cta = document.getElementById('t18-cta');
  if (cta) {
    cta.style.opacity = interpolate(f, [200, 240], [0, 1], { clamp: true, easing: easeInOut });
  }
}


// ─── POSTMESSAGE API (for iframe embedding in editor) ────────────────────────

const isEmbedded = window.parent !== window;

window.addEventListener('message', (e) => {
  const msg = e.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'switchTemplate') {
    const id = msg.templateId;
    if (id >= 1 && id <= 18) {
      document.querySelectorAll('.tmpl-tab').forEach(t => t.classList.remove('active'));
      const btn = document.querySelector(`.tmpl-tab[data-tmpl="${id}"]`);
      if (btn) btn.classList.add('active');
      currentTemplate = id;
      updateSidebar(id);
      pause();
      frame = 0;
      buildTemplate(id);
      applyLogoVisibility();
      setFrame(0);
      play();
    }
  }

  if (msg.type === 'updateLayout') {
    const L = msg.layout || {};
    const canvas = document.getElementById('canvas');
    if (!canvas) return;
    const cw = canvas.clientWidth || 260;
    const ch = canvas.clientHeight || 564;

    // Apply position overrides to elements
    const applyPos = (el, pos) => {
      if (!el || !pos) return;
      if (pos.x !== undefined) {
        el.style.left = (pos.x / 100 * cw) + 'px';
        el.style.transform = el.style.transform.replace(/translateX\([^)]*\)/g, '') || '';
      }
      if (pos.y !== undefined) {
        el.style.top = (pos.y / 100 * ch) + 'px';
      }
      if (pos.scale !== undefined) {
        const s = pos.scale / 100;
        const existing = el.style.transform.replace(/scale\([^)]*\)/g, '');
        el.style.transform = existing + ` scale(${s})`;
      }
    };

    // Templates 1-5 JS refs
    if (L.logo) {
      applyPos(t1Els.logo, L.logo);
      applyPos(t2Els.logo, L.logo);
      applyPos(t3Els.logo, L.logo);
      if (t4Els.masthead) applyPos(t4Els.masthead, L.logo);
    }
    if (L.badge) {
      applyPos(t1Els.badge, L.badge);
      applyPos(t2Els.badge, L.badge);
      applyPos(t3Els.badge, L.badge);
      if (t4Els.badgeSticker) applyPos(t4Els.badgeSticker, L.badge);
    }
    if (L.photo) {
      applyPos(t1Els.polaroidWrap, L.photo);
      if (t2Els.photoContainer) applyPos(t2Els.photoContainer, L.photo);
      applyPos(t3Els.photo, L.photo);
      applyPos(t4Els.photo, L.photo);
    }
    if (L.headline) {
      applyPos(t1Els.headlineWrap, L.headline);
      if (t2Els.headline) applyPos(t2Els.headline, L.headline);
      if (t3Els.wordContainer) applyPos(t3Els.wordContainer, L.headline);
      if (t4Els.headline) applyPos(t4Els.headline, L.headline);
    }
    if (L.support) {
      applyPos(t1Els.support, L.support);
      applyPos(t2Els.support, L.support);
      if (t3Els.supportContainer) applyPos(t3Els.supportContainer, L.support);
    }
    if (L.cta) {
      applyPos(t1Els.cta, L.cta);
      applyPos(t2Els.cta, L.cta);
      applyPos(t3Els.cta, L.cta);
      applyPos(t4Els.cta, L.cta);
    }

    // Templates 6-10 ID-based
    const idMap = {
      logo: ['t6-logo','t6-logo-bottom','t7-logo-strip','t8-logo','t8-logo-bottom','t9-logo','t9-logo-bottom'],
      badge: ['t6-badge','t7-badge-strip','t8-badge','t9-badge-wrap'],
      photo: ['t6-photo-small','t8-photo','t9-photo-wrap'],
      headline: ['t6-headline','t8-headline','t9-headline-wrap'],
      support: ['t6-support','t8-support','t9-support-wrap'],
      cta: ['t6-cta-wrap','t8-cta','t9-cta-wrap']
    };
    for (const [key, ids] of Object.entries(idMap)) {
      if (L[key]) {
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) applyPos(el, L[key]);
        });
      }
    }
  }

  if (msg.type === 'updateStyle') {
    // Apply style overrides via CSS on the current template's elements
    const s = msg.style || {};
    const canvas = document.getElementById('canvas');
    if (!canvas) return;

    // Headline font size & weight & transform
    canvas.querySelectorAll('[id*=headline], [id*=hl-], [id*=Headline]').forEach(el => {
      if (s.headlineFontSize) el.style.fontSize = s.headlineFontSize + 'px';
      if (s.headlineFontWeight) el.style.fontWeight = s.headlineFontWeight;
      if (s.headlineTextTransform) el.style.textTransform = s.headlineTextTransform;
    });
    // Also target word elements in templates that split words
    canvas.querySelectorAll('[id*=word], [id*=Word]').forEach(el => {
      if (s.headlineFontSize) el.style.fontSize = s.headlineFontSize + 'px';
      if (s.headlineFontWeight) el.style.fontWeight = s.headlineFontWeight;
    });

    // Support text
    canvas.querySelectorAll('[id*=support], [id*=Support]').forEach(el => {
      if (s.supportFontSize) el.style.fontSize = s.supportFontSize + 'px';
      if (s.supportFontWeight) el.style.fontWeight = s.supportFontWeight;
    });

    // CTA
    canvas.querySelectorAll('[id*=cta], [id*=Cta], [id*=CTA]').forEach(el => {
      if (s.ctaFontSize) el.style.fontSize = s.ctaFontSize + 'px';
      if (s.ctaFontWeight) el.style.fontWeight = s.ctaFontWeight;
      if (s.ctaRadius !== undefined) el.style.borderRadius = s.ctaRadius + 'px';
      if (s.ctaWidth) el.style.width = s.ctaWidth + '%';
      if (s.ctaHeight) el.style.height = s.ctaHeight + 'px';
    });

    // Badge
    canvas.querySelectorAll('[id*=badge], [id*=Badge]').forEach(el => {
      if (s.badgeFontSize) el.style.fontSize = s.badgeFontSize + 'px';
    });

    // For templates 1-5 using JS refs, apply directly
    if (t1Els.headlineWrap && s.headlineFontSize) t1Els.headlineWrap.style.fontSize = s.headlineFontSize + 'px';
    if (t1Els.support && s.supportFontSize) t1Els.support.style.fontSize = s.supportFontSize + 'px';
    if (t1Els.cta) {
      if (s.ctaFontSize) t1Els.cta.style.fontSize = s.ctaFontSize + 'px';
      if (s.ctaRadius !== undefined) t1Els.cta.style.borderRadius = s.ctaRadius + 'px';
    }
    if (t1Els.badge && s.badgeFontSize) t1Els.badge.style.fontSize = s.badgeFontSize + 'px';

    if (t2Els.headline && s.headlineFontSize) t2Els.headline.style.fontSize = s.headlineFontSize + 'px';
    if (t2Els.support && s.supportFontSize) t2Els.support.style.fontSize = s.supportFontSize + 'px';
    if (t2Els.cta) {
      if (s.ctaFontSize) t2Els.cta.style.fontSize = s.ctaFontSize + 'px';
      if (s.ctaRadius !== undefined) t2Els.cta.style.borderRadius = s.ctaRadius + 'px';
    }

    if (t3Els.wordContainer && s.headlineFontSize) {
      t3Els.wordEls?.forEach(w => { w.style.fontSize = s.headlineFontSize + 'px'; });
    }
    if (t3Els.cta) {
      if (s.ctaFontSize) t3Els.cta.style.fontSize = s.ctaFontSize + 'px';
      if (s.ctaRadius !== undefined) t3Els.cta.style.borderRadius = s.ctaRadius + 'px';
    }

    // Photo height (value is % of canvas height; canvas is ~564px tall)
    if (s.photoHeight !== undefined) {
      const h = (s.photoHeight / 100 * 564) + 'px';
      // ID-based query for templates 6-10
      canvas.querySelectorAll('[id*=photo], [id*=Photo]').forEach(el => {
        el.style.height = h;
      });
      // JS-ref approach for templates 1-5
      if (t2Els.photoContainer) t2Els.photoContainer.style.height = h;
      if (t3Els.photo) t3Els.photo.style.height = h;
      if (t4Els.photo) t4Els.photo.style.height = h;
      // t1 polaroid: scale proportionally via width to preserve aspect ratio
      if (t1Els.polaroidWrap) t1Els.polaroidWrap.style.height = h;
    }

    // Logo size (value in px)
    if (s.logoSize !== undefined) {
      // ID-based query for templates 6-10
      canvas.querySelectorAll('[id*=logo], [id*=Logo]').forEach(el => {
        const img = el.querySelector('img');
        if (img) {
          img.style.maxHeight = s.logoSize + 'px';
          img.style.maxWidth = s.logoSize + 'px';
        }
      });
      // JS-ref approach for templates 1-5
      [t1Els.logo, t2Els.logo, t3Els.logo].forEach(el => {
        if (el) {
          const img = el.querySelector('img');
          if (img) {
            img.style.maxHeight = s.logoSize + 'px';
            img.style.maxWidth = s.logoSize + 'px';
          }
          el.style.width = s.logoSize + 'px';
        }
      });
    }

    // Content padding (value in px)
    if (s.contentPadding !== undefined) {
      canvas.querySelectorAll('[id*=content], [id*=Content]').forEach(el => {
        el.style.padding = s.contentPadding + 'px';
      });
    }

    // Element gap (value in px)
    if (s.elementGap !== undefined) {
      canvas.querySelectorAll('[id*=content], [id*=Content], [id*=wrap], [id*=Wrap], [id*=container], [id*=Container]').forEach(el => {
        const display = window.getComputedStyle(el).display;
        if (display === 'flex' || display === 'grid') {
          el.style.gap = s.elementGap + 'px';
        }
      });
    }
  }

  if (msg.type === 'updateData') {
    // Update the global data from editor state
    if (msg.copy) Object.assign(AD.copy, msg.copy);
    if (msg.designTokens) Object.assign(AD.designTokens, msg.designTokens);
    if (msg.assets) Object.assign(AD.assets, msg.assets);
    if (msg.brandContext) Object.assign(AD.brandContext, msg.brandContext);
    // Update shortcut refs
    Object.assign(T, AD.designTokens);
    Object.assign(C, AD.copy);
    Object.assign(B, AD.brandContext);
    // Rebuild current template with new data
    const wasPlaying = isPlaying;
    const currentF = frame;
    pause();
    buildTemplate(currentTemplate);
    applyLogoVisibility();
    setFrame(0);
    if (wasPlaying) play();
  }

  if (msg.type === 'toggleLogo') {
    showLogo = msg.show;
    applyLogoVisibility();
  }

  if (msg.type === 'play') play();
  if (msg.type === 'pause') pause();
  if (msg.type === 'restart') restart();
  if (msg.type === 'setFrame') setFrame(msg.frame || 0);
});

function applyLogoVisibility() {
    const logoIds = ['t1-logo','t2-logo','t3-logo','t4-masthead','t5-logoContainer',
                     't6-logo','t6-wm','t6-logo-bottom','t7-logo-strip',
                     't8-logo','t8-logo-bottom','t8-logo-ghost1','t8-logo-ghost2','t8-logo-ghost3',
                     't9-logo','t9-logo-bottom','t10-logo-area',
                     't11-logo','t12-logo','t12-ornline','t13-logo','t14-logo',
                     't15-logo','t16-logo','t17-logo','t18-logo'];
    const show = showLogo;
    logoIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = show ? '' : 'none';
    });
    // For templates 1-5 which use JS refs
    if (typeof t1Els !== 'undefined' && t1Els.logo) t1Els.logo.style.display = show ? '' : 'none';
    if (typeof t1Els !== 'undefined' && t1Els.logoShadow) t1Els.logoShadow.style.display = show ? '' : 'none';
    if (typeof t2Els !== 'undefined' && t2Els.logo) t2Els.logo.style.display = show ? '' : 'none';
    if (typeof t3Els !== 'undefined' && t3Els.logo) t3Els.logo.style.display = show ? '' : 'none';
    if (typeof t4Els !== 'undefined' && t4Els.masthead) t4Els.masthead.style.display = show ? '' : 'none';
    if (typeof t4Els !== 'undefined' && t4Els.bottomLogo) t4Els.bottomLogo.style.display = show ? '' : 'none';
    if (typeof t5Els !== 'undefined' && t5Els.logoContainer) t5Els.logoContainer.style.display = show ? '' : 'none';
}

// If embedded, hide header/sidebar — keep stage and controls visible
if (isEmbedded) {
  const header = document.getElementById('header');
  const sidebar = document.getElementById('sidebar');
  if (header) header.style.display = 'none';
  if (sidebar) sidebar.style.display = 'none';
  // Make main fill viewport without sidebar
  const main = document.getElementById('main');
  if (main) main.style.display = 'block';
  // Tell parent we're ready
  window.parent.postMessage({ type: 'templateReady' }, '*');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

buildTemplate(1);
updateSidebar(1);
setFrame(0);
play();
</script>
