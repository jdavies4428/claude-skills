<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a1a;
  --panel: #12122a;
  --panel-alt: #0e0e20;
  --border: #1e1e3a;
  --accent: #7c3aed;
  --accent-bright: #a855f7;
  --text: #e8e8f0;
  --text-muted: #8888aa;
  --text-dim: #44446a;
  --radius: 8px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── Header ─── */
#header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  height: 52px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

#header .logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
  white-space: nowrap;
}
#header .logo span { color: #a855f7; }

.template-tabs {
  display: flex;
  gap: 4px;
  margin-left: auto;
}

.tab-btn {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.tab-btn:hover { border-color: var(--accent-bright); color: var(--text); }
.tab-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ─── Main Area ─── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── Center Stage ─── */
#stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 24px;
  overflow: hidden;
}

/* Phone Frame */
#phone-wrap {
  position: relative;
  flex-shrink: 0;
}

#phone-frame {
  width: 270px;
  height: 585px;
  background: #111;
  border-radius: 36px;
  border: 8px solid #1a1a2e;
  box-shadow:
    0 0 0 2px #0a0a14,
    0 30px 80px rgba(0,0,0,0.8),
    inset 0 0 0 1px #2a2a44;
  overflow: hidden;
  position: relative;
}

/* Notch */
#phone-frame::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 22px;
  background: #111;
  border-radius: 0 0 16px 16px;
  z-index: 100;
}

#canvas {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
  background: #261d1a;
}

/* ─── Controls ─── */
#controls {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  width: 100%;
  max-width: 500px;
}

.ctrl-btn {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel-alt);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  transition: all 0.12s ease;
}
.ctrl-btn:hover { border-color: var(--accent-bright); color: var(--accent-bright); }

#timeline-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

#timeline {
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

#timeline-progress {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-bright));
  border-radius: 2px;
  width: 0%;
  pointer-events: none;
}

#timeline-thumb {
  position: absolute;
  top: 50%;
  width: 10px;
  height: 10px;
  background: #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  left: 0%;
}

.frame-info {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-dim);
  font-family: monospace;
}

/* ─── Right Sidebar ─── */
#sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--panel);
  border-left: 1px solid var(--border);
  padding: 20px 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.info-card {
  background: var(--panel-alt);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}

.info-card h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-bright);
  margin-bottom: 4px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.template-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}

.template-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
}

.features-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 10px;
}

.features-list li {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: flex-start;
  gap: 7px;
  line-height: 1.4;
}

.features-list li::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent-bright);
  margin-top: 5px;
  flex-shrink: 0;
}

.packages-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
}

.pkg-tag {
  padding: 3px 8px;
  background: rgba(124, 58, 237, 0.2);
  border: 1px solid rgba(124, 58, 237, 0.4);
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
  color: var(--accent-bright);
}

.duration-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  background: rgba(168, 85, 247, 0.15);
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 20px;
  font-size: 11px;
  color: #c084fc;
  margin-bottom: 10px;
}

.scene-timeline {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.scene-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}

.scene-bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.scene-fill {
  height: 100%;
  border-radius: 3px;
  position: absolute;
  top: 0;
}

.scene-label {
  color: var(--text-dim);
  width: 80px;
  flex-shrink: 0;
  text-align: right;

/* ─── Scrollbar ─── */
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

function interpolate(frame, inputRange, outputRange, opts = {}) {
  const [i0, i1] = inputRange;
  const [o0, o1] = outputRange;
  let t = (frame - i0) / (i1 - i0);
  if (opts.clamp !== false) t = clamp(t, 0, 1);
  // easing
  if (opts.easing) t = opts.easing(t);
  return o0 + (o1 - o0) * t;
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function easeIn(t) { return t * t * t; }
function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

function spring(frame, { damping = 10, stiffness = 100, mass = 1, initialVelocity = 0 } = {}) {
  if (frame <= 0) return 0;
  const w0 = Math.sqrt(stiffness / mass);
  const zeta = damping / (2 * Math.sqrt(stiffness * mass));
  const t = frame / 30;
  if (zeta < 1) {
    const wd = w0 * Math.sqrt(1 - zeta * zeta);
    return 1 - Math.exp(-zeta * w0 * t) * (Math.cos(wd * t) + (zeta * w0 / wd) * Math.sin(wd * t));
  } else {
    return 1 - Math.exp(-w0 * t) * (1 + w0 * t);
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}
function rgba(hex, a) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function lerpColor(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  const r = Math.round(a.r + (b.r - a.r) * t);
  const g = Math.round(a.g + (b.g - a.g) * t);
  const bv = Math.round(a.b + (b.b - a.b) * t);
  return `rgb(${r},${g},${bv})`;
}

}

function renderTemplate6(frame) {
  const f = frame;

  // Photo peel
  const peelProgress = interpolate(f, [30, 140], [0, 1], { clamp: true, easing: easeInOut });
  const photoEl = document.getElementById('t6-photo');
  const shadowEl = document.getElementById('t6-shadow');
  if (photoEl) {
    const rotX = interpolate(peelProgress, [0, 1], [0, -35], { clamp: false });
    const rotY = interpolate(peelProgress, [0, 1], [0, 40], { clamp: false });
    const scaleX = interpolate(peelProgress, [0, 1], [1, 0.6], { clamp: false });
    if (f < 140) {
      photoEl.style.transform = `perspective(600px) rotateX(${rotX}deg) rotateY(${rotY}deg) scaleX(${scaleX})`;
      photoEl.style.opacity = interpolate(f, [140, 170], [1, 0], { clamp: true });
    } else {
      photoEl.style.opacity = interpolate(f, [140, 170], [1, 0], { clamp: true });
    }
    shadowEl.style.opacity = interpolate(peelProgress, [0, 0.5, 1], [0, 0.8, 0], { clamp: false });
  }

  // Badge slide
  const badgeEl = document.getElementById('t6-badge');
  if (badgeEl) {
    const bs = spring(f - 80, { damping: 10, stiffness: 120 });
    badgeEl.style.transform = `translateX(${interpolate(bs, [0,1], [60, 0], {clamp:false})}px)`;
    badgeEl.style.opacity = interpolate(f, [80, 95], [0, 1], { clamp: true });
  }

  // Headline clip-path wipe
  const hlEl = document.getElementById('t6-headline');
  if (hlEl) {
    const wipe = interpolate(f, [100, 150], [100, 0], { clamp: true, easing: easeOut });
    hlEl.style.clipPath = `inset(0 ${wipe}% 0 0)`;
  }

  // SVG underline
  const ulPath = document.getElementById('t6-underline-path');
  const ulSvg = document.getElementById('t6-underline');
  if (ulPath) {
    const drawP = interpolate(f, [130, 160], [220, 0], { clamp: true, easing: easeOut });
    ulPath.setAttribute('stroke-dashoffset', drawP);
    ulSvg.style.opacity = interpolate(f, [128, 135], [0, 1], { clamp: true });
  }

  // Logo at top
  const logoEl = document.getElementById('t6-logo');
  if (logoEl) logoEl.style.opacity = interpolate(f, [100, 115], [0, 1], { clamp: true });

  // Small photo appear
  const smallPhoto = document.getElementById('t6-photo-small');
  if (smallPhoto) {
    const sp = spring(f - 145, { damping: 12, stiffness: 100 });
    smallPhoto.style.opacity = clamp(sp, 0, 1);
    smallPhoto.style.transform = `scale(${interpolate(sp, [0,1], [0.92, 1], {clamp:false})})`;
  }

  // Support text char-by-char with random delays
  if (f >= 170) {
    const chars = C.support.length;
    for (let i = 0; i < chars; i++) {
      const el = document.getElementById(`t6-sc-${i}`);
      if (!el) continue;
      const delay = (i / chars) * 40 + (((i * 7) % 5) - 2); // ±2 frame jitter
      const charF = f - 170 - delay;
      el.style.opacity = interpolate(charF, [0, 4], [0, 1], { clamp: true });
    }
    const supportEl = document.getElementById('t6-support');
    if (supportEl) supportEl.style.opacity = 1;
  }

  // CTA border trace
  const ctaBorder = document.getElementById('t6-cta-border');
  const ctaFill = document.getElementById('t6-cta-fill');
  if (ctaBorder) {
    const traceP = interpolate(f, [200, 230], [0, 1], { clamp: true, easing: easeInOut });
    // Animate border via box-shadow trick for trace effect
    const col = T.cta_bg;
    const a = clamp(traceP * 2, 0, 1);
    ctaBorder.style.borderColor = rgba(col, a);
    ctaBorder.style.boxShadow = `0 0 ${traceP * 8}px ${rgba(col, traceP * 0.5)}`;
  }
  if (ctaFill) {
    const fillP = interpolate(f, [228, 240], [0, 1], { clamp: true, easing: easeOut });
    ctaFill.style.transform = `scaleX(${fillP})`;
  }

  // Logo stamp
  const logoBottom = document.getElementById('t6-logo-bottom');
  if (logoBottom) {
    const stampF = f - 240;
    const s = spring(stampF, { damping: 6, stiffness: 200 });
    logoBottom.style.opacity = interpolate(f, [240, 248], [0, 1], { clamp: true });
    logoBottom.style.transform = `scale(${interpolate(s, [0,1], [1.4, 1], {clamp:false})})`;
  }
}

// ── Template 7: The Venetian Blinds ─────────────────────────────────────────
const STRIPS = 8;

function initTemplate7(canvas) {
  const stripH = 100 / STRIPS;

  // Content for each strip (what shows after flip)
  const stripContents = [
    // Strip 0 (top): logo area
    `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${T.gradient_from};font-size:13px;font-weight:800;letter-spacing:1.5px;color:${T.badge_text};">${BRAND}</div>`,
    // Strip 1: headline part 1
    `<div style="width:100%;height:100%;display:flex;align-items:center;padding:0 20px;background:${T.surface};"><span style="font-size:15px;font-weight:800;color:${T.headline_text};line-height:1.3;">My mom's wedding</span></div>`,
    // Strip 2: headline part 2 (highlight)
    `<div style="width:100%;height:100%;display:flex;align-items:center;padding:0 20px;background:${T.gradient_to};"><span id="t7-hl-strip" style="font-size:15px;font-weight:800;color:${T.badge_text};">day. Clear enough to</span></div>`,
    // Strip 3: badge
    `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${T.badge_bg};"><span style="font-size:11px;font-weight:700;letter-spacing:1px;color:${T.badge_text};text-transform:uppercase;">${C.badge}</span></div>`,
    // Strip 4: headline part 3 (highlight word)
    `<div id="t7-hl2-strip" style="width:100%;height:100%;display:flex;align-items:center;padding:0 20px;background:${T.gradient_from};"><span style="font-size:15px;font-weight:800;color:${T.primary};">share again.</span></div>`,
    // Strip 5: support line 1
    `<div style="width:100%;height:100%;display:flex;align-items:center;padding:0 20px;background:${T.surface};"><span style="font-size:10px;color:${T.support_text};line-height:1.5;">Restore the faces, the fabric,</span></div>`,
    // Strip 6: support line 2
    `<div style="width:100%;height:100%;display:flex;align-items:center;padding:0 20px;background:${T.gradient_from};"><span style="font-size:10px;color:${T.support_text};line-height:1.5;">and the feeling in one tap.</span></div>`,
    // Strip 7 (bottom): CTA
    `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${T.cta_bg};"><span style="font-size:13px;font-weight:700;color:${T.cta_text};">${C.cta}</span></div>`
  ];

  // Background strips (before flip)
  const bgColors = [T.gradient_from, T.surface, T.gradient_to, T.surface, T.gradient_from, T.surface, T.gradient_to, T.surface];

  let html = '<div style="position:absolute;inset:0;">';
  for (let i = 0; i < STRIPS; i++) {
    const top = (i / STRIPS) * 100;
    html += `
      <div id="t7-strip-${i}" style="
        position:absolute;
        left:0;right:0;
        top:${top}%;
        height:${stripH}%;
        perspective:400px;
        border-bottom: 1px solid rgba(0,0,0,0.3);
      ">
        <div id="t7-inner-${i}" style="
          width:100%;height:100%;
          transform-style:preserve-3d;
          transform-origin:center;
          backface-visibility:hidden;
        ">
          <!-- front -->
          <div style="position:absolute;inset:0;background:${bgColors[i]};backface-visibility:hidden;"></div>
          <!-- back (content) -->
          <div style="position:absolute;inset:0;backface-visibility:hidden;transform:rotateX(180deg);">${stripContents[i]}</div>
        </div>
      </div>
    `;
  }
  html += '</div>';
  canvas.innerHTML = html;
}

function renderTemplate7(frame) {
  // Flip schedule for each strip: strip i flips at frame (10 + i*5)
  const flipStarts = [10, 15, 20, 25, 70, 85, 140, 170]; // match scene timing

  for (let i = 0; i < STRIPS; i++) {
    const inner = document.getElementById(`t7-inner-${i}`);
    if (!inner) continue;

    const fs = flipStarts[i];
    const flipDur = 30;
    const flipF = frame - fs;
    let rotX = 0;

    if (flipF < 0) {
      rotX = 0;
    } else if (flipF < flipDur) {
      // 0 -> 180 degrees
      const t = easeInOut(clamp(flipF / flipDur, 0, 1));
      rotX = t * 180;
    } else {
      rotX = 180;
    }

    inner.style.transform = `rotateX(${rotX}deg)`;

    // Pulse/vibration on highlight strip (strip 4) frames 110-150
    if (i === 4) {
      const stripEl = document.getElementById(`t7-strip-${i}`);
      if (stripEl && frame >= 110 && frame <= 150) {
        const pulseF = frame - 110;
        const osc = Math.sin(pulseF * 0.9) * 2 * interpolate(frame, [110, 150], [1, 0], { clamp: true });
        stripEl.style.transform = `translateX(${osc}px)`;
      } else if (stripEl) {
        stripEl.style.transform = 'translateX(0)';
      }
    }
  }

  // Wave settle frames 210-240
  if (frame >= 210) {
    for (let i = 0; i < STRIPS; i++) {
      const strip = document.getElementById(`t7-strip-${i}`);
      if (!strip) continue;
      const waveF = frame - 210;
      const phase = i * 0.6;
      const decay = interpolate(frame, [210, 240], [1, 0], { clamp: true });
      const wave = Math.sin(waveF * 0.25 + phase) * 3 * decay;
      strip.style.transform = `translateY(${wave}px)`;
    }
  }
}

function renderTemplate8(frame) {
  const cx = 135, cy = 292;

  // Central dot pulse
  const dot = document.getElementById('t8-dot');
  if (dot) {
    dot.style.opacity = interpolate(frame, [0, 10], [0, 1], { clamp: true });
    const pulse = 0.8 + 0.4 * Math.sin(frame * 0.4);
    dot.style.transform = `translate(-50%,-50%) scale(${pulse})`;
    dot.style.opacity = interpolate(frame, [50, 70], [1, 0], { clamp: true });
  }

  // Logo orbit inward (frame 20-60)
  const logoEl = document.getElementById('t8-logo');
  if (logoEl) {
    if (frame < 20) {
      logoEl.style.opacity = 0;
    } else if (frame <= 60) {
      const t = easeOut((frame - 20) / 40);
      const r = interpolate(t, [0, 1], [130, 0], { clamp: false });
      const angle = -Math.PI / 2 + (1 - t) * Math.PI * 3; // spiral
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;
      logoEl.style.left = px + 'px';
      logoEl.style.top = py + 'px';
      logoEl.style.opacity = clamp(t * 2, 0, 1);
    } else if (frame <= 250) {
      // Settle at top
      const floatY = Math.sin(frame * 0.05) * 2;
      logoEl.style.left = cx + 'px';
      logoEl.style.top = (38 + floatY) + 'px';
      logoEl.style.opacity = 1;
    } else {
      logoEl.style.opacity = 0;
    }
  }

  // Orbit trail ghosts
  for (let g = 1; g <= 3; g++) {
    const ghost = document.getElementById(`t8-logo-ghost${g}`);
    if (!ghost) continue;
    if (frame >= 20 && frame <= 65) {
      const backF = frame - g * 5;
      if (backF >= 20 && backF <= 60) {
        const t = easeOut((backF - 20) / 40);
        const r = interpolate(t, [0, 1], [130, 0], { clamp: false });
        const angle = -Math.PI / 2 + (1 - t) * Math.PI * 3;
        ghost.style.left = (cx + Math.cos(angle) * r) + 'px';
        ghost.style.top = (cy + Math.sin(angle) * r) + 'px';
        ghost.style.opacity = 0.3 - g * 0.08;
      } else {
        ghost.style.opacity = 0;
      }
    } else {
      ghost.style.opacity = 0;
    }
  }

  // Badge orbit (frame 50-90)
  const badgeEl = document.getElementById('t8-badge');
  if (badgeEl) {
    if (frame < 50) {
      badgeEl.style.opacity = 0;
    } else if (frame <= 90) {
      const t = easeOut((frame - 50) / 40);
      const r = interpolate(t, [0, 1], [200, 0], { clamp: false });
      const angle = Math.PI / 4 + (1 - t) * Math.PI * 1.5;
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;
      badgeEl.style.left = px + 'px';
      badgeEl.style.top = py + 'px';
      badgeEl.style.opacity = clamp(t * 3, 0, 1);
    } else {
      // Final position: top area
      const floatY = Math.sin(frame * 0.05 + 1) * 2;
      badgeEl.style.left = cx + 'px';
      badgeEl.style.top = (68 + floatY) + 'px';
      badgeEl.style.opacity = 1;
    }
  }

  // Headline words orbit in (frame 80-140)
  const wordsLayer = document.getElementById('t8-words-layer');
  const hlWrap = document.getElementById('t8-hl-wrap');
  const words = C.headline.split(' ');
  if (wordsLayer && frame >= 80) {
    // After all words arrive, show wrapped headline
    if (frame >= 145) {
      wordsLayer.style.opacity = 0;
      if (hlWrap) {
        hlWrap.style.opacity = 1;
        const hl = document.getElementById('t8-headline');
        if (hl && !hl.dataset.set) {
          hl.innerHTML = C.headline.replace(C.highlight, `<span style="color:${T.badge_bg};">${C.highlight}</span>`);
          hl.dataset.set = '1';
        }
      }
    } else {
      wordsLayer.style.opacity = 1;
      if (hlWrap) hlWrap.style.opacity = 0;
      // Clear and re-render words
      if (!wordsLayer.dataset.init) {
        wordsLayer.dataset.init = '1';
        wordsLayer.innerHTML = words.map((w, i) =>
          `<div id="t8-word-${i}" style="position:absolute;font-size:15px;font-weight:800;color:${i === words.indexOf(C.highlight.split(' ')[0]) ? T.badge_bg : T.headline_text};opacity:0;transform:translate(-50%,-50%);white-space:nowrap;">${w}</div>`
        ).join('');
      }
      words.forEach((w, i) => {
        const wordEl = document.getElementById(`t8-word-${i}`);
        if (!wordEl) return;
        const wordStart = 80 + i * 7;
        if (frame < wordStart) { wordEl.style.opacity = 0; return; }
        const t = easeOut(clamp((frame - wordStart) / 25, 0, 1));
        const r = interpolate(t, [0, 1], [160, 0], { clamp: false });
        const angle = (i / words.length) * Math.PI * 2 - Math.PI / 2;
        const targetX = 16 + (i % 3) * 70 + 35;
        const targetY = 200 + Math.floor(i / 3) * 25 + 12;
        const px = cx + Math.cos(angle) * r * (1 - t) + targetX * t;
        const py = cy + Math.sin(angle) * r * (1 - t) + targetY * t;
        wordEl.style.left = px + 'px';
        wordEl.style.top = py + 'px';
        wordEl.style.opacity = clamp(t * 2, 0, 1);

        // Flash on highlight word
        const hlFlash = document.getElementById('t8-hl-flash');
        if (hlFlash && i === words.length - 1 && frame >= wordStart && frame <= wordStart + 3) {
          hlFlash.style.opacity = (0.7 - (frame - wordStart) * 0.25) + '';
        } else if (hlFlash && (frame > wordStart + 3 || i !== words.length - 1)) {
          if (i === words.length - 1) hlFlash.style.opacity = 0;
        }
      });
    }
  }

  // Photo morph (frame 130-170)
  const photoEl = document.getElementById('t8-photo');
  if (photoEl) {
    if (frame < 130) {
      photoEl.style.opacity = 0;
    } else {
      const t = spring(frame - 130, { damping: 12, stiffness: 80 });
      const w = interpolate(t, [0, 1], [0, 220], { clamp: false });
      const h = interpolate(t, [0, 1], [0, 130], { clamp: false });
      const br = interpolate(t, [0, 1], [50, 12], { clamp: false });
      const rot = interpolate(t, [0, 1], [-15, 0], { clamp: false });
      photoEl.style.width = w + 'px';
      photoEl.style.height = h + 'px';
      photoEl.style.borderRadius = br + '%';
      photoEl.style.left = (cx - w/2) + 'px';
      photoEl.style.top = (cy - 100 - h/2) + 'px';
      photoEl.style.transform = `rotate(${rot}deg)`;
      photoEl.style.opacity = clamp(t * 3, 0, 1);
    }
  }

  // Support text vortex (frame 160-200)
  const supportEl = document.getElementById('t8-support');
  if (supportEl) {
    const sv = spring(frame - 160, { damping: 14, stiffness: 90 });
    supportEl.style.opacity = clamp(sv * 2, 0, 1);
    supportEl.style.transform = `translateY(${interpolate(sv, [0,1], [20, 0], {clamp:false})}px)`;
    if (!supportEl.dataset.set) {
      supportEl.textContent = C.support;
      supportEl.dataset.set = '1';
    }
  }

  // CTA particles converge then button appears (frame 200-250)
  const ctaEl = document.getElementById('t8-cta');
  if (ctaEl) {
    if (frame < 200) {
      ctaEl.style.opacity = 0;
    } else if (frame <= 240) {
      const t = clamp((frame - 200) / 40, 0, 1);
      // Show particles converging, then button
      for (let i = 0; i < 20; i++) {
        const p = document.getElementById(`t8-p-${i}`);
        if (!p) continue;
        const angle = parseFloat(p.dataset.angle);
        const r0 = parseFloat(p.dataset.r);
        const r = r0 * (1 - easeInOut(t));
        const px = 119 + Math.cos(angle) * r;
        const py = 22 + Math.sin(angle) * r;
        p.style.left = px + 'px';
        p.style.top = py + 'px';
        p.style.opacity = t < 0.9 ? clamp(t * 3, 0, 0.9) : interpolate(frame, [235, 242], [0.9, 0], { clamp: true });
      }
      if (t > 0.85) {
        const bt = spring(frame - 236, { damping: 12, stiffness: 180 });
        ctaEl.style.opacity = clamp(bt * 4, 0, 1);
        ctaEl.style.transform = `scale(${interpolate(bt, [0,1], [0.9, 1], {clamp:false})})`;
      }
    } else {
      ctaEl.style.opacity = 1;
      ctaEl.style.transform = 'scale(1)';
    }
  }

  // Logo bottom (frame 250+)
  const logoBottom = document.getElementById('t8-logo-bottom');
  if (logoBottom) {
    logoBottom.style.opacity = interpolate(frame, [250, 265], [0, 1], { clamp: true });
    if (logoEl) logoEl.style.opacity = interpolate(frame, [250, 260], [1, 0], { clamp: true });
  }

  // Ambient float on all settled elements (frame 270+)
  if (frame >= 270) {
    const floatEls = ['t8-badge', 't8-cta', 't8-support', 't8-hl-wrap'];
    floatEls.forEach((id, i) => {
      const el = document.getElementById(id);
      if (!el) return;
      const dy = Math.sin(frame * 0.04 + i * 1.2) * 1.5;
      const dx = Math.cos(frame * 0.03 + i * 0.8) * 0.8;
      el.style.transform = (el.style.transform || '').replace(/translateZ\([^)]*\)/g, '') +
        ` translateX(${dx}px) translateY(${dy}px)`;
    });
  }
}

function renderTemplate9(frame) {
  // Countdown
  const countdown = document.getElementById('t9-countdown');
  const numEl = document.getElementById('t9-num');
  if (countdown) {
    if (frame < 30) {
      countdown.style.opacity = 1;
      if (numEl) {
        const n = frame < 5 ? '3' : frame < 10 ? '2' : frame < 15 ? '1' : '';
        numEl.textContent = n;
        // Flicker
        numEl.style.opacity = (frame % 2 === 0 || frame > 12) ? '1' : '0.3';
      }
    } else {
      countdown.style.opacity = interpolate(frame, [30, 34], [1, 0], { clamp: true });
    }
  }

  // Leader flash
  const leader = document.getElementById('t9-leader');
  if (leader) {
    if (frame >= 15 && frame < 30) {
      leader.style.display = (frame % 3 < 2) ? 'block' : 'none';
    } else {
      leader.style.display = 'none';
    }
  }

  // Sprocket holes appear
  ['left', 'right'].forEach(side => {
    const sp = document.getElementById(`t9-sprocket-${side}`);
    if (sp) sp.style.opacity = interpolate(frame, [30, 40], [0, 1], { clamp: true });
  });

  // Grain intensity
  const grain = document.getElementById('t9-grain');
  if (grain) {
    const baseOp = interpolate(frame, [30, 40], [0, 0.25], { clamp: true });
    const flicker = 0.03 * Math.sin(frame * 13.7);
    grain.style.opacity = (baseOp + flicker) + '';
  }

  // Photo slides in
  const photoWrap = document.getElementById('t9-photo-wrap');
  if (photoWrap) {
    const t = spring(frame - 30, { damping: 14, stiffness: 90 });
    photoWrap.style.opacity = clamp(t * 3, 0, 1);
    photoWrap.style.transform = `translateX(${interpolate(t, [0,1], [100, 0], {clamp:false})}%)`;
  }

  // Logo focus (blur to sharp)
  const logoEl = document.getElementById('t9-logo');
  if (logoEl) {
    const lt = clamp((frame - 55) / 30, 0, 1);
    logoEl.style.opacity = lt;
    const blur = interpolate(lt, [0, 1], [6, 0], { clamp: true });
    logoEl.style.filter = `blur(${blur}px)`;
    // Sepia to brand color
    const sepia = interpolate(lt, [0, 0.5, 1], [1, 0.5, 0], { clamp: true });
    logoEl.style.filter += ` sepia(${sepia})`;
  }

  // Clapperboard badge
  const clapTop = document.getElementById('t9-clapper-top');
  const badgeFull = document.getElementById('t9-badge-full');
  const badgeText = document.getElementById('t9-badge-text');
  if (clapTop && frame >= 75) {
    if (frame < 100) {
      // Clapper snapping shut
      const snapT = easeIn(clamp((frame - 75) / 12, 0, 1));
      clapTop.style.transform = `perspective(200px) rotateX(${interpolate(snapT, [0,1], [-60, 0], {clamp:false})}deg)`;
      if (badgeText) badgeText.style.opacity = interpolate(frame, [86, 92], [0, 1], { clamp: true });
    } else if (frame < 108) {
      // Transform into pill badge
      const t = clamp((frame - 100) / 8, 0, 1);
      clapTop.style.opacity = interpolate(t, [0,1], [1, 0], { clamp: false });
      if (badgeFull) badgeFull.style.opacity = t;
    } else {
      clapTop.style.opacity = 0;
      if (badgeFull) badgeFull.style.opacity = 1;
    }
  }

  // Light leak
  const lightleak = document.getElementById('t9-lightleak');
  if (lightleak) {
    if (frame >= 100 && frame <= 150) {
      const t = clamp((frame - 100) / 50, 0, 1);
      const leakX = interpolate(t, [0, 1], [-150, 150], { clamp: true });
      lightleak.style.transform = `translateX(${leakX}%)`;
      lightleak.style.opacity = interpolate(t, [0, 0.3, 0.7, 1], [0, 0.6, 0.6, 0], { clamp: true });
    } else {
      lightleak.style.opacity = 0;
    }
  }

  // Headline flicker reveal
  const hlLineCount = 3; // approximate 3 lines
  for (let li = 0; li < hlLineCount; li++) {
    const lineEl = document.getElementById(`t9-hl-line-${li}`);
    if (!lineEl) continue;
    const lineStart = 100 + li * 15;
    if (frame >= lineStart) {
      const flickF = frame - lineStart;
      if (flickF < 6) {
        // Flicker: on/off rapidly
        lineEl.style.opacity = (flickF % 2 < 1) ? '0.9' : '0.1';
      } else {
        lineEl.style.opacity = '1';
      }
    }
  }

  // Support text scrolling credits
  const supportEl = document.getElementById('t9-support');
  if (supportEl && frame >= 140) {
    const scrollY = interpolate(frame, [140, 190], [36, -20], { clamp: true, easing: easeOut });
    supportEl.style.top = scrollY + 'px';
  }

  // Spotlight + CTA
  const spotlight = document.getElementById('t9-spotlight');
  const ctaEl = document.getElementById('t9-cta');
  if (spotlight && frame >= 170) {
    const t = clamp((frame - 170) / 40, 0, 1);
    const scanX = interpolate(t, [0, 0.6, 1], [-150, 0, 0], { clamp: true });
    spotlight.style.transform = `translateX(${scanX}%)`;
    spotlight.style.opacity = interpolate(t, [0, 0.2, 0.8, 1], [0, 0.7, 0.9, 0.5], { clamp: true });

    if (ctaEl) {
      ctaEl.style.opacity = interpolate(frame, [200, 212], [0, 1], { clamp: true });
    }
  }

  // FIN text flash
  const finEl = document.getElementById('t9-fin');
  if (finEl) {
    if (frame >= 210 && frame < 225) {
      finEl.style.opacity = (frame % 3 < 2) ? '1' : '0.2';
    } else {
      finEl.style.opacity = '0';
    }
  }

  // Logo bottom
  const logoBottom = document.getElementById('t9-logo-bottom');
  if (logoBottom) {
    logoBottom.style.opacity = interpolate(frame, [224, 235], [0, 1], { clamp: true });
  }
}

// ── Template 10: The Mosaic Assemble ─────────────────────────────────────────
const MOSAIC_COLS = 9;
const MOSAIC_ROWS = 16;
const TILE_COUNT = MOSAIC_COLS * MOSAIC_ROWS;

// Palette colors for random tiles
const TILE_PALETTE = [T.gradient_from, T.gradient_to, T.surface, T.primary, '#1a0f0a', '#3d1f12', '#562810'];

// Pre-compute spiral order from center
function computeSpiralOrder(cols, rows) {
  const cx = Math.floor(cols / 2);
  const cy = Math.floor(rows / 2);
  const tiles = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const dist = Math.sqrt((c - cx) ** 2 + (r - cy) ** 2);
      tiles.push({ r, c, dist, idx: r * cols + c });
    }
  }
  tiles.sort((a, b) => a.dist - b.dist);
  return tiles;
}

const spiralOrder = computeSpiralOrder(MOSAIC_COLS, MOSAIC_ROWS);

// Define which tiles belong to which region (row ranges for a 16-row grid)
function getTileRegion(row) {
  if (row <= 1) return 'logo';
  if (row <= 2) return 'badge';
  if (row >= 3 && row <= 8) return 'photo';
  if (row >= 9 && row <= 12) return 'headline';
  if (row >= 13 && row <= 14) return 'support';
  if (row >= 15) return 'cta';
  return 'bg';
}

// Headline text split for mosaic tile flip
const HL_WORDS = C.headline.split(' ');

function initTemplate10(canvas) {
  const tw = 270 / MOSAIC_COLS; // tile width ~30px
  const th = 585 / MOSAIC_ROWS; // tile height ~36.5px

  let html = `<div id="t10-grid" style="position:absolute;inset:0;display:grid;grid-template-columns:repeat(${MOSAIC_COLS},1fr);grid-template-rows:repeat(${MOSAIC_ROWS},1fr);">`;

  for (let r = 0; r < MOSAIC_ROWS; r++) {
    for (let c = 0; c < MOSAIC_COLS; c++) {
      const idx = r * MOSAIC_COLS + c;
      const region = getTileRegion(r);
      const color = TILE_PALETTE[idx % TILE_PALETTE.length];
      html += `<div id="t10-tile-${idx}" style="
        position:relative;
        background:${color};
        border:0.5px solid rgba(0,0,0,0.2);
        transform-style:preserve-3d;
        perspective:100px;
        overflow:hidden;
        display:flex;align-items:center;justify-content:center;
      " data-row="${r}" data-col="${c}" data-region="${region}">
        <!-- back face for flip reveal -->
        <div id="t10-tile-back-${idx}" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;transform:rotateY(180deg);font-size:9px;font-weight:700;color:${T.badge_text};overflow:hidden;"></div>
      </div>`;
    }
  }

  html += '</div>';

  // Photo overlay (revealed after tiles fade out)
  const photoUrl = AD.assets.afterPhotoUrl;
  const photoContent = photoUrl
    ? `<img src="${photoUrl}" style="width:100%;height:100%;object-fit:cover;" />`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:10px;letter-spacing:2px;text-transform:uppercase;">Photo</div>`;
  const th = 585 / MOSAIC_ROWS;
  html += `<div id="t10-photo" style="position:absolute;left:4px;right:4px;top:${th * 3 + 4}px;height:${th * 6 - 8}px;overflow:hidden;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.5);background:linear-gradient(135deg,${T.gradient_from} 0%,${T.gradient_to} 60%,${T.primary} 100%);opacity:0;transform:translateY(40px) scale(0.85);z-index:1;">${photoContent}</div>`;

  // Logo overlay
  const logoUrl = AD.assets.logoUrl;
  const logoContent = logoUrl
    ? `<img src="${logoUrl}" style="max-height:30px;object-fit:contain;" />`
    : `<div style="font-weight:800;letter-spacing:0.12em;color:${T.badge_text};text-transform:uppercase;font-size:11px;">${BRAND}</div>`;
  html += `<div id="t10-logo" style="position:absolute;left:0;top:0;width:100%;height:${th * 2}px;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0.5);z-index:1;">${logoContent}</div>`;

  // Overlay for CTA
  html += `<div id="t10-cta" style="position:absolute;left:10px;right:10px;bottom:10px;height:50px;background:${T.cta_bg};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${T.cta_text};opacity:0;">${C.cta}</div>`;

  canvas.innerHTML = html;

  // Store random shimmer seeds per tile
  for (let i = 0; i < TILE_COUNT; i++) {
    const el = document.getElementById(`t10-tile-${i}`);
    if (el) el.dataset.seed = (Math.random() * 100).toFixed(2);

// Precompute logo tile assignments (which tiles in logo region spell brand name)
function getLogoTileColor(col, totalCols) {
  // Simple: alternate between badge_bg and surface for "logo area" look
  return col % 2 === 0 ? T.badge_bg : T.surface;
}

function getRegionGradientColor(row, col, rows, cols) {
  const tx = col / cols;
  const ty = row / rows;
  return lerpColor(T.gradient_from, T.gradient_to, ty + tx * 0.3);
}

// Flying particle positions for CTA explosion
const CTA_EXPLODE_VELS = [];
for (let i = 0; i < TILE_COUNT; i++) {
  const row = Math.floor(i / MOSAIC_COLS);
  if (row >= 15) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    CTA_EXPLODE_VELS.push({ vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed });
  } else {
    CTA_EXPLODE_VELS.push(null);
  }
}

function renderTemplate10(frame) {
  const tw = 270 / MOSAIC_COLS;
  const th = 585 / MOSAIC_ROWS;

  // Spiral order index for build animations
  const spiralIndexMap = {};
  spiralOrder.forEach((tile, si) => {
    spiralIndexMap[tile.idx] = si;
  });

  for (let idx = 0; idx < TILE_COUNT; idx++) {
    const tileEl = document.getElementById(`t10-tile-${idx}`);
    if (!tileEl) continue;

    const row = Math.floor(idx / MOSAIC_COLS);
    const col = idx % MOSAIC_COLS;
    const region = getTileRegion(row);
    const si = spiralIndexMap[idx]; // spiral index

    // Phase 0-20: Shimmer
    if (frame < 20) {
      const shimmerT = frame / 20;
      const seed = parseFloat(tileEl.dataset.seed);
      const op = 0.3 + 0.7 * Math.abs(Math.sin((frame + seed) * 0.4));
      tileEl.style.opacity = op;
    } else {
      tileEl.style.opacity = 1;
    }

    // Phase 20-70: Logo mosaic build (logo region), then fade out to reveal logo
    if (region === 'logo' && frame >= 20) {
      const tileDelay = si * 0.4; // staggered by spiral distance
      const tileF = frame - 20 - tileDelay;
      if (tileF >= 0) {
        const t = clamp(tileF / 8, 0, 1);
        const targetColor = getLogoTileColor(col, MOSAIC_COLS);
        tileEl.style.background = lerpColor(TILE_PALETTE[idx % TILE_PALETTE.length], targetColor, easeOut(t));
        // Pop scale
        const pop = tileF < 3 ? 1 + tileF * 0.1 : tileF < 5 ? 1.3 - (tileF - 3) * 0.15 : 1;
        tileEl.style.transform = `scale(${pop})`;
      }
      // Fade out tiles to reveal logo (staggered)
      if (frame >= 55) {
        const fadeDelay = col * 1.5;
        const fadeT = clamp((frame - 55 - fadeDelay) / 10, 0, 1);
        tileEl.style.opacity = 1 - fadeT;
      }
    }

    // Phase 60-110: Photo region color morph, then fade out to reveal photo
    if (region === 'photo' && frame >= 60) {
      const tileDelay = (col + row * 0.5) * 1.2;
      const tileF = frame - 60 - tileDelay;
      if (tileF >= 0) {
        const t = clamp(tileF / 15, 0, 1);
        const targetColor = getRegionGradientColor(row, col, MOSAIC_ROWS, MOSAIC_COLS);
        tileEl.style.background = lerpColor(tileEl.style.background || TILE_PALETTE[idx % TILE_PALETTE.length], targetColor, easeInOut(t));

        // Subdivision effect: show smaller sub-grid pattern inside tile
        if (tileF > 10 && !tileEl.dataset.subdivided) {
          tileEl.dataset.subdivided = '1';
          tileEl.style.backgroundImage = `
            linear-gradient(${targetColor},${targetColor}),
            repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent ${th/2}px),
            repeating-linear-gradient(90deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent ${tw/2}px)
          `;
          tileEl.style.backgroundBlendMode = 'normal,multiply,multiply';
        }
      }
      // Fade out tiles to reveal photo underneath (staggered)
      if (frame >= 85) {
        const fadeDelay = (col + (row - 3) * 1.5) * 1.0;
        const fadeT = clamp((frame - 85 - fadeDelay) / 12, 0, 1);
        tileEl.style.opacity = 1 - fadeT;
      }
    }

    // Phase 100-140: Badge tiles color morph
    if (region === 'badge' && frame >= 100) {
      const tileDelay = col * 2;
      const tileF = frame - 100 - tileDelay;
      if (tileF >= 0) {
        const t = clamp(tileF / 12, 0, 1);
        const targetColor = col === Math.floor(MOSAIC_COLS / 2) ? T.badge_text : T.badge_bg;
        tileEl.style.background = lerpColor(tileEl.style.background || T.surface, targetColor, easeOut(t));
        const pop = tileF < 3 ? 1 + tileF * 0.1 : tileF < 5 ? 1.3 - (tileF - 3) * 0.15 : 1;
        tileEl.style.transform = `scale(${pop})`;
      }
    }

    // Phase 130-180: Headline tile flip (rotateY reveal text)
    if (region === 'headline' && frame >= 130) {
      const tileDelay = col * 3.5; // left to right stagger
      const tileF = frame - 130 - tileDelay;
      const backEl = document.getElementById(`t10-tile-back-${idx}`);

      if (tileF >= 0) {
        const t = clamp(tileF / 18, 0, 1);
        const rotY = interpolate(easeInOut(t), [0, 1], [0, 180], { clamp: false });
        tileEl.style.transform = `perspective(200px) rotateY(${rotY}deg)`;

        if (backEl) {
          // Highlight word tiles get badge color background
          const hlWordStart = C.headline.indexOf(C.highlight);
          const charPos = col + (row - 9) * MOSAIC_COLS;
          const isHighlight = (charPos >= hlWordStart / 3) && (charPos < (hlWordStart + C.highlight.length) / 3);
          backEl.style.background = isHighlight ? T.badge_bg : T.gradient_to;

          // Show a character from the headline
          const wordIdx = Math.floor((col / MOSAIC_COLS) * HL_WORDS.length);
          const lineIdx = row - 9;
          const word = HL_WORDS[Math.min(wordIdx + lineIdx, HL_WORDS.length - 1)] || '';
          backEl.textContent = word.charAt(col % Math.max(word.length, 1));
        }
      }
    }

    // Phase 170-210: Support tile flip (top to bottom stagger)
    if (region === 'support' && frame >= 170) {
      const tileDelay = (row - 13) * 10 + col * 1.5;
      const tileF = frame - 170 - tileDelay;
      const backEl = document.getElementById(`t10-tile-back-${idx}`);

      if (tileF >= 0) {
        const t = clamp(tileF / 16, 0, 1);
        const rotY = interpolate(easeInOut(t), [0, 1], [0, 180], { clamp: false });
        tileEl.style.transform = `perspective(200px) rotateY(${rotY}deg)`;

        if (backEl) {
          backEl.style.background = T.surface;
          const supportChars = C.support;
          const charIdx = (col + (row - 13) * MOSAIC_COLS);
          backEl.textContent = supportChars.charAt(charIdx % supportChars.length);
        }
      }
    }

    // Phase 200-240: CTA tile explosion
    if (region === 'cta' && frame >= 200) {
      const explodeF = frame - 200;
      const vel = CTA_EXPLODE_VELS[idx];
      if (vel) {
        const dx = vel.vx * explodeF;
        const dy = vel.vy * explodeF;
        const rot = explodeF * vel.vx * 3;
        const opacity = interpolate(frame, [200, 240], [1, 0], { clamp: true });
        tileEl.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
        tileEl.style.opacity = opacity;
      }
    }

    // Phase 240-270: Remaining tiles wave
    if (region !== 'cta' && frame >= 240) {
      const waveF = frame - 240;
      const phase = (col + row) * 0.4;
      const dy = Math.sin(waveF * 0.2 + phase) * 2;
      // Only apply if not already transformed by flip
      if (region !== 'headline' && region !== 'support') {
        tileEl.style.transform = `translateY(${dy}px)`;
      }
    }
  }

  // Photo spring reveal (frame 80+) — modeled after Template8 orbit photo
  const photoEl = document.getElementById('t10-photo');
  if (photoEl) {
    if (frame < 80) {
      photoEl.style.opacity = 0;
    } else {
      const t = spring(frame - 80, { damping: 10, stiffness: 150 });
      const ty = interpolate(t, [0, 1], [40, 0], { clamp: false });
      const sc = interpolate(t, [0, 1], [0.85, 1], { clamp: false });
      photoEl.style.opacity = clamp(t * 2.5, 0, 1);
      photoEl.style.transform = `translateY(${ty}px) scale(${sc})`;
    }
  }

  // Logo spring reveal (frame 50+)
  const logoEl = document.getElementById('t10-logo');
  if (logoEl) {
    if (frame < 50) {
      logoEl.style.opacity = 0;
    } else {
      const t = spring(frame - 50, { damping: 12, stiffness: 120 });
      const sc = interpolate(t, [0, 1], [0.5, 1], { clamp: false });
      logoEl.style.opacity = clamp(t * 2, 0, 1);
      logoEl.style.transform = `scale(${sc})`;
    }
  }

  // CTA button reveal (behind exploding tiles)
  const ctaEl = document.getElementById('t10-cta');
  if (ctaEl) {
    const t = spring(frame - 200, { damping: 14, stiffness: 100 });
    ctaEl.style.opacity = clamp(t * 2, 0, 1);
    ctaEl.style.transform = `scale(${interpolate(t, [0,1], [0.9, 1], {clamp:false})})`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDERER DISPATCH
// ─────────────────────────────────────────────────────────────────────────────
const INITS = { 6: initTemplate6, 7: initTemplate7, 8: initTemplate8, 9: initTemplate9, 10: initTemplate10 };
const RENDERS = { 6: renderTemplate6, 7: renderTemplate7, 8: renderTemplate8, 9: renderTemplate9, 10: renderTemplate10 };

function initTemplate(tpl) {
  const canvas = document.getElementById('canvas');
  INITS[tpl](canvas);
}

function renderFrame(f) {
  RENDERS[currentTemplate](f);
}

// ─────────────────────────────────────────────────────────────────────────────
// PLAYER LOOP
// ─────────────────────────────────────────────────────────────────────────────
function getTemplateDuration() { return TEMPLATES[currentTemplate].duration; }
function getTemplateFPS() { return TEMPLATES[currentTemplate].fps; }

function rafLoop(timestamp) {
  if (lastTime === null) lastTime = timestamp;
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  if (playing) {
    const fps = getTemplateFPS();
    frameAccum += dt * fps / 1000;

    while (frameAccum >= 1) {
      frame++;
      frameAccum -= 1;

      const dur = getTemplateDuration();
      if (frame >= dur) {
        frame = 0; // loop
      }
    }

    renderFrame(frame);
    updateTimeline();
  }

  rafId = requestAnimationFrame(rafLoop);
}

function updateTimeline() {
  const dur = getTemplateDuration();
  const pct = (frame / dur) * 100;
  const prog = document.getElementById('timeline-progress');
  const thumb = document.getElementById('timeline-thumb');
  const fdisp = document.getElementById('frame-display');
  const ddisp = document.getElementById('duration-display');
  if (prog) prog.style.width = pct + '%';
  if (thumb) thumb.style.left = pct + '%';
  if (fdisp) fdisp.textContent = `Frame ${frame}`;
  if (ddisp) ddisp.textContent = `/ ${dur}`;
}

function switchTemplate(tpl) {
  currentTemplate = tpl;
  frame = 0;
  frameAccum = 0;
  lastTime = null;

  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.tpl) === tpl);
  });

  // Re-init canvas
  initTemplate(tpl);
  renderFrame(0);
  updateTimeline();
  updateSidebar(tpl);
}

function updateSidebar(tpl) {
  const info = TEMPLATES[tpl];

  // Main info card
  const card = document.getElementById('template-info-card');
  card.innerHTML = `
    <h3>Template ${tpl}</h3>
    <div class="template-title">${info.name}</div>
    <div class="duration-badge">
      <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M5 3v2.5L6.5 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      ${info.duration / info.fps}s &bull; ${info.fps}fps &bull; ${info.duration} frames
    </div>
    <div class="template-desc">${info.desc}</div>
    <ul class="features-list">
      ${info.features.map(f => `<li>${f}</li>`).join('')}
    </ul>
  `;

  // Packages
  const pkgs = document.getElementById('packages-list');
  pkgs.innerHTML = info.packages.map(p => `<span class="pkg-tag">${p}</span>`).join('');

  // Scene timeline
  const sceneTL = document.getElementById('scene-timeline');
  sceneTL.innerHTML = info.scenes.map(s => {
    const left = (s.start / info.duration) * 100;
    const width = ((s.end - s.start) / info.duration) * 100;
    return `
      <div class="scene-row">
        <div class="scene-label">${s.label}</div>
        <div class="scene-bar">
          <div class="scene-fill" style="left:${left}%;width:${width}%;background:${s.color};"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', () => {
  playing = !playing;
  lastTime = null;
  document.getElementById('btn-play').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
});

document.getElementById('btn-restart').addEventListener('click', () => {
  frame = 0;
  frameAccum = 0;
  lastTime = null;
  renderFrame(0);
  updateTimeline();
});

// Timeline scrub
const timeline = document.getElementById('timeline');
let scrubbing = false;

function scrubTo(e) {
  const rect = timeline.getBoundingClientRect();
  const t = clamp((e.clientX - rect.left) / rect.width, 0, 1);
  frame = Math.round(t * getTemplateDuration());
  frameAccum = 0;
  renderFrame(frame);
  updateTimeline();
}

timeline.addEventListener('mousedown', e => { scrubbing = true; scrubTo(e); });
document.addEventListener('mousemove', e => { if (scrubbing) scrubTo(e); });
document.addEventListener('mouseup', () => { scrubbing = false; });

// Tab buttons
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTemplate(parseInt(btn.dataset.tpl)));
});

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
switchTemplate(6);
rafId = requestAnimationFrame(rafLoop);
</script>
