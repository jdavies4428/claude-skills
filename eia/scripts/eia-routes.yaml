  spr:                  /v2/petroleum/stoc/p1
  refinery_util:        /v2/petroleum/pnp/wiup
  imports:              /v2/petroleum/move/imp
  exports:              /v2/petroleum/move/exp
  ethanol:              /v2/petroleum/pnp/epoor
  biodiesel:            /v2/petroleum/pnp/epobob

coal:
  production:           /v2/coal/production/quarterly
  consumption:          /v2/coal/consumption/quarterly
  prices:               /v2/coal/shipments/receipts/quarterly
  stocks:               /v2/coal/stocks/quarterly
