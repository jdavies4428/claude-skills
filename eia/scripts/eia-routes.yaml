# EIA API Routes — Single Source of Truth
# Edit here to update routes across the entire skill
# Base URL: https://api.eia.gov

base_url: "https://api.eia.gov"
api_version: "v2"

electricity:
  retail_prices:        /v2/electricity/retail-sales
  generation:           /v2/electricity/electric-power-operational
  capacity:             /v2/electricity/capacity
  rto_hourly:           /v2/electricity/rto/region-data
  rto_daily:            /v2/electricity/rto/daily-region-data

natural_gas:
  prices_summary:       /v2/natural-gas/pri/sum
  prices_residential:   /v2/natural-gas/pri/res
  prices_commercial:    /v2/natural-gas/pri/com
  prices_industrial:    /v2/natural-gas/pri/ind
  prices_futures:       /v2/natural-gas/pri/fut
  storage_weekly:       /v2/natural-gas/stor/wkly
  production:           /v2/natural-gas/prod/sum
  consumption:          /v2/natural-gas/cons/sum
  imports:              /v2/natural-gas/move/impc
  exports:              /v2/natural-gas/move/expc
  lng_exports:          /v2/natural-gas/move/lngc
  pipeline:             /v2/natural-gas/move/poe1

petroleum:
